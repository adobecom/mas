                        runtime: nodejs:22
                        inputs:
                            AEM_BASE_URL: $AEM_BASE_URL
                            STUDIO_BASE_URL: $STUDIO_BASE_URL
                        annotations:
                            require-adobe-auth: false
                            final: true
