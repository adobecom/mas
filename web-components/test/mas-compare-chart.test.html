<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>mas-compare-chart tests</title>
        <script>
            window.process = { env: {} };
        </script>
        <script type="module" src="../src/mas.js"></script>
        <link
            rel="stylesheet"
            href="https://www.adobe.com/libs/styles/styles.css"
        />
    </head>
    <body>
        <mas-commerce-service env="stage"></mas-commerce-service>

        <!-- Inert until cloned in describe before() so aem-fragment / fetch
             never run until mocks and mas.js are fully ready. -->
        <template id="compare-chart-shared-fixture">
            <mas-compare-chart
                id="t"
                expanded-groups="all"
                consonant
                spectrum="swc"
            >
                <aem-fragment fragment="compare-chart-express"></aem-fragment>
            </mas-compare-chart>
        </template>

        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { mockIms } from './mocks/ims.js';
            import { mockLana } from './mocks/lana.js';
            import { mockFetch } from './mocks/fetch.js';
            import { withAem } from './mocks/aem.js';
            import { withWcs } from './mocks/wcs.js';

            runTests(async () => {
                describe('mas-compare-chart', () => {
                    before(async () => {
                        mockIms();
                        mockLana();
                        await mockFetch(withWcs, withAem);

                        const fixture = document.getElementById(
                            'compare-chart-shared-fixture',
                        );
                        document.body.append(fixture.content.cloneNode(true));
                    });

                    it('hydrates a compare chart fragment with card CTAs', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        expect(await chart.checkReady()).to.be.true;
                        expect(
                            chart.querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            ).length,
                        ).to.equal(3);
                        chart
                            .querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            )
                            .forEach((card) => {
                                expect(card.consonant).to.be.true;
                                expect(card.hasAttribute('consonant')).to.be
                                    .true;
                                expect(card.spectrum).to.equal('swc');
                                expect(card.getAttribute('spectrum')).to.equal(
                                    'swc',
                                );
                            });
                        expect(
                            chart.querySelectorAll(':scope > [slot$="-cta"]')
                                .length,
                        ).to.equal(3);

                        const ctaText = Array.from(
                            chart.querySelectorAll(':scope > [slot$="-cta"]'),
                            (cta) => cta.textContent.trim(),
                        );
                        expect(ctaText).to.include('Start 14-day free trial');
                        expect(ctaText).to.include('Get free plan');
                        expect(ctaText).to.include('Start 7-day free trial');
                    });

                    it('persists each section expand state in expanded-groups', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        await chart.updateComplete;
                        const headers = chart.shadowRoot.querySelectorAll(
                            '.table-column-header',
                        );
                        expect(headers.length).to.be.greaterThan(2);

                        headers[0].click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            '2,3,4,5,6,7,8,9',
                        );
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[0]
                                .getAttribute('aria-expanded'),
                        ).to.equal('false');
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[1]
                                .getAttribute('aria-expanded'),
                        ).to.equal('true');

                        chart.shadowRoot
                            .querySelectorAll('.table-column-header')[0]
                            .click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            'all',
                        );
                    });

                    it('renders at most four card fragments', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            ${[1, 2, 3, 4, 5]
                                .map(
                                    (index) => `
                                        <merch-card slot="cards" variant="compare-chart">
                                            <h3 slot="header">Card ${index}</h3>
                                            <div slot="features">
                                                <p name="group@feature">Value ${index}</p>
                                            </div>
                                        </merch-card>
                                    `,
                                )
                                .join('')}
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;

                        expect(chart.getAttribute('data-child-count')).to.equal(
                            '4',
                        );
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-4-header"]',
                            ).textContent,
                        ).to.include('Card 4');
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-5-header"]',
                            ),
                        ).to.not.exist;
                        chart.remove();
                    });

                    it('keeps text after checkmarks inside the chip unless wrapped in small', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="features">
                                    <p name="group@feature">✅ Premium tools</p>
                                    <p name="group@plain-count">✓ 519,000+</p>
                                    <p name="group@captioned">✓<small>519,000+</small></p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                                <p name="plain-count">Plain count</p>
                                <p name="captioned">Captioned</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await chart.updateComplete;

                        const cells =
                            chart.shadowRoot.querySelectorAll('p[role="cell"]');
                        expect(
                            cells[0].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓ Premium tools');
                        expect(
                            cells[0].classList.contains('emoji-primary-cell'),
                        ).to.be.true;
                        expect(
                            cells[0]
                                .querySelector('.compare-chart-glyph')
                                .classList.contains('primary'),
                        ).to.be.true;
                        expect(
                            getComputedStyle(
                                cells[0].querySelector('.compare-chart-chip'),
                            ).color,
                        ).to.equal('rgb(5, 131, 78)');
                        expect(cells[0].querySelector('small')).to.not.exist;
                        expect(
                            cells[1].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓ 519,000+');
                        expect(cells[1].querySelector('small')).to.not.exist;
                        expect(
                            cells[1]
                                .querySelector('.compare-chart-chip')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[1]
                                .querySelector('.compare-chart-glyph')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[2].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓');
                        expect(
                            cells[2].querySelector('small').textContent.trim(),
                        ).to.equal('519,000+');
                        expect(
                            cells[2]
                                .querySelector('.compare-chart-chip')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[2]
                                .querySelector('small')
                                .hasAttribute('style'),
                        ).to.be.false;
                        chart.remove();
                    });

                    it('aligns price cell heights across cards', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.style.width = '1000px';
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Single price</h3>
                                <p slot="price">$10/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Wrapped price</h3>
                                <p slot="price">Starting at<br>$20/mo<br>per license</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(() =>
                                requestAnimationFrame(resolve),
                            ),
                        );

                        const priceHeights = Array.from(
                            chart.shadowRoot.querySelectorAll('.price-segment'),
                            (segment) =>
                                Math.round(
                                    segment.getBoundingClientRect().height,
                                ),
                        );
                        expect(priceHeights).to.have.length(2);
                        expect(new Set(priceHeights).size).to.equal(1);
                        chart.remove();
                    });

                    it('renders an 8px gap between CTAs in the same card', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.style.width = '1000px';
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="cta">
                                    <a href="#">Buy now</a>
                                    <a href="#">Learn more</a>
                                </div>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(() =>
                                requestAnimationFrame(resolve),
                            ),
                        );

                        const ctas = Array.from(
                            chart.querySelectorAll(
                                ':scope > [slot="card-1-cta"]',
                            ),
                        );
                        expect(ctas).to.have.length(2);

                        const first = ctas[0].getBoundingClientRect();
                        const second = ctas[1].getBoundingClientRect();
                        expect(Math.round(second.top - first.bottom)).to.equal(
                            8,
                        );
                        chart.remove();
                    });
                });
            });
        </script>
    </body>
</html>
