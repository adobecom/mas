<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>M@S Studio — Fragment Editor Tabs Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@spectrum-css/tokens@14.6.0/dist/index.css" />
    <script type="importmap">{"imports":{"@spectrum-web-components/":"https://cdn.jsdelivr.net/npm/@spectrum-web-components/"}}</script>
    <script type="module">
        import '@spectrum-web-components/theme/sp-theme.js';
        import '@spectrum-web-components/theme/spectrum-two/scale-medium-core-tokens.js';
        import '@spectrum-web-components/theme/spectrum-two/theme-light-core-tokens.js';
        import '@spectrum-web-components/tabs/sp-tabs.js';
        import '@spectrum-web-components/tabs/sp-tab.js';
        import '@spectrum-web-components/tabs/sp-tab-panel.js';
        import '@spectrum-web-components/field-label/sp-field-label.js';
        import '@spectrum-web-components/textfield/sp-textfield.js';
        import '@spectrum-web-components/picker/sp-picker.js';
        import '@spectrum-web-components/menu/sp-menu-item.js';
        import '@spectrum-web-components/divider/sp-divider.js';
    </script>
    <style>
        body { margin: 0; padding: var(--spectrum-spacing-600); background: var(--spectrum-gray-50); font-family: var(--spectrum-font-family-base); }
        .editor-panel { background: var(--spectrum-white); border-radius: 8px; padding: var(--spectrum-spacing-500); }
        .field-row { display: flex; flex-direction: column; gap: var(--spectrum-spacing-200); margin-bottom: var(--spectrum-spacing-500); }
        sp-textfield, sp-picker { width: 100%; }
    </style>
</head>
<body>
<sp-theme system="spectrum-two" color="light" scale="medium">
    <!-- Pattern: sp-tabs + sp-tab-panel — sourced from mas-fragment-variations.js:450-465 -->
    <div class="editor-panel">
        <sp-tabs selected="fields" quiet>
            <sp-tab value="fields" label="Fields">Fields</sp-tab>
            <sp-tab value="variations" label="Variations">Variations</sp-tab>
            <sp-tab value="history" label="History">History</sp-tab>

            <sp-tab-panel value="fields">
                <div class="field-row">
                    <sp-field-label for="title" required>Title</sp-field-label>
                    <sp-textfield id="title" placeholder="Enter title" value="Creative Cloud All Apps"></sp-textfield>
                </div>
                <sp-divider size="s"></sp-divider>
                <div class="field-row">
                    <sp-field-label for="variant">Variant</sp-field-label>
                    <sp-picker id="variant" label="Select variant">
                        <sp-menu-item value="catalog">Catalog</sp-menu-item>
                        <sp-menu-item value="ccd-action">CCD Action</sp-menu-item>
                        <sp-menu-item value="segment">Segment</sp-menu-item>
                    </sp-picker>
                </div>
            </sp-tab-panel>

            <sp-tab-panel value="variations">
                <p style="color: var(--spectrum-gray-700); font-size: 14px;">No variations found.</p>
            </sp-tab-panel>

            <sp-tab-panel value="history">
                <p style="color: var(--spectrum-gray-700); font-size: 14px;">No history available.</p>
            </sp-tab-panel>
        </sp-tabs>
    </div>
</sp-theme>
</body>
</html>
