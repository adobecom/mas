# This workflow will install Python dependencies, run CMR creation in ServiceNow
# Overview
# * This workflow will create CMRs for any changes to M@S Studio or M@S IO
# * The workflow runs when a PR for the main branch is opened or closed, and contains changes under io/ or studio/
# * On PR open
#   * The workflow determines exactly what changed and create a CMR for M@S Studio, M@S IO, or both.
#     * Transaction numbers for those CMRs are written to the PR comments.  The workflow will reference these transaction numbers when closing the CMRs.
#   * A notification will be sent to the Slack #merch-at-scale channel
# * On PR close
#   * The workflow will check PR comments to determine whether any CMRs were opened, and will update and close them
#     * If the PR was merged, the CMRs will be closed as Successful; if the PR was closed without merging the CMRs will be Cancelled.
#   * A notification will be sent to the Slack #merch-at-scale channel (only if the PR was merged)
# * Future enhancements
#   * Expand this to include other paths (this may require creating and onboarding new services in the Service Registry
#   * Refactor this workflow so all actions take place on PR close.  This will reduce CMR noise and reduce the time between opening a PR and closing it.
#   * These will be done in separate JIRA tickets and PRs

name: Create CMR in ServiceNow

on:
  pull_request:
    types:
      - opened
      - closed
    branches:
      - main
    paths:
      - 'io/**'
      - 'studio/**'

permissions:
  pull-requests: write
  contents: read

# When switching between prod and stage, you must update four variables below:
# ENVIRONMENT, IMSACCESS_CLIENT_SECRET, IMSACCESS_AUTH_CODE and IPAAS_KEY
# The other variables are not environment-specific
env:
  ENVIRONMENT: prod  # Set to "stage" or "prod"
  # IMSACCESS_CLIENT_SECRET: ${{ secrets.IMSACCESS_CLIENT_SECRET_STAGE }}
  # IMSACCESS_AUTH_CODE: ${{ secrets.IMSACCESS_AUTH_CODE_STAGE }}
  # IPAAS_KEY: ${{ secrets.IPAAS_KEY_STAGE }}
  IMSACCESS_CLIENT_SECRET: ${{ secrets.IMSACCESS_CLIENT_SECRET_PROD }}
  IMSACCESS_AUTH_CODE: ${{ secrets.IMSACCESS_AUTH_CODE_PROD }}
  IPAAS_KEY: ${{ secrets.IPAAS_KEY_PROD }}
  IMSACCESS_CLIENT_ID: ${{ secrets.IMSACCESS_CLIENT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Notifications will be sent to the #merch-at-scale Slack channel
  SLACK_WEBHOOK_URL: ${{ secrets.MERCH_AT_SCALE_SLACK_WEBHOOK_URL }}
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_BODY: ${{ github.event.pull_request.body }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
  PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
  PR_LINK: ${{ github.event.pull_request.html_url }}
  PR_STATE: ${{ github.event.pull_request.state }}
  PR_MERGED: ${{ github.event.pull_request.merged }}
  SNOW_INSTANCE_ID_IO: ${{ secrets.SNOW_INSTANCE_ID_IO }}
  SNOW_INSTANCE_ID_STUDIO: ${{ secrets.SNOW_INSTANCE_ID_STUDIO }}

jobs:
  # Detect which paths have changed in the PR
  detect-changes:
    if: ${{ github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-latest
    outputs:
      changed_path: ${{ steps['set-instance-id'].outputs.changed_path }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0  # Fetch all history to ensure we can compare commits
      
      - name: Detect changed paths and set SNOW Instance ID
        id: set-instance-id
        run: |
          # Get the list of changed files in the PR
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if any files match the io/** pattern
          IO_CHANGED=false
          if echo "$CHANGED_FILES" | grep -q "^io/"; then
            IO_CHANGED=true
            echo "Changes detected in io/** path"
          fi
          
          # Check if any files match the studio/** pattern
          STUDIO_CHANGED=false
          if echo "$CHANGED_FILES" | grep -q "^studio/"; then
            STUDIO_CHANGED=true
            echo "Changes detected in studio/** path"
          fi
          
          # Set SNOW Instance ID based on which paths changed
          if [[ "$IO_CHANGED" == "true" && "$STUDIO_CHANGED" == "true" ]]; then
            echo "changed_path=both" >> $GITHUB_OUTPUT
            echo "Setting changed_path to both (IO and Studio)"
          elif [[ "$IO_CHANGED" == "true" ]]; then
            echo "changed_path=io" >> $GITHUB_OUTPUT
            echo "Setting changed_path to io"
          elif [[ "$STUDIO_CHANGED" == "true" ]]; then
            echo "changed_path=studio" >> $GITHUB_OUTPUT
            echo "Setting changed_path to studio"
          else
            echo "::error::ERROR: Workflow was triggered but no changes detected in io/ or studio/ paths. This should not happen given the path filters in the workflow trigger."
            exit 1
          fi

  # matrix.* is not available in job-level `if`. Use step `cmr_row` once, then
  # `steps.cmr_row.outcome == 'success'` on steps that should run for this row.
  cmr-lifecycle:
    needs: detect-changes
    strategy:
      matrix:
        path: [io, studio]
    if: >-
      ${{ always() && ((github.event.pull_request.state == 'open' && needs.detect-changes.result == 'success')
      || github.event.pull_request.merged == true
      || (github.event.pull_request.state == 'closed' && github.event.pull_request.merged == false)) }}
    runs-on: ubuntu-latest

    steps:
    - name: Matrix row active (merged PR, PR closed without merge, or open PR and path matches)
      id: cmr_row
      if: >-
        ${{ github.event.pull_request.merged == true
        || (github.event.pull_request.state == 'closed' && github.event.pull_request.merged == false)
        || (github.event.pull_request.state == 'open'
        && (needs.detect-changes.outputs.changed_path == matrix.path
        || needs.detect-changes.outputs.changed_path == 'both')) }}
      run: echo "Running CMR steps for matrix.path=${{ matrix.path }}"

    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      if: steps.cmr_row.outcome == 'success'
    - name: Set up Python 3.x, latest minor release
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
      if: steps.cmr_row.outcome == 'success'
      with:
        python-version: "3.x"
    - name: Install dependencies
      if: steps.cmr_row.outcome == 'success'
      run: |
        python -m pip install --upgrade pip requests timedelta

    - name: Retrieve transaction ID from PR Comments (${{ matrix.path }})
      id: retrieve-transactionId-step
      if: steps.cmr_row.outcome == 'success'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
      with:
        script: |
          const main = (await import('${{ github.workspace }}/.github/workflows/snow-pr-comment.js')).default
          if (process.env.PR_STATE == 'closed') {
            main({ github, context, transaction_id: null, path_identifier: '${{ matrix.path }}' })
          } else {
            console.log('PR is not in an closed state. Skipping...');
          }

    - name: Execute script for creating and closing CMR (${{ matrix.path }})
      id: create-close-cmr-step
      if: steps.cmr_row.outcome == 'success'
      env:
        RETRIEVED_TRANSACTION_ID: ${{ steps['retrieve-transactionId-step'].outputs.retrieved_transaction_id }}
        SNOW_INSTANCE_ID: ${{ github.event.pull_request.state == 'open' && (matrix.path == 'io' && secrets.SNOW_INSTANCE_ID_IO || secrets.SNOW_INSTANCE_ID_STUDIO) || '' }}
        CMR_PATH: ${{ matrix.path }}
      run: |
        python ./.github/workflows/servicenow.py

    - name: Save transaction ID in PR Comments (${{ matrix.path }})
      id: pr-comment-snow-cr-step
      if: steps.cmr_row.outcome == 'success'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
      env:
        TRANSACTION_ID: ${{ steps['create-close-cmr-step'].outputs.transaction_id }}
      with:
        script: |
          const main = (await import('${{ github.workspace }}/.github/workflows/snow-pr-comment.js')).default
          if (process.env.PR_STATE == 'open') {
            main({ github, context, path_identifier: '${{ matrix.path }}' })
          } else {
            console.log('PR is not in an opened state. Skipping...');
          }

    - name: Execute script for notifying Slack of CMR state (${{ matrix.path }})
      id: slack-snow-cr-step
      if: >-
        ${{ steps.cmr_row.outcome == 'success'
        && ((github.event.pull_request.state == 'open' && steps['create-close-cmr-step'].outputs.transaction_id)
        || (github.event.pull_request.state == 'closed' && github.event.pull_request.merged == true
        && steps['retrieve-transactionId-step'].outputs.retrieved_transaction_id)) }}
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
      env:
        RETRIEVED_TRANSACTION_ID: ${{ steps['retrieve-transactionId-step'].outputs.retrieved_transaction_id }}
        TRANSACTION_ID: ${{ steps['create-close-cmr-step'].outputs.transaction_id }}
        CHANGE_ID: ${{ steps['create-close-cmr-step'].outputs.change_id }}
        PLANNED_START_TIME: ${{ steps['create-close-cmr-step'].outputs.planned_start_time }}
        PLANNED_END_TIME: ${{ steps['create-close-cmr-step'].outputs.planned_end_time }}
      with:
        script: |
          const main = (await import('${{ github.workspace }}/.github/workflows/snow-cr-notification.js')).default;
          if (process.env.PR_STATE == 'open') {
            await main({ github, context, path_identifier: '${{ matrix.path }}' });
          } else {
            await main({ github, context, transaction_id: process.env.RETRIEVED_TRANSACTION_ID, path_identifier: '${{ matrix.path }}' });
          }
