name: Lint GitHub Workflows
on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - '.github/workflows/**'

jobs:
    actionlint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install actionlint
              env:
                  ACTIONLINT_VERSION: '1.7.7'
                  ACTIONLINT_SHA256: '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757'
              run: |
                  curl -Lo actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
                  echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum --check
                  tar xzf actionlint.tar.gz actionlint
                  rm actionlint.tar.gz

            - name: Lint all workflow files
              run: ./actionlint -color
