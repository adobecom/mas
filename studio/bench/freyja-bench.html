<!doctype html>
<html>
<head>
    <title>Freyja vs Odin Benchmark</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #1e1e1e; color: #d4d4d4; }
        pre { background: #252526; padding: 1rem; border-radius: 4px; overflow: auto; }
        .label { color: #9cdcfe; } .val { color: #4ec9b0; } .err { color: #f48771; }
        table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
        th, td { border: 1px solid #555; padding: 6px 10px; text-align: right; font-family: monospace; font-size: 13px; }
        th { background: #333; color: #9cdcfe; text-align: center; }
        td:first-child, td:nth-child(2) { text-align: left; }
        .fast { color: #4ec9b0; } .slow { color: #f48771; }
        button { background: #333; color: #d4d4d4; border: 1px solid #555; padding: 6px 12px; cursor: pointer; margin: 0.5rem 0; border-radius: 3px; }
        button:hover { background: #444; }
    </style>
</head>
<body>
<h2>Freyja vs Odin Benchmark</h2>
<pre id="output">Initializing...</pre>
<div id="summary"></div>
<script>
const FREYJA = 'https://preview-p22655-e59433.adobeaemcloud.com/adobe/contentFragments';
const ODIN   = 'https://odinpreview.corp.adobe.com/adobe/sites/cf/fragments';
const RUNS = 3;

const SUITE = [
    { id: '0ef2a804-e788-4959-abb8-b4d96a18b0ef', label: 'Simple fragment', category: 'simple' },
    { id: 'f17d9a60-6205-49f5-8aa4-4f8e662268ed', label: 'Catalog (deep refs)', category: 'catalog' },
];

const MODES = [
    { suffix: '', label: 'bare' },
    { suffix: '?references=all-hydrated', label: 'all-hydrated' },
];

const params = new URLSearchParams(location.search);
const singleId = params.get('id');
const testCases = singleId
    ? [{ id: singleId, label: 'Custom', category: 'custom' }]
    : SUITE;

const TOKEN = sessionStorage.getItem('masFreyjaToken') || '';
const out = document.getElementById('output');
const log = (msg) => { out.textContent += '\n' + msg; console.log(msg); };

async function benchEndpoint(label, baseUrl, fragmentId, query, headers) {
    const timings = [], statuses = [];
    for (let i = 0; i < RUNS; i++) {
        const t0 = performance.now();
        try {
            const r = await fetch(`${baseUrl}/${fragmentId}${query}`, { headers });
            timings.push(Math.round(performance.now() - t0));
            statuses.push(r.status);
        } catch (e) {
            timings.push(null);
            statuses.push('ERR');
        }
    }
    const valid = timings.filter(t => t !== null);
    return {
        label,
        avg_ms: valid.length ? Math.round(valid.reduce((a, b) => a + b, 0) / valid.length) : 'N/A',
        min_ms: valid.length ? Math.min(...valid) : 'N/A',
        max_ms: valid.length ? Math.max(...valid) : 'N/A',
        status: statuses.join(', ')
    };
}

(async () => {
    out.textContent = `Token: ${TOKEN ? TOKEN.substring(0, 40) + '...' : 'MISSING — run: sessionStorage.setItem(\'masFreyjaToken\', window.adobeIMS.getAccessToken().token)'}`;

    if (!TOKEN) {
        log('\n⚠ No token. Freyja will likely return 401. Set sessionStorage.masFreyjaToken first.');
    }

    log('\n── Test URLs ──');
    for (const tc of testCases) {
        log(`  [${tc.category}] ${ODIN}/${tc.id}`);
    }

    const freyjaHeaders = TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {};
    const results = [];

    for (const tc of testCases) {
        for (const mode of MODES) {
            log(`\n[${tc.category}] ${tc.label} — ${mode.label}`);

            const freyja = await benchEndpoint('Freyja', FREYJA, tc.id, mode.suffix, freyjaHeaders);
            log(`  Freyja: avg=${freyja.avg_ms}ms  min=${freyja.min_ms}ms  max=${freyja.max_ms}ms  [${freyja.status}]`);

            const odin = await benchEndpoint('Odin', ODIN, tc.id, mode.suffix, {});
            log(`  Odin:   avg=${odin.avg_ms}ms  min=${odin.min_ms}ms  max=${odin.max_ms}ms  [${odin.status}]`);

            const speedup = (typeof freyja.avg_ms === 'number' && typeof odin.avg_ms === 'number' && freyja.avg_ms > 0)
                ? (odin.avg_ms / freyja.avg_ms).toFixed(1) : 'N/A';
            if (speedup !== 'N/A') log(`  → ${speedup}x speedup`);

            results.push({ category: tc.category, label: tc.label, id: tc.id, mode: mode.label, freyja, odin, speedup });
        }
    }

    renderTable(results);
    console.table(results.map(r => ({
        category: r.category, mode: r.mode,
        freyja_avg: r.freyja.avg_ms, odin_avg: r.odin.avg_ms, speedup: r.speedup
    })));
    log('\nDone. See summary table below. Call window.rerun() to run again.');
    window.rerun = () => location.reload();
})();

function renderTable(results) {
    const summary = document.getElementById('summary');
    const table = document.createElement('table');
    const thead = document.createElement('tr');
    ['Category', 'Mode', 'Freyja avg', 'Odin avg', 'Speedup'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        thead.appendChild(th);
    });
    table.appendChild(thead);

    for (const r of results) {
        const tr = document.createElement('tr');
        const cells = [r.category, r.mode, `${r.freyja.avg_ms}ms`, `${r.odin.avg_ms}ms`, `${r.speedup}x`];
        cells.forEach((text, i) => {
            const td = document.createElement('td');
            td.textContent = text;
            if (i === 4 && r.speedup !== 'N/A') {
                td.className = parseFloat(r.speedup) >= 1 ? 'fast' : 'slow';
            }
            tr.appendChild(td);
        });
        table.appendChild(tr);
    }
    summary.appendChild(table);

    const btn = document.createElement('button');
    btn.textContent = 'Copy as Markdown';
    btn.addEventListener('click', () => {
        const lines = ['| Category | Mode | Freyja avg | Odin avg | Speedup |', '|---|---|---|---|---|'];
        for (const r of results) {
            lines.push(`| ${r.category} | ${r.mode} | ${r.freyja.avg_ms}ms | ${r.odin.avg_ms}ms | ${r.speedup}x |`);
        }
        lines.push('', 'Test URLs:');
        for (const tc of testCases) {
            lines.push(`- [${tc.category}] \`${ODIN}/${tc.id}\``);
        }
        navigator.clipboard.writeText(lines.join('\n'));
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy as Markdown'; }, 1500);
    });
    summary.appendChild(btn);
}
</script>
</body>
</html>
