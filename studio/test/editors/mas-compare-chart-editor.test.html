<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>mas-compare-chart-editor test page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="https://www.adobe.com/libs/styles/styles.css" />
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { html } from 'lit';
            import { fixture } from '@open-wc/testing-helpers/pure';

            import '../../src/swc.js';
            import '../../src/editors/mas-compare-chart-editor.js';
            import '../../../web-components/src/commerce.js';
            import '../../../web-components/src/mas-commerce-service.js';
            import '../../../web-components/src/mas-compare-chart.js';
            import { mockIms } from '../../../web-components/test/mocks/ims.js';
            import { mockLana } from '../../../web-components/test/mocks/lana.js';
            import { mockFetch } from '../../../web-components/test/mocks/fetch.js';
            import { withAem } from '../../../web-components/test/mocks/aem.js';
            import { withWcs } from '../../../web-components/test/mocks/wcs.js';
            import { CARD_MODEL_PATH, COLLECTION_MODEL_PATH, COMPARE_CHART_FIELD } from '../../src/constants.js';
            import Store from '../../src/store.js';
            import generateFragmentStore from '../../src/reactivity/source-fragment-store.js';

            const fixtureHost = () => document.querySelector('sp-theme');
            const nextFrame = () => new Promise((resolve) => requestAnimationFrame(resolve));
            const withWebComponentsMocks = (mock) => (originalFetch) =>
                mock((resource, options) => {
                    const path = String(resource);
                    if (path.startsWith('/test/mocks/offers.json') || path.startsWith('/test/mocks/sites/')) {
                        return originalFetch(`/__wds-outside-root__/1/web-components${path}`, options);
                    }
                    return originalFetch(resource, options);
                });

            mockIms();
            mockLana();
            await mockFetch(withWebComponentsMocks(withWcs), withWebComponentsMocks(withAem));

            const compareChartExpressSource = await fetch(
                '/__wds-outside-root__/1/web-components/test/mocks/sites/fragments/compare-chart-express.json',
            ).then((response) => response.json());

            const getField = (fragment, fieldName) => fragment.fields.find((field) => field.name === fieldName);
            const getFieldValues = (fragment, fieldName) => getField(fragment, fieldName)?.values || [];
            const getFieldValue = (fragment, fieldName, index = 0) => getFieldValues(fragment, fieldName)[index];
            const upsertField = (fragment, name, values, multiple = false) => {
                const field = getField(fragment, name);
                if (field) {
                    field.values = values;
                    field.multiple = multiple;
                    return;
                }
                fragment.fields.push({ name, values, multiple });
            };
            const inferModelPath = (fields) => ('cards' in fields ? COLLECTION_MODEL_PATH : CARD_MODEL_PATH);
            const referencedPath = (source, value) => {
                const reference = source.references?.[value];
                return reference?.type === 'content-fragment' ? reference.value.path : value;
            };
            const normalizeField = (source, [name, rawValue]) => {
                if (Array.isArray(rawValue)) {
                    return { name, values: rawValue.map((value) => referencedPath(source, value)), multiple: true };
                }
                if (rawValue && typeof rawValue === 'object' && ('value' in rawValue || 'mimeType' in rawValue)) {
                    return {
                        name,
                        values: 'value' in rawValue ? [rawValue.value] : [],
                        mimeType: rawValue.mimeType,
                        multiple: false,
                    };
                }
                return { name, values: [rawValue], multiple: false };
            };
            const toStudioFragment = (source) => {
                const fields = Object.entries(source.fields || {}).map((field) => normalizeField(source, field));
                const fragment = {
                    id: source.id,
                    path: source.path,
                    title: source.title,
                    status: source.status || 'PUBLISHED',
                    model: { path: inferModelPath(source.fields || {}) },
                    tags: source.tags || [],
                    fields,
                    references: Object.values(source.references || {})
                        .filter((reference) => reference?.type === 'content-fragment' && reference.value)
                        .map((reference) => toStudioFragment(reference.value)),
                };

                if (fragment.model.path === CARD_MODEL_PATH && !getFieldValue(fragment, 'osi')) {
                    const pricesMarkup = getFieldValue(fragment, 'prices') || '';
                    const wcsOsi = pricesMarkup.match(/data-wcs-osi="([^"]+)"/)?.[1];
                    if (wcsOsi) upsertField(fragment, 'osi', [wcsOsi]);
                }
                return fragment;
            };

            const compareChartSeed = toStudioFragment(compareChartExpressSource);
            const value = getFieldValue(compareChartSeed, COMPARE_CHART_FIELD);
            const cardPaths = getFieldValues(compareChartSeed, 'cards');
            const columns = cardPaths.map((path) => {
                const fragment = compareChartSeed.references.find((reference) => reference.path === path);
                return {
                    path,
                    title: getFieldValue(fragment, 'cardTitle') || fragment.title,
                    fragment,
                    features: getFieldValues(fragment, 'features'),
                };
            });
            const firstCardOsi = getFieldValue(columns[0].fragment, 'osi');
            const tooltipTitlesInValue = [...value.matchAll(/title="([^"]+)"/g)].map((match) => match[1]);

            const visibleVariationPath = columns[0].path.replace('/en_US/', '/en_IE/');
            const visibleVariationTitle = `${columns[0].title} AU`;
            const visibleVariation = structuredClone(columns[0].fragment);
            visibleVariation.id = `${visibleVariation.id}-au`;
            visibleVariation.path = visibleVariationPath;
            visibleVariation.title = visibleVariationTitle;
            upsertField(visibleVariation, 'cardTitle', [visibleVariationTitle]);
            upsertField(visibleVariation, 'prices', ['<span>€24.99/mo</span>']);
            upsertField(visibleVariation, 'description', ['<p>Localized Adobe Express offer.</p>']);
            upsertField(visibleVariation, 'ctas', [
                '<a class="accent" href="#" data-wcs-osi="Iddp6yEOwCAU2QYDNZOOt0PD3iao4vXSV_sykYck7XQ">Buy now</a>',
            ]);
            upsertField(visibleVariation, 'osi', ['Iddp6yEOwCAU2QYDNZOOt0PD3iao4vXSV_sykYck7XQ']);
            visibleVariation.tags = [
                { id: 'mas:product_code/adobe-express', title: columns[0].title },
                { id: 'mas:offer_type/base', title: 'Base' },
            ];
            upsertField(visibleVariation, 'pznTags', ['mas:pzn/country/en_AU'], true);
            upsertField(columns[0].fragment, 'variations', [visibleVariationPath], true);
            columns[0].fragment.references = [...(columns[0].fragment.references || []), visibleVariation];

            runTests(async () => {
                describe('mas-compare-chart-editor', () => {
                    it('renders three cards, sections, features, and authored feature tooltips', async () => {
                        const fragmentStore = generateFragmentStore(structuredClone(compareChartSeed));
                        const el = await fixture(
                            html`<mas-compare-chart-editor .fragmentStore=${fragmentStore}></mas-compare-chart-editor>`,
                            { parentNode: fixtureHost() },
                        );
                        for (let i = 0; i < 10; i += 1) {
                            await el.updateComplete;
                            await nextFrame();
                            if (el.shadowRoot.querySelectorAll('.compchart-card-row').length === 3) break;
                        }

                        expect(el.editorView).to.equal('edit');
                        expect(el.shadowRoot.querySelector('.compchart-grid')).to.exist;
                        expect(el.shadowRoot.querySelector('.compchart-preview-grid')).to.not.exist;
                        expect(el.shadowRoot.querySelectorAll('.compchart-card-row')).to.have.lengthOf(3);
                        expect(el.shadowRoot.querySelectorAll('.compchart-group-header').length).to.be.greaterThan(5);
                        expect(el.shadowRoot.querySelectorAll('.compchart-row-label')).to.have.lengthOf(4);
                        const editHeaders = [...el.shadowRoot.querySelectorAll('.compchart-header-cell')].map((node) =>
                            node.textContent.trim(),
                        );
                        expect(editHeaders).to.include(columns[0].title);
                        expect(editHeaders).to.include(columns[1].title);
                        expect(editHeaders).to.include(columns[2].title);
                        expect(el.shadowRoot.querySelector('.compchart-cards-table').textContent).to.not.include(firstCardOsi);
                        expect(el.effectiveValue).to.include('<div name="adobe-apps">');
                        expect(el.effectiveValue).to.include('<div name="generative-ai">');
                        expect(el.effectiveValue).to.not.include('<merch-card');

                        el.shadowRoot.querySelector('.compchart-card-row sp-action-button[label="Expand row"]').click();
                        let variationPanel;
                        for (let i = 0; i < 10; i += 1) {
                            await el.updateComplete;
                            await nextFrame();
                            variationPanel = el.shadowRoot.querySelector('.compchart-card-variation-panel');
                            if (variationPanel?.textContent.includes('€24.99/mo')) break;
                        }
                        expect(variationPanel).to.exist;
                        expect(variationPanel.textContent).to.include('Locale (1)');
                        expect(variationPanel.textContent).to.include(visibleVariationTitle);
                        expect(variationPanel.textContent).to.include('Base');
                        expect(variationPanel.textContent).to.include('€24.99/mo');
                        el.shadowRoot.querySelector('.compchart-card-variation-row').click();
                        await el.updateComplete;
                        await nextFrame();
                        expect(el.effectiveColumns[0].path).to.equal(visibleVariationPath);

                        el.shadowRoot.querySelector('.compchart-chevron').click();
                        await el.updateComplete;
                        expect(el.effectiveValue).to.include('expanded-groups="none"');
                        el.shadowRoot.querySelector('.compchart-chevron').click();
                        await el.updateComplete;
                        expect(el.effectiveValue).to.include('expanded-groups="1"');

                        el.shadowRoot.querySelector('.editor-view-toggle button[role="tab"]:last-child').click();
                        await el.updateComplete;
                        let chart;
                        for (let i = 0; i < 10; i += 1) {
                            await nextFrame();
                            chart = el.querySelector('[slot="compare-chart-preview"] mas-compare-chart');
                            if (chart?.querySelector(':scope > aem-fragment')) break;
                        }

                        const preview = el.shadowRoot.querySelector('.compchart-preview');
                        expect(el.editorView).to.equal('preview');
                        expect(el.shadowRoot.querySelector('.compchart-grid')).to.not.exist;
                        expect(preview, 'preview container').to.exist;
                        expect(chart, 'preview chart').to.exist;
                        expect(chart.hasAttribute('consonant')).to.be.true;
                        expect(preview.querySelector('mas-compare-chart')).to.not.exist;
                        expect(chart.querySelector(':scope > aem-fragment'), 'preview aem fragment').to.exist;
                        expect(await chart.checkReady()).to.be.true;
                        await chart.updateComplete;
                        await nextFrame();

                        expect(chart.shadowRoot).to.exist;
                        expect(
                            chart.querySelectorAll(':scope > merch-card[slot="cards"] > aem-fragment[author][loading="cache"]'),
                        ).to.have.lengthOf(3);
                        expect(chart.querySelector(':scope > merch-card[slot="cards"]:not([data-compare-chart-generated])')).to.not.exist;
                        expect(chart.querySelector(':scope > div[name]:not([data-compare-chart-generated])')).to.not.exist;
                        const previewText = chart.shadowRoot.textContent.replace(/\s+/g, ' ').trim();
                        expect(previewText).to.include(visibleVariationTitle);
                        expect(previewText).to.include(columns[1].title);
                        expect(previewText).to.include(columns[2].title);
                        expect(previewText).to.include('Adobe apps');
                        expect(previewText).to.include('Seamless integration');
                        expect(previewText).to.include('Generative AI');
                        expect(previewText).to.include('Generate Presentations');
                        const ctas = [...chart.querySelectorAll(':scope > [slot$="-cta"]')];
                        expect(ctas).to.have.lengthOf(3);
                        expect(ctas.map((cta) => cta.textContent.trim())).to.include('Buy now');
                        expect(ctas.some((cta) => cta.textContent.includes('{{'))).to.be.false;
                        expect(
                            ctas.every(
                                (cta) =>
                                    cta.getAttribute('data-navigation-url') ||
                                    cta.getAttribute('data-href') ||
                                    cta.getAttribute('href'),
                            ),
                        ).to.be.true;
                        expect(ctas.some((cta) => cta.getAttribute('data-href')?.includes('commerce-stg.adobe.com'))).to.be
                            .true;
                        const tooltipLinks = [...chart.querySelectorAll('a.secondary-link[title]')];
                        expect(tooltipLinks.length).to.be.greaterThan(10);
                        expect(tooltipLinks.map((link) => link.getAttribute('title'))).to.include(tooltipTitlesInValue[0]);
                        expect(chart.shadowRoot.querySelectorAll('.tooltip-wrapper').length).to.be.greaterThan(10);
                        expect(chart.shadowRoot.querySelectorAll('.tooltip-trigger').length).to.be.greaterThan(10);
                    });

                    it('uses mas-items-selector and accepts pasted merch-card Studio URLs', async () => {
                        const fragmentStore = generateFragmentStore(structuredClone(compareChartSeed));
                        const pastedCard = structuredClone(columns[0].fragment);
                        const pastedId = 'e7563f87-7cf6-4126-b395-e4dc78b9099e';
                        const pastedPath = pastedCard.path.replace('/cards/', '/cards/pasted-');
                        pastedCard.id = pastedId;
                        pastedCard.path = pastedPath;
                        pastedCard.title = 'Pasted card';
                        upsertField(pastedCard, 'cardTitle', ['Pasted card']);

                        const repository = {
                            searchFragments: () => {
                                Store.fragments.list.data.set(columns.map((column) => generateFragmentStore(column.fragment)));
                                Store.fragments.list.firstPageLoaded.set(true);
                            },
                            aem: {
                                getFragmentByPath: async (path) =>
                                    [...columns.map((column) => column.fragment), pastedCard].find(
                                        (fragment) => fragment.path === path,
                                    ),
                                sites: {
                                    cf: {
                                        fragments: {
                                            getById: async (id) => (id === pastedId ? pastedCard : null),
                                        },
                                    },
                                },
                            },
                        };
                        const originalQuerySelector = document.querySelector.bind(document);
                        document.querySelector = (selector) =>
                            selector === 'mas-repository' ? repository : originalQuerySelector(selector);

                        try {
                            const el = await fixture(
                                html`<mas-compare-chart-editor .fragmentStore=${fragmentStore}></mas-compare-chart-editor>`,
                                { parentNode: fixtureHost() },
                            );
                            await el.updateComplete;

                            el.shadowRoot.querySelector('.compchart-cards-header sp-button').click();
                            await el.updateComplete;
                            const selector = el.shadowRoot.querySelector('mas-items-selector');
                            expect(selector).to.exist;

                            await selector.updateComplete;
                            const spSearch = selector.shadowRoot.querySelector('sp-search');
                            spSearch.value = `https://mas.adobe.com/studio.html#content-type=merch-card&page=content&path=sandbox&query=${pastedId}`;
                            spSearch.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
                            let row;
                            for (let i = 0; i < 10; i += 1) {
                                await selector.updateComplete;
                                const table = selector.shadowRoot.querySelector('mas-select-items-table');
                                await table?.updateComplete;
                                await nextFrame();
                                row = table?.shadowRoot.querySelector('mas-collapsible-table-row');
                                if (row) break;
                            }

                            expect(spSearch.value).to.equal('');
                            expect(row).to.exist;
                            await row.updateComplete;
                            row.shadowRoot.querySelector('sp-checkbox').click();
                            await selector.updateComplete;
                            el.shadowRoot
                                .querySelector('.compchart-items-selector-dialog sp-button[variant="accent"]')
                                .click();
                            await el.updateComplete;

                            expect(fragmentStore.get().getFieldValues('cards')).to.include(pastedPath);
                        } finally {
                            document.querySelector = originalQuerySelector;
                        }
                    });
                });
            });
        </script>
        <main>
            <mas-commerce-service env="stage"></mas-commerce-service>
            <sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme>
        </main>
    </body>
</html>
