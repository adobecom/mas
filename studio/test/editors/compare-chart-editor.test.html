<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>compare-chart-editor test page</title>
        <meta name="nofollow-links" content="on" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../../style.css" />
        <style>
            body {
                margin: 32px;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: white;
            }

            main {
                width: 100%;
                padding: 0 100px;
            }

            compare-chart-editor {
                max-width: 1000px;
            }

            sp-theme {
                display: contents;
            }
        </style>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { delay } from '../utils.js';

            import '../../src/swc.js';
            import '../../src/editors/compare-chart-editor.js';
            import { Fragment } from '../../src/aem/fragment.js';
            import { FragmentStore } from '../../src/reactivity/fragment-store.js';
            import { COMPARE_CHART_MODEL_PATH } from '../../src/constants.js';

            function createMockChartFragment() {
                return {
                    id: 'compare-chart-001',
                    title: 'Compare Chart',
                    name: 'compare-chart',
                    path: '/content/dam/mas/sandbox/en_US/compare-chart',
                    model: {
                        path: COMPARE_CHART_MODEL_PATH,
                        title: 'Compare Chart',
                    },
                    status: 'DRAFT',
                    fields: [
                        {
                            name: 'fragments',
                            type: 'content-fragment',
                            multiple: true,
                            values: [
                                '/content/dam/mas/sandbox/en_US/col-1',
                                '/content/dam/mas/sandbox/en_US/col-2',
                                '/content/dam/mas/sandbox/en_US/col-3',
                            ],
                        },
                        {
                            name: 'sections',
                            type: 'content-fragment',
                            multiple: true,
                            values: ['/content/dam/mas/sandbox/en_US/sec-1'],
                        },
                    ],
                    references: [
                        {
                            id: 'col-1',
                            path: '/content/dam/mas/sandbox/en_US/col-1',
                            title: 'Column 1',
                            fields: [
                                {
                                    name: 'fragment',
                                    type: 'content-fragment',
                                    values: ['/content/dam/mas/sandbox/en_US/card-1'],
                                },
                                {
                                    name: 'fields',
                                    type: 'text',
                                    multiple: true,
                                    values: ['cardTitle'],
                                },
                                {
                                    name: 'badge',
                                    type: 'text',
                                    values: [''],
                                },
                            ],
                        },
                        {
                            id: 'col-2',
                            path: '/content/dam/mas/sandbox/en_US/col-2',
                            title: 'Column 2',
                            fields: [
                                {
                                    name: 'fragment',
                                    type: 'content-fragment',
                                    values: ['/content/dam/mas/sandbox/en_US/card-2'],
                                },
                                {
                                    name: 'fields',
                                    type: 'text',
                                    multiple: true,
                                    values: ['cardTitle'],
                                },
                                {
                                    name: 'badge',
                                    type: 'text',
                                    values: [''],
                                },
                            ],
                        },
                        {
                            id: 'col-3',
                            path: '/content/dam/mas/sandbox/en_US/col-3',
                            title: 'Column 3',
                            fields: [
                                {
                                    name: 'fragment',
                                    type: 'content-fragment',
                                    values: ['/content/dam/mas/sandbox/en_US/card-3'],
                                },
                                {
                                    name: 'fields',
                                    type: 'text',
                                    multiple: true,
                                    values: ['cardTitle'],
                                },
                                {
                                    name: 'badge',
                                    type: 'text',
                                    values: [''],
                                },
                            ],
                        },
                        {
                            id: 'card-1',
                            path: '/content/dam/mas/sandbox/en_US/card-1',
                            title: 'Card 1',
                            fields: [{ name: 'cardTitle', type: 'text', values: ['Acrobat Standard'] }],
                        },
                        {
                            id: 'card-2',
                            path: '/content/dam/mas/sandbox/en_US/card-2',
                            title: 'Card 2',
                            fields: [{ name: 'cardTitle', type: 'text', values: ['Acrobat Pro'] }],
                        },
                        {
                            id: 'card-3',
                            path: '/content/dam/mas/sandbox/en_US/card-3',
                            title: 'Card 3',
                            fields: [{ name: 'cardTitle', type: 'text', values: ['Acrobat Max'] }],
                        },
                        {
                            id: 'sec-1',
                            path: '/content/dam/mas/sandbox/en_US/sec-1',
                            title: 'Section 1',
                            fields: [
                                { name: 'sectionTitle', type: 'text', values: ['Create PDFs'] },
                                {
                                    name: 'rows',
                                    type: 'content-fragment',
                                    multiple: true,
                                    values: ['/content/dam/mas/sandbox/en_US/row-1'],
                                },
                            ],
                        },
                        {
                            id: 'row-1',
                            path: '/content/dam/mas/sandbox/en_US/row-1',
                            title: 'Row 1',
                            fields: [
                                { name: 'rowTitle', type: 'long-text', values: ['Combine files'] },
                                {
                                    name: 'rowValues',
                                    type: 'content-fragment',
                                    multiple: true,
                                    values: [
                                        '/content/dam/mas/sandbox/en_US/val-1',
                                        '/content/dam/mas/sandbox/en_US/val-2',
                                    ],
                                },
                            ],
                        },
                        {
                            id: 'val-1',
                            path: '/content/dam/mas/sandbox/en_US/val-1',
                            title: 'Value 1',
                            fields: [{ name: 'valueType', type: 'enumeration', values: ['true'] }],
                        },
                        {
                            id: 'val-2',
                            path: '/content/dam/mas/sandbox/en_US/val-2',
                            title: 'Value 2',
                            fields: [{ name: 'valueType', type: 'enumeration', values: ['false'] }],
                        },
                    ],
                };
            }

            runTests(async () => {
                describe('compare-chart-editor custom element', async () => {
                    let editor;
                    let repository;
                    let createCounter = 0;

                    async function selectCell(sectionIndex, rowIndex, cellIndex) {
                        const preview = editor.querySelector('compare-chart-preview');
                        preview.dispatchEvent(
                            new CustomEvent('cell-click', {
                                detail: { sectionIndex, rowIndex, cellIndex },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await delay(30);
                        await editor.updateComplete;
                    }

                    beforeEach(async () => {
                        document.querySelector('compare-chart-editor')?.remove();
                        document.querySelector('mas-repository')?.remove();
                        createCounter = 0;

                        repository = document.createElement('mas-repository');
                        repository.createFragment = async (payload) => {
                            createCounter += 1;
                            return {
                                id: `generated-${createCounter}`,
                                path: `/content/dam/mas/sandbox/en_US/generated-${createCounter}`,
                                title: payload.title,
                                name: payload.name,
                                fields: payload.fields || [],
                            };
                        };
                        repository.aem = {
                            sites: {
                                cf: {
                                    fragments: {
                                        save: async (fragment) => fragment,
                                        getByPath: async () => null,
                                        getById: async () => null,
                                    },
                                },
                            },
                        };
                        repository.refreshFragment = async () => {};
                        document.querySelector('main').appendChild(repository);

                        editor = document.createElement('compare-chart-editor');
                        const fragment = new Fragment(createMockChartFragment());
                        editor.fragmentStore = new FragmentStore(fragment);
                        editor.updateFragment = () => {};
                        document.querySelector('main').appendChild(editor);

                        await delay(60);
                        await editor.updateComplete;
                    });

                    afterEach(() => {
                        editor?.remove();
                        repository?.remove();
                    });

                    it('shows boolean mode for a true value cell', async () => {
                        await selectCell(0, 0, 0);

                        const picker = editor.querySelector('#cell-type');
                        const checkbox = editor.querySelector('sp-checkbox');
                        expect(picker).to.exist;
                        expect(picker.value).to.equal('boolean');
                        expect(checkbox).to.exist;
                        expect(checkbox.checked).to.equal(true);
                    });

                    it('persists false when boolean checkbox is unchecked', async () => {
                        await selectCell(0, 0, 0);

                        const checkbox = editor.querySelector('sp-checkbox');
                        checkbox.checked = false;
                        checkbox.dispatchEvent(new Event('change', { bubbles: true, composed: true }));

                        await delay(30);
                        await editor.updateComplete;

                        expect(editor.sections[0].rows[0].values[0].valueType).to.equal('false');
                    });

                    it('switches to text mode and saves free text', async () => {
                        await selectCell(0, 0, 0);

                        const picker = editor.querySelector('#cell-type');
                        picker.value = 'text';
                        picker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        await delay(30);
                        await editor.updateComplete;

                        const textfield = editor.querySelector('#cell-text-value');
                        textfield.value = '1000 GB';
                        textfield.dispatchEvent(new Event('change', { bubbles: true, composed: true }));

                        await delay(30);
                        await editor.updateComplete;

                        expect(editor.sections[0].rows[0].values[0].valueType).to.equal('1000 GB');
                    });

                    it('creates missing cell value when selecting an empty placeholder cell', async () => {
                        await selectCell(0, 0, 2);

                        const picker = editor.querySelector('#cell-type');
                        expect(picker.value).to.equal('empty');

                        picker.value = 'boolean';
                        picker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        await delay(30);
                        await editor.updateComplete;

                        const row = editor.sections[0].rows[0];
                        expect(row.values.length).to.equal(3);
                        expect(row.values[2].valueType).to.equal('false');
                    });

                    it('shows text input immediately after switching empty cell to text mode', async () => {
                        await selectCell(0, 0, 2);

                        const picker = editor.querySelector('#cell-type');
                        picker.value = 'text';
                        picker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));

                        await delay(30);
                        await editor.updateComplete;

                        const textfield = editor.querySelector('#cell-text-value');
                        expect(textfield).to.exist;
                    });

                    it('renders false values as cross in the preview', async () => {
                        await delay(30);
                        const preview = editor.querySelector('compare-chart-preview');
                        await preview.updateComplete;

                        const cross = preview.shadowRoot.querySelector('.crossmark');
                        expect(cross).to.exist;
                    });
                });
            });
        </script>
        <main>
            <sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme>
        </main>
    </body>
</html>
