<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>M@S Studio — Claude Design Prototype</title>

        <!--
            M@S Studio Design System Shell
            ================================
            This file is the base for every Claude Design prototype for M@S Studio.
            It mirrors the sp-theme configuration and SWC bundle from studio.html.

            When studio.html's importmap or sp-theme attributes change, update this file manually
            to stay in sync. The sync.js script checks components.md but does not regenerate this file.

            To generate a prototype:
            1. Use scaffold.html as your base
            2. Fill the <main> element with Studio UI
            3. Components must come from components.md only
            4. Follow all rules in patterns.md
        -->

        <!-- Spectrum CSS tokens — global design token foundation -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@spectrum-css/tokens@14.6.0/dist/index.css"
        />

        <!-- SWC importmap — mirrors studio.html -->
        <script type="importmap">
            {
                "imports": {
                    "@spectrum-web-components/": "https://cdn.jsdelivr.net/npm/@spectrum-web-components/",
                    "lit": "https://cdn.jsdelivr.net/npm/lit@3/index.js",
                    "lit/directives/unsafe-html.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/unsafe-html.js",
                    "lit/directives/repeat.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/repeat.js",
                    "lit/directives/nothing.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/nothing.js"
                }
            }
        </script>

        <!-- SWC component registry — same set as studio/src/swc.js -->
        <script type="module">
            import '@spectrum-web-components/theme/sp-theme.js';
            import '@spectrum-web-components/theme/spectrum-two/scale-medium-core-tokens.js';
            import '@spectrum-web-components/theme/spectrum-two/scale-large-core-tokens.js';
            import '@spectrum-web-components/theme/spectrum-two/theme-light-core-tokens.js';
            import '@spectrum-web-components/theme/spectrum-two/theme-dark-core-tokens.js';
            import '@spectrum-web-components/action-bar/sp-action-bar.js';
            import '@spectrum-web-components/action-button/sp-action-button.js';
            import '@spectrum-web-components/action-group/sp-action-group.js';
            import '@spectrum-web-components/action-menu/sp-action-menu.js';
            import '@spectrum-web-components/badge/sp-badge.js';
            import '@spectrum-web-components/breadcrumbs/sp-breadcrumb-item.js';
            import '@spectrum-web-components/breadcrumbs/sp-breadcrumbs.js';
            import '@spectrum-web-components/button-group/sp-button-group.js';
            import '@spectrum-web-components/button/sp-button.js';
            import '@spectrum-web-components/checkbox/sp-checkbox.js';
            import '@spectrum-web-components/combobox/sp-combobox.js';
            import '@spectrum-web-components/dialog/sp-dialog-wrapper.js';
            import '@spectrum-web-components/dialog/sp-dialog.js';
            import '@spectrum-web-components/divider/sp-divider.js';
            import '@spectrum-web-components/field-group/sp-field-group.js';
            import '@spectrum-web-components/field-label/sp-field-label.js';
            import '@spectrum-web-components/help-text/sp-help-text.js';
            import '@spectrum-web-components/icon/sp-icon.js';
            import '@spectrum-web-components/illustrated-message/sp-illustrated-message.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-add.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-alert.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-close.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-delete.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-edit.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-filter.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-more.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-preview.js';
            import '@spectrum-web-components/icons-workflow/icons/sp-icon-publish.js';

            import '@spectrum-web-components/number-field/sp-number-field.js';
            import '@spectrum-web-components/overlay/overlay-trigger.js';
            import '@spectrum-web-components/overlay/sp-overlay.js';
            import '@spectrum-web-components/picker/sp-picker.js';
            import '@spectrum-web-components/popover/sp-popover.js';
            import '@spectrum-web-components/progress-circle/sp-progress-circle.js';
            import '@spectrum-web-components/radio/sp-radio-group.js';
            import '@spectrum-web-components/radio/sp-radio.js';
            import '@spectrum-web-components/search/sp-search.js';
            import '@spectrum-web-components/sidenav/sp-sidenav-heading.js';
            import '@spectrum-web-components/sidenav/sp-sidenav-item.js';
            import '@spectrum-web-components/sidenav/sp-sidenav.js';
            import '@spectrum-web-components/status-light/sp-status-light.js';
            import '@spectrum-web-components/switch/sp-switch.js';
            import '@spectrum-web-components/table/sp-table-body.js';
            import '@spectrum-web-components/table/sp-table-cell.js';
            import '@spectrum-web-components/table/sp-table-checkbox-cell.js';
            import '@spectrum-web-components/table/sp-table-head-cell.js';
            import '@spectrum-web-components/table/sp-table-head.js';
            import '@spectrum-web-components/table/sp-table-row.js';
            import '@spectrum-web-components/table/sp-table.js';
            import '@spectrum-web-components/tabs/sp-tab-panel.js';
            import '@spectrum-web-components/tabs/sp-tab.js';
            import '@spectrum-web-components/tabs/sp-tabs.js';
            import '@spectrum-web-components/tags/sp-tag.js';
            import '@spectrum-web-components/tags/sp-tags.js';
            import '@spectrum-web-components/textfield/sp-textfield.js';
            import '@spectrum-web-components/toast/sp-toast.js';
            import '@spectrum-web-components/tooltip/sp-tooltip.js';
            import '@spectrum-web-components/top-nav/sp-top-nav-item.js';
            import '@spectrum-web-components/top-nav/sp-top-nav.js';
            import '@spectrum-web-components/underlay/sp-underlay.js';
        </script>

        <style>
            body {
                margin: 0;
                padding: 0;
                background: var(--spectrum-gray-50);
                font-family: var(--spectrum-font-family-base);
            }

            sp-theme {
                display: block;
                min-height: 100vh;
            }

            main {
                padding: var(--spectrum-spacing-600);
            }
        </style>
    </head>
    <body>
        <!-- sp-theme wraps ALL Studio UI. system="spectrum-two" is required. -->
        <sp-theme system="spectrum-two" color="light" scale="medium">
            <main>
                <!-- Claude Design: replace this comment with generated Studio UI -->
            </main>
        </sp-theme>
    </body>
</html>
