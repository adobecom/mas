name: Auto-label trivial PRs

on:
    pull_request:
        branches:
            - main
        types: [opened, synchronize]

permissions:
    pull-requests: write
    contents: read

jobs:
    label-trivial:
        name: Detect readme-only changes
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check if PR only changes readme files
              id: check
              env:
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
              run: |
                  git fetch origin "${BASE_REF}"
                  CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
                  if [ -z "$CHANGED" ]; then
                      echo "trivial=false" >> "$GITHUB_OUTPUT"
                  else
                      NON_README=$(echo "$CHANGED" | grep -vE '^(.*\/)?[Rr][Ee][Aa][Dd][Mm][Ee]\.md$' || true)
                      if [ -z "$NON_README" ]; then
                          echo "trivial=true" >> "$GITHUB_OUTPUT"
                      else
                          echo "trivial=false" >> "$GITHUB_OUTPUT"
                      fi
                  fi

            - name: Add trivial label
              if: steps.check.outputs.trivial == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  gh label create "trivial" --color "#e4e669" --description "PR only contains readme changes" --force
                  gh pr edit "$PR_NUMBER" --add-label "trivial"

            - name: Remove trivial label if PR is no longer readme-only
              if: steps.check.outputs.trivial == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: gh pr edit "$PR_NUMBER" --remove-label "trivial" || true
