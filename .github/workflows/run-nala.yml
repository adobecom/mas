name: Run Nala Tests

on:
    pull_request:
        branches:
            - main
        types: [opened, synchronize, labeled, unlabeled]

# Prevent multiple runs from happening at the same time
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    nala-gate:
        name: Nala Gate
        runs-on: ubuntu-latest
        steps:
            - name: Require 'run nala' label
              # Only enforce label requirement for synchronize events, not when PR is first opened
              if: |
                  github.event.action != 'opened' &&
                  !contains(github.event.pull_request.labels.*.name, 'run nala')
              run: |
                  echo "::error::Add the 'run nala' label to merge this PR"
                  exit 1

    run-nala-studio-tests:
        name: Running Nala Studio [${{ matrix.shard }}] E2E UI Tests
        needs: nala-gate
        if: |
            github.event.action == 'opened' ||
            contains(github.event.pull_request.labels.*.name, 'run nala')
        runs-on: [self-hosted, Linux, X64, nala-studio]
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - shard: acom-ahome
                      node-version: 20.x
                      dirs: nala/studio/acom nala/studio/ahome
                    - shard: ccd-commerce
                      node-version: 20.x
                      dirs: nala/studio/ccd nala/studio/commerce
                    - shard: rest
                      node-version: 20.x
                      # dirs intentionally omitted — auto-discovered at runtime
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Resolve shard directories
              run: |
                  if [ -n "${{ matrix.dirs }}" ]; then
                    echo "SHARD_DIRS=${{ matrix.dirs }}" >> $GITHUB_ENV
                  else
                    # Shard 3 catch-all: every studio dir/file not claimed by shards 1-2.
                    # New directories are automatically included here — no workflow change needed.
                    CLAIMED="nala/studio/acom nala/studio/ahome nala/studio/ccd nala/studio/commerce"
                    DIRS=""
                    for path in nala/studio/*/; do
                      dir="${path%/}"
                      echo "$CLAIMED" | grep -qw "$dir" || DIRS="$DIRS $dir"
                    done
                    for f in nala/studio/*.test.js; do
                      [ -f "$f" ] && DIRS="$DIRS $f"
                    done
                    echo "SHARD_DIRS=$(echo $DIRS | xargs)" >> $GITHUB_ENV
                  fi

            - name: Set up Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
                  cache-dependency-path: |
                      **/package-lock.json
                      **/yarn.lock

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              continue-on-error: true
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/playwright.config.js') }}

            - name: Install Playwright system dependencies
              uses: ./.github/actions/prep-apt

            - name: Install/verify Playwright browsers
              run: |
                  npx playwright install

            - name: Set execute permission for gh.run.sh
              run: chmod +x ./nala/utils/gh.run.sh

            - name: Run Nala Studio Tests via gh.run.sh
              run: ./nala/utils/gh.run.sh
              env:
                  labels: "@mas-studio ${{ join(github.event.pull_request.labels.*.name, ' ') }}"
                  branch: ${{ github.event.pull_request.head.ref }}
                  repoName: ${{ github.repository }}
                  prUrl: ${{ github.event.pull_request.head.repo.html_url }}
                  prOrg: ${{ github.event.pull_request.head.repo.owner.login }}
                  prRepo: ${{ github.event.pull_request.head.repo.name }}
                  prBranch: ${{ github.event.pull_request.head.ref }}
                  prBaseBranch: ${{ github.event.pull_request.base.ref }}
                  GITHUB_ACTION_PATH: ${{ github.workspace }}
                  IMS_EMAIL: ${{ secrets.IMS_EMAIL }}
                  IMS_PASS: ${{ secrets.IMS_PASS }}
                  FORCE_COLOR: 3 # Force color output
                  # All runners share the same NAT IP (200 RPS EDS budget total).
                  # Budget split: studio 135 RPS + docs 45 RPS = 180 RPS.
                  # Per studio runner: 135/3 = 45 RPS → 4 workers × 11 RPS each.
                  NALA_PLAYWRIGHT_WORKERS: 4
                  NALA_EDS_MAX_RPS: 11

            - name: Cleanup cloned cards
              if: always()
              run: node -e "
                  import('./nala/utils/global.teardown.js')
                  .then(module => module.default())
                  .catch(err => {
                  console.error('Cleanup failed:', err.message);
                  process.exit(1);
                  });"
              env:
                  GITHUB_ACTION_PATH: ${{ github.workspace }}
                  IMS_EMAIL: ${{ secrets.IMS_EMAIL }}
                  IMS_PASS: ${{ secrets.IMS_PASS }}

    run-nala-docs-tests:
        name: Running Nala Docs E2E UI Tests
        needs: nala-gate
        # Run when PR is opened (no label needed) OR when 'run nala' label exists
        # This covers: opened (always), synchronize (if label exists), labeled (if label exists)
        if: |
            github.event.action == 'opened' ||
            contains(github.event.pull_request.labels.*.name, 'run nala')
        runs-on: [self-hosted, Linux, X64, nala-docs]
        timeout-minutes: 20 # Prevent hanging jobs
        strategy:
            matrix:
                node-version: [20.x]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Fetch base branch for diff
              run: git fetch origin ${{ github.event.pull_request.base.ref }}

            - name: Detect io/www changes
              id: filter
              run: |
                  if git diff --quiet origin/${{ github.event.pull_request.base.ref }}...HEAD -- io/www/ 2>/dev/null; then
                      echo "io-www=false" >> $GITHUB_OUTPUT
                  else
                      status=$?
                      if [ "$status" -eq 1 ]; then
                          echo "io-www=true" >> $GITHUB_OUTPUT
                      else
                          echo "io-www=false" >> $GITHUB_OUTPUT
                      fi
                  fi

            - name: Set up Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
                  cache-dependency-path: |
                      **/package-lock.json
                      **/yarn.lock

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              continue-on-error: true
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/playwright.config.js') }}

            # Docs tests run on GitHub-hosted runners (ubuntu-latest) — no unattended-upgrades
            # lock contention, so the prep-apt composite action is not needed here.
            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install-deps

            - name: Install/verify Playwright browsers
              run: |
                  # Always run this - it's idempotent and fast when browsers are already correct
                  # It checks version compatibility and only installs if browsers are missing or outdated
                  npx playwright install

            - name: Set execute permission for gh.run.sh
              run: chmod +x ./nala/utils/gh.run.sh

            - name: Set MAS_IO_URL when io/www has changes
              if: steps.filter.outputs.io-www == 'true'
              run: |
                  if [ -z "${{ secrets.AIO_WWW_NS }}" ]; then
                    echo "::error::Missing required secret: AIO_WWW_NS"
                    exit 1
                  fi
                  ACTOR_NS="${{ secrets.AIO_WWW_NS }}-${{ github.event.pull_request.user.login }}"
                  echo "Using AIO namespace: PR author (${{ github.event.pull_request.user.login }})"
                  echo "MAS_IO_URL=?mas-io-url=https://${ACTOR_NS}.adobeioruntime.net/api/v1/web/MerchAtScale" >> $GITHUB_ENV

            - name: Run Nala Docs Tests via gh.run.sh
              run: ./nala/utils/gh.run.sh
              env:
                  labels: "@mas-docs ${{ join(github.event.pull_request.labels.*.name, ' ') }}"
                  branch: ${{ github.event.pull_request.head.ref }}
                  repoName: ${{ github.repository }}
                  prUrl: ${{ github.event.pull_request.head.repo.html_url }}
                  prOrg: ${{ github.event.pull_request.head.repo.owner.login }}
                  prRepo: ${{ github.event.pull_request.head.repo.name }}
                  prBranch: ${{ github.event.pull_request.head.ref }}
                  prBaseBranch: ${{ github.event.pull_request.base.ref }}
                  GITHUB_ACTION_PATH: ${{ github.workspace }}
                  FORCE_COLOR: 3 # Force color output
                  # docs budget: 45 RPS (1 worker × 45). Studio takes the remaining 135 RPS.
                  NALA_PLAYWRIGHT_WORKERS: 1
                  NALA_EDS_MAX_RPS: 45
