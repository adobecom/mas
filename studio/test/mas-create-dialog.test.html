<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>mas-create-dialog test page</title>
        <meta name="nofollow-links" content="on" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../../style.css" />
        <style>
            body {
                margin: 32px;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: white;
            }

            main {
                width: 100%;
                padding: 0 100px;
            }

            sp-theme {
                display: contents;
            }
        </style>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { stub } from 'sinon';

            import Store from '../src/store.js';
            import { delay } from './utils.js';
            import '../libs/swc.js';
            import '../../src/mas-create-dialog.js';
            import '../../src/mas-repository.js';
            runTests(async () => {
                describe('mas-create-dialog custom element', async () => {
                    let dialog;
                    let fetchStub;

                    beforeEach(async () => {
                        dialog = document.querySelector('mas-create-dialog');
                        // Set the type property directly since it's now passed from the parent
                        dialog.type = 'merch-card';
                        await dialog.updateComplete;

                        // Mock fetch API
                        fetchStub = stub(window, 'fetch').resolves({
                            ok: true,
                            headers: {
                                get() {},
                            },
                            json: () => Promise.resolve({ success: true }),
                        });
                    });

                    afterEach(() => {
                        fetchStub.restore();
                    });

                    it('should make a POST fetch request when form is submitted', async () => {
                        Store.search.set({ path: 'sandbox' });
                        Store.filters.set({ locale: 'en_US' });

                        document.dispatchEvent(
                            new CustomEvent('ost-offer-select', {
                                detail: { offerSelectorId: 'ABC123', offer: {} },
                            }),
                        );

                        // Fill in the form
                        const titleField = dialog.shadowRoot.querySelector('#fragment-title');

                        // Set title
                        titleField.value = 'Test Merch Card';
                        titleField.dispatchEvent(new Event('input', { bubbles: true }));

                        await dialog.updateComplete;

                        // Submit the form by clicking the Create button
                        const createButton = dialog.shadowRoot.querySelector('sp-button[variant="accent"]');
                        createButton.click();
                        await dialog.updateComplete;

                        // Verify fetch was called with correct parameters
                        expect(fetchStub.called).to.be.true;
                        const fetchCall = fetchStub.getCall(0);
                        expect(fetchCall.args[0]).to.include('/test/mocks/adobe/sites/cf/fragments');

                        // Verify it was a POST request with correct data
                        const options = fetchCall.args[1];
                        expect(options.method).to.equal('POST');

                        // Parse the request body
                        const requestBody = JSON.parse(options.body);
                        expect(requestBody).to.have.property('title', 'Test Merch Card');
                        expect(requestBody).to.have.property('modelId');
                    });

                    it('should display the correct dialog title based on type', async () => {
                        // Reset dialog state from previous tests
                        dialog.loading = false;

                        // Test with merch-card type
                        dialog.type = 'merch-card';
                        await dialog.updateComplete;

                        let heading = dialog.shadowRoot.querySelector('.dialog-header');
                        expect(heading).to.exist;
                        expect(heading.textContent.trim()).to.equal('Create New Merch Card');

                        // Test with merch-card-collection type
                        dialog.type = 'merch-card-collection';
                        await dialog.updateComplete;

                        heading = dialog.shadowRoot.querySelector('.dialog-header');
                        expect(heading).to.exist;
                        expect(heading.textContent.trim()).to.equal('Create New Merch Card Collection');

                        dialog.type = 'compare-chart';
                        await dialog.updateComplete;

                        heading = dialog.shadowRoot.querySelector('.dialog-header');
                        expect(heading).to.exist;
                        expect(heading.textContent.trim()).to.equal('Create New Compare Chart');
                    });

                    it('should create compare chart as a collection with compareChart HTML', async () => {
                        Store.search.set({ path: 'sandbox' });
                        Store.filters.set({ locale: 'en_US' });
                        dialog.loading = false;
                        dialog.type = 'compare-chart';
                        await dialog.updateComplete;

                        const titleField = dialog.shadowRoot.querySelector('#fragment-title');
                        titleField.value = 'Test Compare Chart';
                        titleField.dispatchEvent(new Event('input', { bubbles: true }));

                        const createButton = dialog.shadowRoot.querySelector('sp-button[variant="accent"]');
                        createButton.click();
                        await dialog.updateComplete;

                        expect(fetchStub.called).to.be.true;
                        const options = fetchStub.getCall(0).args[1];
                        const requestBody = JSON.parse(options.body);
                        const compareChartField = requestBody.fields.find((field) => field.name === 'compareChart');

                        expect(requestBody).to.have.property('title', 'Test Compare Chart');
                        expect(compareChartField).to.exist;
                        expect(compareChartField.type).to.equal('long-text');
                        expect(compareChartField.values[0]).to.include('<mas-compare-chart>');
                        expect(compareChartField.values[0]).to.include('<span slot="compare-features">Compare Features</span>');
                    });

                    it('should not retry compare chart creation after a non-conflict failure', async () => {
                        Store.search.set({ path: 'sandbox' });
                        Store.filters.set({ locale: 'en_US' });
                        dialog.loading = false;
                        dialog.type = 'compare-chart';
                        await dialog.updateComplete;

                        fetchStub.restore();
                        fetchStub = stub(window, 'fetch').resolves({
                            ok: false,
                            status: 400,
                            statusText: 'Bad Request',
                            headers: { get() {} },
                            json: () => Promise.resolve({}),
                        });

                        const titleField = dialog.shadowRoot.querySelector('#fragment-title');
                        titleField.value = 'Invalid Compare Chart';
                        titleField.dispatchEvent(new Event('input', { bubbles: true }));

                        const createButton = dialog.shadowRoot.querySelector('sp-button[variant="accent"]');
                        createButton.click();
                        await delay();

                        expect(fetchStub.callCount).to.equal(1);
                        expect(dialog.loading).to.be.false;
                    });
                });
            });
        </script>
        <main>
            <mas-repository bucket="test" base-url="/test/mocks"></mas-repository>
            <sp-theme system="spectrum-two" color="light" scale="medium">
                <mas-create-dialog open></mas-create-dialog>
            </sp-theme>
        </main>
    </body>
</html>
