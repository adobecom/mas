        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';

            import '../../src/swc.js';
            import '../../src/rte/rte-field.js';
            import '../../src/rte/rte-link-editor.js';
            import '../../src/rte/rte-icon-editor.js';
            import '../../../web-components/dist/mas.js';
            import { mockFetch } from '../../../web-components/test/mocks/fetch.js';
            import { withWcs } from '../../../web-components/test/mocks/wcs.js';

            import { createFromTemplate, delay, applyChanges, selectNodeAtPos, selectWordsInTextNode } from '../utils.js';

            runTests(async () => {
                await mockFetch(withWcs);
                // Ensure settings and featureFlags are available for tests
                await customElements.whenDefined('mas-commerce-service');
                const masCommerceService = document.querySelector('mas-commerce-service');

                if (masCommerceService) {
                    if (!masCommerceService.settings) {
                        Object.defineProperty(masCommerceService, 'settings', {
                            value: {
                                displayOldPrice: false,
                                displayPerUnit: false,
                                displayPlanType: false,
                                displayRecurrence: false,
                                displayTax: false,
                                isPerpetual: false,
                                checkoutWorkflowStep: undefined,
                            },
                            writable: true,
                            configurable: true,
                        });
                    }

                    if (!masCommerceService.featureFlags) {
                        Object.defineProperty(masCommerceService, 'featureFlags', {
                            value: {
                                'mas-ff-defaults': false,
                            },
                            writable: true,
                            configurable: true,
                        });
                    }
                }

                const openLinkEditor = async function (rte) {
                    rte.linkEditorButtonElement.click();
                    rte.requestUpdate();
                    await rte.updateComplete;
                    rte.linkEditorElement.requestUpdate();
                    await rte.linkEditorElement.updateComplete;
                };

                const openIconEditor = async function (rte) {
                    rte.iconEditorButtonElement.click();
                    rte.requestUpdate();
                    await rte.updateComplete;
                    rte.iconEditorElement.requestUpdate();
                    await rte.iconEditorElement.updateComplete;
                };

                const clickSave = (rte) => {
                    const saveButton = rte.linkEditorElement.shadowRoot.getElementById('saveButton');
                    saveButton.click();
                };

                const clickIconSave = (rte) => {
                    const saveButton = rte.iconEditorElement.shadowRoot.getElementById('saveButton');
                    saveButton.click();
                };

                const clickIconCancel = (rte) => {
                    const cancelButton = rte.iconEditorElement.shadowRoot.getElementById('cancelButton');
                    cancelButton.click();
                };

                describe('RTE Field', () => {
                    it('should render with default attributes', async function () {
                        const rte = await createFromTemplate('rte', this.test.title);
                        expect(rte.shadowRoot).exist;
                    });

                    it('should not emit change when syncing an external value update', async function () {
                        const rte = await createFromTemplate('rte-link', this.test.title);
                        let changeCount = 0;
                        rte.addEventListener('change', () => {
                            changeCount += 1;
                        });

                        rte.value = '<a class="accent" data-checkout-workflow="UCv3" data-wcs-osi="abm">Buy now</a>';
                        await delay(100);

                        expect(changeCount).to.equal(0);
                        expect(rte.value).to.equal(
                            '<p><a class="accent" data-checkout-workflow="UCv3" data-wcs-osi="abm">Buy now</a></p>',
                        );
                    });
                });

                describe('RTE Field: styling features', () => {
                    let rte;
                    const firstStyledElement = () => rte.shadowRoot.querySelector('.ProseMirror span');

                    it('should render styling menu', async function () {
                        rte = await createFromTemplate('rte-styling', this.test.title);
                        const stylingMenu = rte.shadowRoot.querySelector('#stylingMenu');
                        expect(stylingMenu).to.exist;
                    });

                    it('should apply heading styles', async function () {
                        rte = await createFromTemplate('rte-styling', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'Styling');

                        rte.handleStylingAction('heading-m');
                        await delay(100);

                        let span = firstStyledElement();
                        expect(span.className).to.equal('heading-m');

                        await selectWordsInTextNode(rte.editorView, 'Styling');
                        rte.handleStylingAction('heading-xxs');
                        await delay(100);

                        span = firstStyledElement();
                        expect(span.className).to.equal('heading-xxs');
                    });

                    it('should apply promo text styles', async function () {
                        rte = await createFromTemplate('rte-styling', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'Styling');

                        rte.handleStylingAction('promo-text');
                        await delay(100);

                        let span = firstStyledElement();
                        expect(span.className).to.equal('promo-text');
                    });

                    it('should apply promo duration text styles', async function () {
                        rte = await createFromTemplate('rte-marks', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'Styling');

                        rte.handleStylingAction('promo-duration-text');
                        await delay(100);

                        let span = firstStyledElement();
                        expect(span.className).to.equal('promo-duration-text');
                    });

                    it('should apply renewal text styles', async function () {
                        rte = await createFromTemplate('rte-marks', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'Styling');

                        rte.handleStylingAction('renewal-text');
                        await delay(100);

                        let span = firstStyledElement();
                        expect(span.className).to.equal('renewal-text');
                    });

                    it('should apply small markup', async function () {
                        rte = await createFromTemplate('rte-small', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'Small');

                        const smallButton = rte.shadowRoot.querySelector('#smallButton');
                        expect(smallButton).to.exist;
                        smallButton.click();
                        await delay(100);

                        const small = rte.shadowRoot.querySelector('.ProseMirror small');
                        expect(small).to.exist;
                        expect(small.textContent).to.equal('Small');
                        expect(smallButton.selected).to.be.true;
                        expect(rte.value).to.equal('<p><small>Small</small></p>');
                    });
                });

                describe('RTE Field: icon features', () => {
                    let rte;
                    const firstIcon = () => rte.shadowRoot.querySelector('.ProseMirror .icon-button');

                    it('should open the icon editor on icon click and support update', async function () {
                        rte = await createFromTemplate('rte-icon', this.test.title);
                        rte.selectLink(1);
                        await delay(100);
                        await openIconEditor(rte);
                        const { tooltip } = rte.iconEditorElement;
                        expect(tooltip).to.equal('Info tooltip');
                        rte.iconEditorElement.tooltip = 'New info tooltip';
                        rte.iconEditorElement.requestUpdate();
                        await rte.iconEditorElement.updateComplete;
                        clickIconSave(rte);
                        await delay(100);
                        const tt = firstIcon().getAttribute('data-tooltip');
                        expect(tt).to.equal('New info tooltip');
                    });

                    it('should open the icon editor and support inserting icon', async function () {
                        rte = await createFromTemplate('rte', this.test.title);
                        await delay(100);
                        await openIconEditor(rte);
                        rte.iconEditorElement.tooltip = 'My info tooltip';
                        rte.iconEditorElement.requestUpdate();
                        await rte.iconEditorElement.updateComplete;
                        clickIconSave(rte);
                        await delay(100);
                        const tt = firstIcon().getAttribute('data-tooltip');
                        expect(tt).to.equal('My info tooltip');
                    });
                });

                // Theses are not very stable in headless chrome. Enable them for localing.
                describe('RTE Field: link features', () => {
                    let rte;

                    const firstLink = () => rte.shadowRoot.querySelector('.ProseMirror a');

                    const firstParagraph = () => rte.shadowRoot.querySelector('.ProseMirror p');

                    it('should allow to remove a link', async function () {
                        rte = await createFromTemplate('rte-link', this.test.title);
                        rte.selectLink(1);
                        await delay(100);
                        rte.unlinkEditorButtonElement.click();
                        await delay(100);
                        expect(rte.value).to.equal('<p>Adobe</p>');
                    });

                    it('should open the link editor on link click and support update', async function () {
                        rte = await createFromTemplate('rte-link', this.test.title);
                        rte.selectLink(1);
                        await delay(100);
                        await openLinkEditor(rte);
                        const { href, text, title, target, checkoutParameters } = rte.linkEditorElement;
                        expect(href).to.equal('https://www.adobe.com');
                        expect(text).to.equal('Adobe');
                        expect(title).to.equal('adobe.com homepage');
                        expect(target).to.equal('_self');
                        rte.linkEditorElement.href = 'https://www.adobe.com/max';
                        rte.linkEditorElement.text = 'ebodA';
                        rte.linkEditorElement.requestUpdate();
                        await rte.linkEditorElement.updateComplete;
                        clickSave(rte);
                        await delay(100);
                        const a = firstLink();
                        expect(a.href).to.equal('https://www.adobe.com/max');
                        expect(a.innerText).to.equal('ebodA');
                    });

                    it('should open the link editor on selection and support update', async function () {
                        rte = await createFromTemplate('rte', this.test.title);
                        await selectWordsInTextNode(rte.editorView, 'only');
                        await delay(100);
                        await openLinkEditor(rte);
                        await rte.linkEditorElement.updateComplete;
                        expect(rte.linkEditorElement.text).to.equal('only');
                        rte.linkEditorElement.href = 'https://www.adobe.com';
                        rte.linkEditorElement.text = 'and links';
                        rte.linkEditorElement.title = 'Adobe homepage';
                        rte.linkEditorElement.requestUpdate();
                        await rte.linkEditorElement.updateComplete;
                        clickSave(rte);
                        await delay(100);
                        const a = firstLink();
                        expect(a.href).to.equal('https://www.adobe.com/');
                        expect(a.innerText).to.equal('and links');
                        expect(a.title).to.equal('Adobe homepage');
                    });

                    it('should open the link editor and support inserting link', async function () {
                        rte = await createFromTemplate('rte', this.test.title);
                        await openLinkEditor(rte);
                        rte.linkEditorElement.href = 'https://www.adobe.com';
                        rte.linkEditorElement.text = 'Adobe';
                        rte.linkEditorElement.title = 'Adobe homepage';
                        rte.linkEditorElement.requestUpdate();
                        await rte.linkEditorElement.updateComplete;
                        clickSave(rte);
                        await delay(100);
                        const a = firstLink();
                        expect(a.href).to.equal('https://www.adobe.com/');
                        expect(a.innerText).to.equal('Adobe');
                        expect(a.title).to.equal('Adobe homepage');
                    });

                    it('should preserve certain classes when changing variant (ex. upt-link)', async function () {
                        rte = await createFromTemplate('rte-upt', this.test.title);
                        rte.selectLink(1);
                        await openLinkEditor(rte);
                        rte.linkEditorElement.variant = 'primary-link';
                        rte.linkEditorElement.requestUpdate();
                        await rte.linkEditorElement.updateComplete;
                        clickSave(rte);
                        await delay(100);
                        const a = firstLink();
                        expect(a.classList.value).to.equal('upt-link primary-link');
                    });
                });

                // Theses are not very stable in headless chrome. Enable them for localing.
                describe('RTE Field: OST features', () => {
                    let rte;

                    const openOST = async function () {
                        rte.linkEditorButtonElement.click();
                        rte.requestUpdate();
                        await rte.updateComplete;
                        await rte.linkEditorElement;
                    };

                    const firstPrice = () => rte.shadowRoot.querySelector('.ProseMirror span[is="inline-price"]');

                    const firstCheckoutLink = () => rte.shadowRoot.querySelector('.ProseMirror a[is="checkout-link"]');

                    it('should open OST', async function () {
                        if (!localStorage.getItem('masAccessToken')) {
                            localStorage.setItem('masAccessToken', 'test');
                        }
                        const rte = await createFromTemplate('rte-all', this.test.title);
                        await delay(100);
                        expect(rte.value).to.equal(
                            '<span is="inline-price" data-wcs-osi="abm"></span><a class="accent" data-wcs-osi="abm">Buy now</a><a class="primary-outline" data-wcs-osi="abm">Buy now</a><a class="secondary" data-wcs-osi="abm">Buy now</a><a class="secondary-outline" data-wcs-osi="abm">Buy now</a><a class="primary-link" data-wcs-osi="abm">Buy now</a><a class="secondary-link" data-wcs-osi="abm">Buy now</a>',
                        );

                        rte.offerSelectorToolButtonElement.click();
                        await delay(100);
                        const ostApp = document.querySelector('ost-app');
                        expect(ostApp, 'OST dialog should be mounted').to.exist;
                        const closeButton = ostApp.shadowRoot.querySelector('[data-testid="ost-close-button"]');
                        expect(closeButton, 'OST close button should be present').to.exist;
                        closeButton.click();
                    });

                    it('should allow to author extra checkout parameters', async function () {
                        rte = await createFromTemplate('rte-ost-extra', this.test.title);
                        await delay(100);
                        const attributes = {
                            sc: '1',
                            pa: 'apcc_direct_individual',
                            cli: 'cc_desktop',
                            svar: 'ccd_hp_rec_cards',
                            ctx: 'a',
                            mv2: 'accc',
                            mv: 'product',
                            promoid: 'ABC',
                            co: 'US',
                        };

                        let [node] = selectNodeAtPos(rte.editorView, 1);
                        applyChanges(rte.editorView, 1, {
                            ...node.attrs,
                            'data-extra-options': JSON.stringify(attributes),
                        });
                        selectNodeAtPos(rte.editorView, 1);
                        await openLinkEditor(rte);
                        const expectedParams = new URLSearchParams(attributes).toString();
                        expect(rte.linkEditorElement.checkoutParameters).to.equal(expectedParams.toString());

                        const newAttributes = {
                            ...attributes,
                            sc: '2',
                            promoid: 'XYZ',
                        };
                        const newExpectedParams = new URLSearchParams(newAttributes).toString();

                        rte.linkEditorElement.checkoutParameters = newExpectedParams;
                        rte.linkEditorElement.requestUpdate();
                        await rte.linkEditorElement.updateComplete;
                        clickSave(rte);
                        await delay(100);
                        [node] = selectNodeAtPos(rte.editorView, 1);
                        expect(node.attrs['data-extra-options']).to.equal(JSON.stringify(newAttributes));
                    });

                    it.skip('dev', async function () {
                        const rte = await createFromTemplate('rte-dev', this.test.title);
                    });

                    describe('OST insertion', () => {
                        // Helper: drive the same code path #handleOstEvent walks for
                        // EVENT_OST_SELECT, after seeding ostRteFieldSource via the
                        // public handleOpenOfferSelector entry point.
                        const dispatchOstSelect = (attributes) => {
                            document.dispatchEvent(
                                new CustomEvent('ost-select', { detail: attributes, bubbles: true, composed: true }),
                            );
                        };

                        it('inserts a sibling link when the cursor is inside an existing link, without leaving a phantom <a></a>', async function () {
                            const rte = await createFromTemplate('rte-link', this.test.title);
                            await delay(50);
                            const view = rte.editorView;
                            // Empty cursor mid-link: position 3 sits inside the <a>Adobe</a>
                            // (positions: 0=<p>, 1=<a>, 2='A', 3='d', ...). Use the same
                            // TextSelection class ProseMirror exports via its state module.
                            const SelCtor = view.state.selection.constructor;
                            const tr = view.state.tr.setSelection(SelCtor.create(view.state.doc, 3, 3));
                            view.dispatch(tr);
                            await delay(20);

                            rte.handleOpenOfferSelector(new Event('click'));
                            dispatchOstSelect({
                                is: 'checkout-link',
                                href: '#',
                                'data-wcs-osi': 'osi-from-ost',
                                class: 'accent',
                                text: 'Buy now',
                            });
                            await delay(50);

                            const html = rte.value;
                            // New link landed as a sibling with content.
                            expect(html).to.include('data-wcs-osi="osi-from-ost"');
                            expect(html).to.include('>Buy now<');
                            // Original "Adobe" link is preserved (not split).
                            expect(html).to.include('>Adobe<');
                            // No phantom <a></a> from a mid-link insertion.
                            expect(html).to.not.match(/<a[^>]*>\s*<\/a>/);
                        });

                        it('inserts at the current cursor when the cursor is NOT inside a link', async function () {
                            const rte = await createFromTemplate('rte', this.test.title);
                            await delay(50);
                            const view = rte.editorView;
                            const SelCtor = view.state.selection.constructor;
                            // Empty cursor inside "Text only" — position 1 is start of the text node.
                            const tr = view.state.tr.setSelection(SelCtor.create(view.state.doc, 1, 1));
                            view.dispatch(tr);
                            await delay(20);

                            rte.handleOpenOfferSelector(new Event('click'));
                            dispatchOstSelect({
                                is: 'checkout-link',
                                href: '#',
                                'data-wcs-osi': 'osi-plain',
                                text: 'Use',
                            });
                            await delay(50);

                            const html = rte.value;
                            expect(html).to.include('data-wcs-osi="osi-plain"');
                            expect(html).to.include('>Use<');
                            expect(html).to.not.match(/<a[^>]*>\s*<\/a>/);
                        });

                        it('is a no-op when ostRteFieldSource does not match the current RTE instance', async function () {
                            const rteA = await createFromTemplate('rte', this.test.title + '-A');
                            const rteB = await createFromTemplate('rte', this.test.title + '-B');
                            await delay(50);
                            // Only rteA opened the offer selector; rteB should ignore the event.
                            rteA.handleOpenOfferSelector(new Event('click'));
                            const beforeB = rteB.value;
                            dispatchOstSelect({
                                is: 'checkout-link',
                                href: '#',
                                'data-wcs-osi': 'osi-stray',
                                text: 'Should not appear',
                            });
                            await delay(50);
                            // rteB content is unchanged by the cross-instance event.
                            expect(rteB.value).to.equal(beforeB);
                        });
                    });
                });

                describe('RTE Field: mnemonic serialization', () => {
                    it('serializes mnemonicText as text content, not as mnemonic-text attribute', async function () {
                        const rte = await createFromTemplate('rte-mnemonic', this.test.title);
                        const view = rte.editorView;
                        const { state } = view;
                        const mnemonicNode = state.schema.nodes.mnemonic.create({
                            src: 'https://www.adobe.com/cc-shared/assets/img/product-icons/svg/photoshop.svg',
                            alt: 'Photoshop',
                            size: 's',
                            mnemonicText: 'Edit Photos',
                            mnemonicPlacement: 'top',
                        });
                        view.dispatch(state.tr.replaceSelectionWith(mnemonicNode));

                        const html = rte.value;
                        expect(html).to.include('>Edit Photos<');
                        expect(html).to.not.include('mnemonic-text=');
                        expect(html).to.include('mnemonic-placement="top"');
                    });

                    it('parses mnemonicText from text content', async function () {
                        const rte = await createFromTemplate('rte-mnemonic', this.test.title);
                        rte.value =
                            '<p><mas-mnemonic src="test.svg" size="s" mnemonic-placement="top">Edit Photos</mas-mnemonic></p>';
                        await rte.updateComplete;

                        const node = rte.editorView.state.doc.firstChild.firstChild;
                        expect(node.attrs.mnemonicText).to.equal('Edit Photos');
                    });

                    it('parses mnemonicText from mnemonic-text attribute for backward compatibility', async function () {
                        const rte = await createFromTemplate('rte-mnemonic', this.test.title);
                        rte.value =
                            '<p><mas-mnemonic src="test.svg" size="s" mnemonic-text="Edit Photos" mnemonic-placement="top"></mas-mnemonic></p>';
                        await rte.updateComplete;

                        const node = rte.editorView.state.doc.firstChild.firstChild;
                        expect(node.attrs.mnemonicText).to.equal('Edit Photos');
                    });
                });
            });
        </script>

            <div>
