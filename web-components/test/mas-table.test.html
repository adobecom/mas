        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import chai, { expect } from '@esm-bundle/chai';
            import chaiAsPromised from '@esm-bundle/chai-as-promised';

            import { mockFetch } from './mocks/fetch.js';
            import { withWcs } from './mocks/wcs.js';
            import { withAem } from './mocks/aem.js';
            import {
                delay,
                getTemplateContent,
                oneEvent,
                toggleDesktop,
                toggleMobile,
            } from './utils.js';
            import '../src/mas.js';
            import {
                EVENT_MAS_ERROR,
                EVENT_MAS_READY,
            } from '../src/constants.js';

            chai.use(chaiAsPromised);

            runTests(async () => {
                const [merchFixture] = await Promise.all([
                    fetch(
                        'mocks/sites/fragments/fragment-table-merch.json',
                    ).then((res) => res.json()),
                ]);
                const standardFixture = {
                    path: '/content/dam/mas/tables/fragment-table-standard',
                    name: 'fragment-table-standard',
                    title: 'Standard Table',
                    id: 'fragment-table-standard',
                    description: '',
                    model: {
                        id: 'table',
                    },
                    fields: {
                        blockName: 'Table',
                        compareChart: {
                            value: document
                                .getElementById('standard-table-compare-chart')
                                .innerHTML.trim(),
                            mimeType: 'text/html',
                        },
                    },
                };
                const withStandardTableTemplate = async () => {
                    return async ({ pathname }) => {
                        if (
                            pathname !==
                            '/test/mocks/sites/fragments/fragment-table-standard.json'
                        ) {
                            return false;
                        }
                        return new Response(JSON.stringify(standardFixture), {
                            status: 200,
                            headers: {
                                'Content-Type': 'application/json',
                            },
                        });
                    };
                };

                const { cache } = customElements.get('aem-fragment');

                describe('mas-table', () => {
                    let aemMock;
                    let testCaseId = 0;
                    const spTheme = document.querySelector('sp-theme');

                    const appendTestCase = (templateId) => {
                        testCaseId += 1;
                        const wrapper = document.createElement('section');
                        wrapper.dataset.testCase = String(testCaseId);
                        const [tableHost] = getTemplateContent(templateId);
                        wrapper.append(tableHost);
                        spTheme.append(wrapper);
                        return tableHost;
                    };

                    beforeEach(async () => {
                        await toggleDesktop();
                        [, aemMock] = await mockFetch(
                            withWcs,
                            withAem,
                            withStandardTableTemplate,
                        );
                        cache.clear();
                    });

                    it('renders a fragment-backed table from cache', async () => {
                        cache.add(standardFixture);
                        const tableHost = appendTestCase('standard-table');

                        await tableHost.checkReady();

                        expect(aemMock.count).to.equal(0);
                        expect(tableHost.aemFragment).to.exist;
                        expect(tableHost.aemFragment.hasAttribute('hidden')).to
                            .be.true;

                        const table =
                            tableHost.shadowRoot.querySelector('.table');
                        expect(table).to.exist;
                        expect(table.classList.contains('highlight')).to.be
                            .true;
                        expect(table.classList.contains('sticky')).to.be.true;
                        expect(table.classList.contains('pricing-bottom')).to.be
                            .true;
                        expect(table.classList.contains('header-left')).to.be
                            .true;
                        expect(table.classList.contains('has-addon')).to.be
                            .true;
                        expect(table.querySelector('.row-highlight')).to.exist;
                        expect(table.querySelector('.row-heading')).to.exist;
                        expect(
                            table.querySelector(
                                '.row-heading .col-2 .content-before.addon-label',
                            ),
                        ).to.exist;
                        expect(
                            table.querySelector('.section-head'),
                        ).to.exist;
                        expect(
                            table.querySelector('.row-heading .col-2 .body')
                                ?.textContent,
                        ).to.include('Spare 50 % auf die Vollversion');
                        expect(
                            table.querySelector('.row-heading .col-2 .pricing')
                                ?.textContent,
                        ).to.include('25,99');
                        const highlightStyles = getComputedStyle(
                            table.querySelector('.row-highlight .col-2'),
                        );
                        expect(highlightStyles.borderTopLeftRadius).to.equal(
                            '16px',
                        );
                        expect(highlightStyles.borderTopRightRadius).to.equal(
                            '16px',
                        );
                    });

                    it('dispatches mas:ready for a rendered table', async () => {
                        const tableHost = appendTestCase('standard-table');
                        const masReady = oneEvent(tableHost, EVENT_MAS_READY);

                        const readyEvent = await masReady;
                        await tableHost.checkReady();

                        expect(readyEvent.detail.measure).to.exist;
                        expect(
                            tableHost.shadowRoot.querySelector('.row-heading'),
                        ).to.exist;
                    });

                    it('re-renders cleanly after fragment refresh', async () => {
                        const tableHost = appendTestCase('standard-table');

                        await tableHost.checkReady();

                        const heading = tableHost.shadowRoot.querySelector(
                            '.row-heading .col-2 .tracking-header',
                        );
                        heading.setAttribute('data-test', 'stale');

                        const aemFragment =
                            tableHost.querySelector('aem-fragment');
                        await aemFragment.refresh();
                        await tableHost.checkReady();

                        const refreshedHeading =
                            tableHost.shadowRoot.querySelector(
                                '.row-heading .col-2 .tracking-header',
                            );
                        expect(refreshedHeading.getAttribute('data-test')).to.be
                            .null;
                        expect(aemMock.count).to.equal(2);
                    });

                    it('renders mobile comparison filters', async () => {
                        await toggleMobile();
                        const tableHost = appendTestCase('standard-table');

                        await tableHost.checkReady();
                        await delay(150);

                        const filters =
                            tableHost.shadowRoot.querySelector('.filters');
                        expect(filters).to.exist;
                        expect(
                            filters.querySelectorAll('select.filter'),
                        ).to.have.length(2);
                    });

                    it('hydrates merch heading columns from referenced cards and falls back to authored HTML', async () => {
                        cache.add(merchFixture);
                        const tableHost = appendTestCase('merch-table');

                        await tableHost.checkReady();

                        const table =
                            tableHost.shadowRoot.querySelector('.table');
                        const highlightOne = table.querySelector(
                            '.row-highlight .col-1',
                        );
                        const highlightTwo = table.querySelector(
                            '.row-highlight .col-2',
                        );
                        const headingOne = table.querySelector(
                            '.row-heading .col-1',
                        );
                        const headingTwo = table.querySelector(
                            '.row-heading .col-2',
                        );

                        expect(table.classList.contains('merch')).to.be.true;
                        expect(highlightOne.textContent.trim()).to.equal(
                            'Save 65%',
                        );
                        expect(highlightOne.style.backgroundColor).to.equal(
                            'rgb(20, 115, 230)',
                        );
                        expect(highlightOne.style.color).to.equal(
                            'rgb(255, 255, 255)',
                        );
                        expect(highlightTwo.textContent.trim()).to.equal(
                            'Best for power users',
                        );
                        expect(headingOne.textContent).to.include(
                            'Starter from fragment',
                        );
                        expect(headingOne.textContent).to.include('US$9.99/mo');
                        expect(headingOne.textContent).to.include(
                            'Buy starter',
                        );
                        expect(headingOne.querySelector('mas-mnemonic')).to
                            .exist;
                        expect(
                            headingOne.querySelector(
                                '.buttons-wrapper .action-area',
                            ),
                        ).to.exist;

                        expect(headingTwo.textContent).to.include(
                            'Fallback Pro',
                        );
                        expect(headingTwo.textContent).to.include(
                            'Fallback Pro CTA',
                        );
                    });

                    it('fails when compareChart is missing', async () => {
                        const tableHost = appendTestCase('invalid-table');
                        const masError = oneEvent(tableHost, EVENT_MAS_ERROR);

                        const errorEvent = await masError;
                        await expect(tableHost.checkReady()).to.be.rejected;

                        expect(tableHost.hasAttribute('failed')).to.be.true;
                        expect(errorEvent.detail.message).to.equal(
                            'compareChart field is missing',
                        );
                    });
                });
            });
        </script>
