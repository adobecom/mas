<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>compare-chart-editor test page</title>
        <meta name="nofollow-links" content="on" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../../style.css" />
        <style>
            body {
                margin: 32px;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: white;
            }

            main {
                width: 100%;
                padding: 0 100px;
            }

            compare-chart-editor {
                max-width: 1000px;
            }

            sp-theme {
                display: contents;
            }
        </style>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { delay, initElementFromTemplate } from '../utils.js';

            import '../../src/swc.js';
            import '../../src/editor-panel.js';
            import '../../src/editors/compare-chart-editor.js';
            import { Fragment } from '../../src/aem/fragment.js';
            import { FragmentStore } from '../../src/reactivity/fragment-store.js';
            import { COMPARE_CHART_MODEL_PATH } from '../../src/constants.js';

            const mockCompareChartFragment = {
                id: 'compare-chart-001',
                title: 'Acrobat Pricing Chart',
                name: 'acrobat-pricing-chart',
                path: '/content/dam/mas/sandbox/en_US/acrobat-pricing-chart',
                model: {
                    path: COMPARE_CHART_MODEL_PATH,
                    title: 'Compare Chart',
                },
                status: 'DRAFT',
                fields: [
                    {
                        name: 'fragments',
                        type: 'content-fragment',
                        multiple: true,
                        values: [
                            '/content/dam/mas/sandbox/en_US/col-reader',
                            '/content/dam/mas/sandbox/en_US/col-pro',
                        ],
                    },
                    {
                        name: 'sections',
                        type: 'content-fragment',
                        multiple: true,
                        values: [
                            '/content/dam/mas/sandbox/en_US/section-create',
                        ],
                    },
                ],
                references: [
                    {
                        id: 'col-reader-001',
                        path: '/content/dam/mas/sandbox/en_US/col-reader',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-fragment' },
                        fields: [
                            { name: 'column-fragment', type: 'content-fragment', values: ['/content/dam/mas/sandbox/en_US/card-reader'] },
                            { name: 'column-fields', type: 'text', multiple: true, values: ['cardTitle', 'prices'] },
                            { name: 'badge', type: 'text', values: [''] },
                        ],
                    },
                    {
                        id: 'col-pro-001',
                        path: '/content/dam/mas/sandbox/en_US/col-pro',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-fragment' },
                        fields: [
                            { name: 'column-fragment', type: 'content-fragment', values: ['/content/dam/mas/sandbox/en_US/card-pro'] },
                            { name: 'column-fields', type: 'text', multiple: true, values: ['cardTitle', 'prices', 'ctas'] },
                            { name: 'badge', type: 'text', values: ['Best Offer'] },
                        ],
                    },
                    {
                        id: 'card-reader-001',
                        path: '/content/dam/mas/sandbox/en_US/card-reader',
                        model: { path: '/conf/mas/settings/dam/cfm/models/card' },
                        title: 'Acrobat Reader',
                        fields: [
                            { name: 'cardTitle', type: 'text', values: ['Acrobat Reader'] },
                            { name: 'prices', type: 'text', values: ['Free'] },
                        ],
                    },
                    {
                        id: 'card-pro-001',
                        path: '/content/dam/mas/sandbox/en_US/card-pro',
                        model: { path: '/conf/mas/settings/dam/cfm/models/card' },
                        title: 'Acrobat Pro',
                        fields: [
                            { name: 'cardTitle', type: 'text', values: ['Acrobat Pro'] },
                            { name: 'prices', type: 'text', values: ['$19.99/mo'] },
                            { name: 'ctas', type: 'text', values: ['Buy now'] },
                        ],
                    },
                    {
                        id: 'section-create-001',
                        path: '/content/dam/mas/sandbox/en_US/section-create',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-section' },
                        fields: [
                            { name: 'section-title', type: 'text', values: ['Create PDFs'] },
                            {
                                name: 'rows',
                                type: 'content-fragment',
                                multiple: true,
                                values: ['/content/dam/mas/sandbox/en_US/row-combine'],
                            },
                        ],
                    },
                    {
                        id: 'row-combine-001',
                        path: '/content/dam/mas/sandbox/en_US/row-combine',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-row' },
                        fields: [
                            { name: 'row-title', type: 'text', values: ['Combine files'] },
                            {
                                name: 'values',
                                type: 'content-fragment',
                                multiple: true,
                                values: [
                                    '/content/dam/mas/sandbox/en_US/val-false',
                                    '/content/dam/mas/sandbox/en_US/val-true',
                                ],
                            },
                        ],
                    },
                    {
                        id: 'val-false-001',
                        path: '/content/dam/mas/sandbox/en_US/val-false',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-value' },
                        fields: [
                            { name: 'type', type: 'enumeration', values: ['boolean'] },
                            { name: 'booleanValue', type: 'boolean', values: [false] },
                        ],
                    },
                    {
                        id: 'val-true-001',
                        path: '/content/dam/mas/sandbox/en_US/val-true',
                        model: { path: '/conf/mas/settings/dam/cfm/models/compare-value' },
                        fields: [
                            { name: 'type', type: 'enumeration', values: ['boolean'] },
                            { name: 'booleanValue', type: 'boolean', values: [true] },
                        ],
                    },
                ],
            };

            runTests(async () => {
                describe('compare-chart-editor custom element', async () => {
                    let editor;

                    beforeEach(async () => {
                        document.querySelector('compare-chart-editor')?.remove();
                        editor = document.createElement('compare-chart-editor');
                        const fragment = new Fragment(mockCompareChartFragment);
                        const fragmentStore = new FragmentStore(fragment);
                        editor.fragmentStore = fragmentStore;
                        document.querySelector('main').appendChild(editor);
                        await editor.updateComplete;
                    });

                    afterEach(() => {
                        editor?.remove();
                    });

                    it('should render the editor', async () => {
                        expect(editor).to.exist;
                        expect(editor.querySelector('compare-chart-preview')).to.exist;
                    });

                    it('should display correct column count', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        expect(editor.columns.length).to.equal(2);
                    });

                    it('should display correct section count', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        expect(editor.sections.length).to.equal(1);
                    });

                    it('should resolve column titles from card references', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        expect(editor.columns[0].title).to.equal('Acrobat Reader');
                        expect(editor.columns[1].title).to.equal('Acrobat Pro');
                    });

                    it('should resolve badge on columns', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        expect(editor.columns[1].badge).to.equal('Best Offer');
                    });

                    it('should resolve section titles', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        expect(editor.sections[0].title).to.equal('Create PDFs');
                    });

                    it('should resolve row values', async () => {
                        await delay(50);
                        await editor.updateComplete;
                        const row = editor.sections[0].rows[0];
                        expect(row.title).to.equal('Combine files');
                        expect(row.values.length).to.equal(2);
                        expect(row.values[0].type).to.equal('boolean');
                        expect(row.values[0].booleanValue).to.equal(false);
                        expect(row.values[1].booleanValue).to.equal(true);
                    });
                });
            });
        </script>
        <main>
            <sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme>
        </main>
    </body>
</html>
