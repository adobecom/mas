<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>mas-compare-chart tests</title>
        <script>
            window.process = { env: {} };
        </script>
        <script type="module" src="../src/mas.js"></script>
        <link
            rel="stylesheet"
            href="https://www.adobe.com/libs/styles/styles.css"
        />
    </head>
    <body>
        <mas-commerce-service env="stage"></mas-commerce-service>

        <!-- Inert until cloned in describe before() so aem-fragment / fetch
             never run until mocks and mas.js are fully ready. -->
        <template id="compare-chart-shared-fixture">
            <mas-compare-chart
                id="t"
                consonant
                spectrum="swc"
            >
                <aem-fragment fragment="compare-chart-express"></aem-fragment>
            </mas-compare-chart>
        </template>

        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { mockIms } from './mocks/ims.js';
            import { mockLana } from './mocks/lana.js';
            import { mockFetch } from './mocks/fetch.js';
            import { withAem } from './mocks/aem.js';
            import { withWcs } from './mocks/wcs.js';

            runTests(async () => {
                describe('mas-compare-chart', () => {
                    before(async () => {
                        mockIms();
                        mockLana();
                        await mockFetch(withWcs, withAem);

                        const fixture = document.getElementById(
                            'compare-chart-shared-fixture',
                        );
                        document.body.append(fixture.content.cloneNode(true));
                    });

                    afterEach(() => {
                        document
                            .querySelectorAll('mas-compare-chart:not(#t)')
                            .forEach((chart) => chart.remove());
                    });

                    it('hydrates a compare chart fragment with card CTAs', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        expect(await chart.checkReady()).to.be.true;
                        expect(
                            chart.querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            ).length,
                        ).to.equal(3);
                        chart
                            .querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            )
                            .forEach((card) => {
                                expect(card.consonant).to.be.true;
                                expect(card.hasAttribute('consonant')).to.be
                                    .true;
                                expect(card.spectrum).to.equal('swc');
                                expect(card.getAttribute('spectrum')).to.equal(
                                    'swc',
                                );
                            });
                        expect(
                            chart.querySelectorAll(':scope > [slot$="-cta"]')
                                .length,
                        ).to.equal(5);

                        const ctaText = Array.from(
                            chart.querySelectorAll(':scope > [slot$="-cta"]'),
                            (cta) => cta.textContent.trim(),
                        );
                        expect(ctaText).to.include('{{buy-now}}');
                        expect(ctaText).to.include('{{free-trial}}');
                        const headerText = Array.from(
                            chart.querySelectorAll(':scope > [slot$="-header"]'),
                            (header) => header.textContent.trim(),
                        );
                        expect(headerText).to.deep.equal([
                            'Adobe Express Free',
                            'Adobe Express Premium',
                            'Adobe Firefly Pro',
                        ]);
                        expect(
                            chart.querySelector(
                                ':scope > [slot="compare-features"]',
                            ).textContent.trim(),
                        ).to.equal('Compare Features');
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.table-column-header',
                            ).length,
                        ).to.equal(9);
                        expect(
                            chart.shadowRoot.querySelectorAll('.table-row')
                                .length,
                        ).to.equal(90);
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.tooltip-wrapper',
                            ).length,
                        ).to.equal(47);
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.row-label a.secondary-link',
                            ).length,
                        ).to.equal(0);
                        const checkoutCta = chart.querySelector(
                            ':scope > [slot="card-3-cta"][is="checkout-link"]',
                        );
                        expect(checkoutCta).to.exist;
                        expect(checkoutCta.dataset.wcsOsi).to.equal(
                            'F-WCwWOvQUv9kuFxnb9Zh2fN0Zh_oi_yVUxAQ4_Z0gY',
                        );
                        expect(checkoutCta.dataset.analyticsId).to.equal(
                            'buy-now',
                        );
                        expect(
                            chart.querySelector(
                                ':scope > [slot="card-3-price"] p',
                            ),
                        ).to.not.exist;

                        const headers = chart.shadowRoot.querySelectorAll(
                            '.table-column-header',
                        );
                        expect(headers[0].getAttribute('aria-expanded')).to.equal(
                            'true',
                        );
                        expect(headers[1].getAttribute('aria-expanded')).to.equal(
                            'false',
                        );
                    });

                    it('persists each section expand state in expanded-groups', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        await chart.updateComplete;
                        const headers = chart.shadowRoot.querySelectorAll(
                            '.table-column-header',
                        );
                        expect(headers.length).to.be.greaterThan(2);

                        headers[0].click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            'none',
                        );
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[0]
                                .getAttribute('aria-expanded'),
                        ).to.equal('false');
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[1]
                                .getAttribute('aria-expanded'),
                        ).to.equal('false');

                        chart.shadowRoot
                            .querySelectorAll('.table-column-header')[0]
                            .click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            '1',
                        );
                    });

                    it('renders at most four card fragments', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            ${[1, 2, 3, 4, 5]
                                .map(
                                    (index) => `
                                        <merch-card slot="cards" variant="compare-chart">
                                            <h3 slot="header">Card ${index}</h3>
                                            <div slot="features">
                                                <p name="group@feature">Value ${index}</p>
                                            </div>
                                        </merch-card>
                                    `,
                                )
                                .join('')}
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;

                        expect(chart.getAttribute('data-child-count')).to.equal(
                            '4',
                        );
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-4-header"]',
                            ).textContent,
                        ).to.include('Card 4');
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-5-header"]',
                            ),
                        ).to.not.exist;
                        chart.remove();
                    });

                    it('keeps text after checkmarks inside the chip unless wrapped in small', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="features">
                                    <p name="group@feature">✅ Premium tools</p>
                                    <p name="group@plain-count">✓ 519,000+</p>
                                    <p name="group@captioned">✓<small>519,000+</small></p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                                <p name="plain-count">Plain count</p>
                                <p name="captioned">Captioned</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await chart.updateComplete;

                        const cells =
                            chart.shadowRoot.querySelectorAll('p[role="cell"]');
                        expect(
                            cells[0].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓ Premium tools');
                        expect(
                            cells[0].classList.contains('emoji-primary-cell'),
                        ).to.be.true;
                        expect(
                            cells[0]
                                .querySelector('.compare-chart-glyph')
                                .classList.contains('primary'),
                        ).to.be.true;
                        expect(
                            getComputedStyle(
                                cells[0].querySelector('.compare-chart-chip'),
                            ).color,
                        ).to.equal('rgb(5, 131, 78)');
                        expect(cells[0].querySelector('small')).to.not.exist;
                        expect(
                            cells[1].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓ 519,000+');
                        expect(cells[1].querySelector('small')).to.not.exist;
                        expect(
                            cells[1]
                                .querySelector('.compare-chart-chip')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[1]
                                .querySelector('.compare-chart-glyph')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[2].querySelector('.compare-chart-chip')
                                .textContent,
                        ).to.equal('✓');
                        expect(
                            cells[2].querySelector('small').textContent.trim(),
                        ).to.equal('519,000+');
                        expect(
                            cells[2]
                                .querySelector('.compare-chart-chip')
                                .hasAttribute('style'),
                        ).to.be.false;
                        expect(
                            cells[2]
                                .querySelector('small')
                                .hasAttribute('style'),
                        ).to.be.false;
                        chart.remove();
                    });

                    it('aligns price cell heights across cards', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.style.width = '1000px';
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Single price</h3>
                                <p slot="price">$10/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Wrapped price</h3>
                                <p slot="price">Starting at<br>$20/mo<br>per license</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(() =>
                                requestAnimationFrame(resolve),
                            ),
                        );

                        const priceHeights = Array.from(
                            chart.shadowRoot.querySelectorAll('.price-segment'),
                            (segment) =>
                                Math.round(
                                    segment.getBoundingClientRect().height,
                                ),
                        );
                        expect(priceHeights).to.have.length(2);
                        expect(new Set(priceHeights).size).to.equal(1);
                        chart.remove();
                    });

                    it('renders an 8px gap between CTAs in the same card', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.style.width = '1000px';
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <p slot="price">US$29.99/mo</p>
                                <p slot="detail">Annual, billed monthly</p>
                                <div slot="cta">
                                    <a href="#">Buy now</a>
                                    <a href="#">Learn more</a>
                                </div>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(() =>
                                requestAnimationFrame(resolve),
                            ),
                        );

                        const ctas = Array.from(
                            chart.querySelectorAll(
                                ':scope > [slot="card-1-cta"]',
                            ),
                        );
                        expect(ctas).to.have.length(2);

                        const first = ctas[0].getBoundingClientRect();
                        const second = ctas[1].getBoundingClientRect();
                        expect(Math.round(second.top - first.bottom)).to.equal(
                            8,
                        );
                        chart.remove();
                    });

                    it('applies Figma header typography to generated column slots', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.innerHTML = `
                            <span slot="compare-features">Compare Features</span>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="price">
                                    <span class="price price-strikethrough">US$69.99/mo</span>
                                    <span class="price">US$29.99/mo</span>
                                    <span class="price-recurrence">Annual, billed monthly</span>
                                </div>
                                <p slot="detail">First year price, then $39.99/mo only.</p>
                                <div slot="cta">
                                    <a href="#">Buy now</a>
                                </div>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await chart.updateComplete;

                        const typographyCases = [
                            ['[slot="compare-features"]', '16px', '24px', '700'],
                            ['[slot="card-1-header"]', '16px', '24px', '700'],
                            ['[slot="card-1-price"]', '16px', '20px', '700'],
                            ['[slot="card-1-detail"]', '12px', '18px', '400', 'italic'],
                            ['[slot="card-1-cta"]', '15px', '19px', '700'],
                        ];
                        typographyCases.forEach(
                            ([
                                selector,
                                fontSize,
                                lineHeight,
                                fontWeight,
                                fontStyle = 'normal',
                            ]) => {
                                const style = getComputedStyle(
                                    chart.querySelector(selector),
                                );
                                expect(style.fontSize).to.equal(fontSize);
                                expect(style.lineHeight).to.equal(lineHeight);
                                expect(style.fontWeight).to.equal(fontWeight);
                                expect(style.fontStyle).to.equal(fontStyle);
                                expect(style.letterSpacing).to.equal('normal');
                            },
                        );
                        const headerStyle = getComputedStyle(
                            chart.querySelector('[slot="card-1-header"]'),
                        );
                        expect(headerStyle.display).to.equal('flex');
                        expect(headerStyle.flexDirection).to.equal('column');
                        expect(headerStyle.justifyContent).to.equal('center');
                        expect(headerStyle.alignItems).to.equal('center');
                        expect(headerStyle.height).to.equal('24px');
                        expect(headerStyle.paddingTop).to.equal('0px');
                        expect(headerStyle.paddingRight).to.equal('0px');
                        expect(headerStyle.paddingBottom).to.equal('0px');
                        expect(headerStyle.paddingLeft).to.equal('0px');

                        const priceSlot = chart.querySelector(
                            '[slot="card-1-price"]',
                        );
                        const priceSlotStyle = getComputedStyle(priceSlot);
                        expect(priceSlotStyle.display).to.equal('flex');
                        expect(priceSlotStyle.flexDirection).to.equal('column');
                        expect(priceSlotStyle.justifyContent).to.equal(
                            'center',
                        );
                        expect(priceSlotStyle.alignItems).to.equal('center');
                        expect(priceSlotStyle.height).to.equal('66px');
                        expect(priceSlotStyle.paddingTop).to.equal('8px');
                        expect(priceSlotStyle.paddingRight).to.equal('8px');
                        expect(priceSlotStyle.paddingBottom).to.equal('8px');
                        expect(priceSlotStyle.paddingLeft).to.equal('8px');

                        const discountStyle = getComputedStyle(
                            priceSlot.querySelector('.price-strikethrough'),
                        );
                        expect(discountStyle.width).to.equal('144px');
                        expect(discountStyle.height).to.equal('15px');
                        expect(discountStyle.fontSize).to.equal('12px');
                        expect(discountStyle.lineHeight).to.equal('15px');
                        expect(discountStyle.fontWeight).to.equal('700');
                        expect(discountStyle.textDecorationLine).to.include(
                            'line-through',
                        );

                        const priceStyle = getComputedStyle(
                            priceSlot.querySelector(
                                '.price:not(.price-strikethrough)',
                            ),
                        );
                        expect(priceStyle.width).to.equal('144px');
                        expect(priceStyle.height).to.equal('20px');
                        expect(priceStyle.fontSize).to.equal('16px');
                        expect(priceStyle.lineHeight).to.equal('20px');
                        expect(priceStyle.fontWeight).to.equal('700');

                        const detailStyle = getComputedStyle(
                            priceSlot.querySelector('.price-recurrence'),
                        );
                        expect(detailStyle.width).to.equal('144px');
                        expect(detailStyle.height).to.equal('15px');
                        expect(detailStyle.fontSize).to.equal('12px');
                        expect(detailStyle.lineHeight).to.equal('15px');
                        expect(detailStyle.fontWeight).to.equal('400');
                        expect(detailStyle.fontStyle).to.equal('italic');

                        const headerDetail = chart.querySelector(
                            '[slot="card-1-detail"]',
                        );
                        const headerDetailStyle =
                            getComputedStyle(headerDetail);
                        expect(headerDetailStyle.display).to.equal('flex');
                        expect(headerDetailStyle.flexDirection).to.equal(
                            'column',
                        );
                        expect(headerDetailStyle.alignItems).to.equal('center');
                        expect(headerDetailStyle.alignSelf).to.equal('stretch');
                        expect(headerDetailStyle.height).to.equal('52px');
                        expect(headerDetailStyle.paddingTop).to.equal('8px');
                        expect(headerDetailStyle.paddingRight).to.equal('8px');
                        expect(headerDetailStyle.paddingBottom).to.equal('8px');
                        expect(headerDetailStyle.paddingLeft).to.equal('8px');
                        expect(headerDetailStyle.fontSize).to.equal('12px');
                        expect(headerDetailStyle.lineHeight).to.equal('18px');
                        expect(headerDetailStyle.fontWeight).to.equal('400');
                        expect(headerDetailStyle.fontStyle).to.equal('italic');
                        expect(headerDetailStyle.color).to.equal(
                            'rgb(44, 44, 44)',
                        );
                        chart.remove();
                    });
                });
            });
        </script>
    </body>
</html>
