name: IO Studio Deploy
on:
    workflow_call:
        inputs:
            run_tests:
                type: boolean
                required: false
                default: true
            batch_size:
                type: number
                required: false
                default: 5
            rps_limit:
                type: number
                required: false
                default: 5
                # NOTE: batch_size must not exceed rps_limit — each batch fires all requests
                # simultaneously, so a batch larger than the RPS limit would burst past the
                # limit before throttling applies.
            worker_concurrency:
                type: number
                required: false
                default: 2
        secrets:
            ENV:
                required: true
            AIO:
                required: true
            ODIN_BUCKET:
                required: true

jobs:
    tests:
        if: inputs.run_tests == true
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: io/studio

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js 22.22.0
              uses: actions/setup-node@v4
              with:
                  # Pinned: Node 22.23.0 breaks node-fetch v2 gzip handling in aio-cli,
                  # causing ERR_STREAM_PREMATURE_CLOSE when minting IMS tokens on deploy.
                  node-version: '22.22.0'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: io/studio

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 22.22.0
              uses: actions/setup-node@v4
              with:
                  # Pinned: Node 22.23.0 breaks node-fetch v2 gzip handling in aio-cli,
                  # causing ERR_STREAM_PREMATURE_CLOSE when minting IMS tokens on deploy.
                  node-version: '22.22.0'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Prepare .aio and .env files
              env:
                  ENV_CONTENT: ${{ secrets.ENV }}
                  AIO_CONTENT: ${{ secrets.AIO }}
              run: |
                  printf '%s' "$ENV_CONTENT" > .env
                  printf '%s' "$AIO_CONTENT" > .aio

            - name: Deploy
              env:
                  ODIN_ENDPOINT: 'https://author-p22655-${{ secrets.ODIN_BUCKET }}.adobeaemcloud.com'
                  BATCH_SIZE: ${{ inputs.batch_size }}
                  RPS_LIMIT: ${{ inputs.rps_limit }}
                  WORKER_CONCURRENCY: ${{ inputs.worker_concurrency }}
              run: npx aio app deploy -v
