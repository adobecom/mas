<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>M@S Studio — Data Table Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@spectrum-css/tokens@14.6.0/dist/index.css" />
    <script type="importmap">{"imports":{"@spectrum-web-components/":"https://cdn.jsdelivr.net/npm/@spectrum-web-components/"}}</script>
    <script type="module">
        import '@spectrum-web-components/theme/sp-theme.js';
        import '@spectrum-web-components/theme/spectrum-two/scale-medium-core-tokens.js';
        import '@spectrum-web-components/theme/spectrum-two/theme-light-core-tokens.js';
        import '@spectrum-web-components/table/sp-table.js';
        import '@spectrum-web-components/table/sp-table-head.js';
        import '@spectrum-web-components/table/sp-table-head-cell.js';
        import '@spectrum-web-components/table/sp-table-body.js';
        import '@spectrum-web-components/table/sp-table-row.js';
        import '@spectrum-web-components/table/sp-table-cell.js';
        import '@spectrum-web-components/table/sp-table-checkbox-cell.js';
        import '@spectrum-web-components/action-menu/sp-action-menu.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-more.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-edit.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-preview.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-delete.js';
        import '@spectrum-web-components/menu/sp-menu-item.js';
        import '@spectrum-web-components/status-light/sp-status-light.js';
    </script>
    <style>
        body { margin: 0; padding: var(--spectrum-spacing-600); background: var(--spectrum-gray-50); font-family: var(--spectrum-font-family-base); }
    </style>
</head>
<body>
<sp-theme system="spectrum-two" color="light" scale="medium">
    <!-- Pattern: mas-fragment-table — sourced from mas-fragment-table.js:196-280 -->
    <sp-table selects="multiple">
        <sp-table-head>
            <sp-table-checkbox-cell slot="checkbox-cell"></sp-table-checkbox-cell>
            <sp-table-head-cell>Name</sp-table-head-cell>
            <sp-table-head-cell>Title</sp-table-head-cell>
            <sp-table-head-cell>Status</sp-table-head-cell>
            <sp-table-head-cell>Modified by</sp-table-head-cell>
            <sp-table-head-cell>Actions</sp-table-head-cell>
        </sp-table-head>
        <sp-table-body>
            <sp-table-row value="frag-001">
                <sp-table-checkbox-cell slot="checkbox-cell"></sp-table-checkbox-cell>
                <sp-table-cell>creative-cloud-all-apps</sp-table-cell>
                <sp-table-cell>Creative Cloud All Apps</sp-table-cell>
                <sp-table-cell><sp-status-light variant="positive">Published</sp-status-light></sp-table-cell>
                <sp-table-cell>axel@adobe.com</sp-table-cell>
                <sp-table-cell>
                    <sp-action-menu placement="bottom-end" quiet>
                        <sp-icon-more slot="icon"></sp-icon-more>
                        <sp-menu-item><sp-icon-edit slot="icon"></sp-icon-edit>Edit fragment</sp-menu-item>
                        <sp-menu-item><sp-icon-preview slot="icon"></sp-icon-preview>Preview on page</sp-menu-item>
                        <sp-menu-item><sp-icon-delete slot="icon"></sp-icon-delete>Delete</sp-menu-item>
                    </sp-action-menu>
                </sp-table-cell>
            </sp-table-row>
            <sp-table-row value="frag-002">
                <sp-table-checkbox-cell slot="checkbox-cell"></sp-table-checkbox-cell>
                <sp-table-cell>photoshop-annual</sp-table-cell>
                <sp-table-cell>Photoshop Annual Plan</sp-table-cell>
                <sp-table-cell><sp-status-light variant="notice">Modified</sp-status-light></sp-table-cell>
                <sp-table-cell>axel@adobe.com</sp-table-cell>
                <sp-table-cell>
                    <sp-action-menu placement="bottom-end" quiet>
                        <sp-icon-more slot="icon"></sp-icon-more>
                        <sp-menu-item><sp-icon-edit slot="icon"></sp-icon-edit>Edit fragment</sp-menu-item>
                        <sp-menu-item><sp-icon-preview slot="icon"></sp-icon-preview>Preview on page</sp-menu-item>
                        <sp-menu-item><sp-icon-delete slot="icon"></sp-icon-delete>Delete</sp-menu-item>
                    </sp-action-menu>
                </sp-table-cell>
            </sp-table-row>
        </sp-table-body>
    </sp-table>
</sp-theme>
</body>
</html>
