<!doctype html>
<html>
    <head>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>mas-settings visual fixture</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../../style.css" />
        <style>
            body {
                margin: 0;
            }

            sp-theme {
                display: block;
                width: 100%;
            }
        </style>
    </head>
    <body>
        <sp-theme system="spectrum-two" color="light" scale="medium">
            <mas-settings id="settings-page"></mas-settings>
        </sp-theme>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import '../../src/swc.js';
            import '../../src/settings/mas-settings.js';
            import Store from '../../src/store.js';
            import { PAGE_NAMES } from '../../src/constants.js';
            import {
                createDefaultSettingsReferences,
                createQueryBuilderFetchMock,
                createSettingReference,
                createSettingsIndexAemMock,
                waitForSettingRows,
            } from './settings-test-helpers.js';

            const defaultReferences = createDefaultSettingsReferences();
            const referencesWithOverride = [
                createSettingReference({
                    id: 'setting-show-addon',
                    title: 'Show Addon',
                    name: 'showAddon',
                    label: 'Show Addon',
                    status: 'PUBLISHED',
                    templates: ['catalog'],
                    locales: [],
                }),
                createSettingReference({
                    id: 'setting-show-addon-fr',
                    title: 'Show Addon FR',
                    name: 'showAddon',
                    label: 'Show Addon',
                    fieldName: 'entries',
                    status: 'PUBLISHED',
                    templates: ['plans'],
                    locales: ['fr_FR'],
                    value: false,
                    path: '/content/dam/mas/acom/settings/setting-show-addon-fr',
                }),
                ...defaultReferences.filter((reference) => reference.id !== 'setting-show-addon'),
            ];

            const nativeFetch = window.fetch.bind(window);
            window.fetch = createQueryBuilderFetchMock(nativeFetch);

            const waitForUpdates = async (el, count = 2) => {
                for (let i = 0; i < count; i++) {
                    await el.updateComplete;
                    await new Promise((resolve) => setTimeout(resolve, 0));
                }
            };

            const clickEditorAction = (settingsPage, title) => {
                const actionEventMap = {
                    Save: 'save',
                    Duplicate: 'duplicate',
                    Publish: 'publish',
                    Cancel: 'cancel',
                    Delete: 'delete',
                };
                const actionBar = settingsPage.shadowRoot.querySelector('#settings-editor-action-bar');
                actionBar.dispatchEvent(
                    new CustomEvent(actionEventMap[title], {
                        bubbles: true,
                        composed: true,
                    }),
                );
            };

            const setupPage = async ({
                references = defaultReferences,
                expectedRows = 5,
                aem = null,
                fragmentId = null,
                creating = false,
            } = {}) => {
                const settingsPage = document.querySelector('#settings-page');
                Store.settings.destroy();
                Store.settings.setAem(null);

                Store.search.set({ path: 'acom' });
                Store.page.set(PAGE_NAMES.SETTINGS);
                Store.filters.set({ ...Store.filters.get(), locale: 'en_US' });
                Store.settings.fragmentId.set(fragmentId);
                Store.settings.creating.set(creating);

                settingsPage.dialog = null;
                settingsPage.showDiscardDialog = false;
                const { aem: generatedAem, calls } = createSettingsIndexAemMock({ references });
                settingsPage.aem = aem || generatedAem;
                await waitForUpdates(settingsPage, 2);

                const table = settingsPage.shadowRoot.querySelector('#settings-table');
                if (expectedRows !== null) await waitForSettingRows(table, expectedRows);

                return { settingsPage, table, calls };
            };

            runTests(async () => {
                describe('mas-settings visual fixture', () => {
                    afterEach(() => {
                        Store.settings.destroy();
                        Store.settings.setAem(null);
                        Store.settings.fragmentId.set(null);
                        Store.settings.creating.set(false);
                    });

                    after(() => {
                        window.fetch = nativeFetch;
                    });

                    it('renders settings page and table', async () => {
                        const { settingsPage, table, calls } = await setupPage();

                        expect(settingsPage.shadowRoot.querySelector('#title').textContent.trim()).to.equal('Settings');
                        expect(calls.getByPath[0].path).to.equal('/content/dam/mas/acom/settings/index');
                        expect(calls.getByPath[0].options).to.deep.equal({ references: 'direct-hydrated' });
                        expect(table.shadowRoot.querySelectorAll('mas-setting-item').length).to.equal(5);
                    });

                    it('opens create and edit dialogs from route state', async () => {
                        const { settingsPage } = await setupPage();

                        settingsPage.shadowRoot.querySelector('#create-setting-button').click();
                        await waitForUpdates(settingsPage, 2);
                        const createEditor = settingsPage.shadowRoot.querySelector('#settings-editor-page');
                        expect(createEditor).to.exist;
                        expect(Store.page.get()).to.equal(PAGE_NAMES.SETTINGS_EDITOR);
                        expect(settingsPage.shadowRoot.querySelector('#settings-editor-action-bar')).to.exist;

                        Store.settings.creating.set(false);
                        Store.settings.fragmentId.set('setting-show-addon');
                        await waitForUpdates(settingsPage, 2);
                        const editEditor = settingsPage.shadowRoot.querySelector('#settings-editor-page');
                        expect(editEditor).to.exist;
                        expect(settingsPage.shadowRoot.querySelector('[name="setting-name-page"]').value).to.equal('showAddon');
                    });

                    it('creates setting with expected payload', async () => {
                        const { settingsPage } = await setupPage();
                        const capturedPayloads = [];
                        const originalCreate = Store.settings.createSetting;
                        Store.settings.createSetting = async (payload) => {
                            capturedPayloads.push(payload);
                            return 'setting-created';
                        };

                        settingsPage.shadowRoot.querySelector('#create-setting-button').click();
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            name: 'showFeatureFlag',
                            label: 'Show Feature Flag',
                            description: 'Flag description',
                            templateIds: ['catalog'],
                            tags: ['mas:keyword/checkout'],
                            value: 'enabled',
                        };
                        await waitForUpdates(settingsPage, 1);

                        clickEditorAction(settingsPage, 'Save');
                        await waitForUpdates(settingsPage, 2);

                        expect(capturedPayloads.length).to.equal(1);
                        expect(capturedPayloads[0]).to.deep.equal({
                            label: 'Show Feature Flag',
                            name: 'showFeatureFlag',
                            description: 'Flag description',
                            templateIds: ['catalog'],
                            tags: ['mas:keyword/checkout'],
                            valueType: 'text',
                            value: 'enabled',
                        });
                        expect(Store.settings.creating.get()).to.equal(false);
                        expect(Store.settings.fragmentId.get()).to.equal('setting-created');
                        expect(Store.page.get()).to.equal(PAGE_NAMES.SETTINGS_EDITOR);
                        Store.settings.createSetting = originalCreate;
                    });

                    it('updates setting with correct fragment id and payload', async () => {
                        const { settingsPage } = await setupPage();
                        const capturedCalls = [];
                        const originalUpdate = Store.settings.updateSetting;
                        Store.settings.updateSetting = async (fragmentId, payload) => {
                            capturedCalls.push({ fragmentId, payload });
                            return true;
                        };

                        Store.settings.fragmentId.set('setting-show-addon');
                        await waitForUpdates(settingsPage, 4);
                        expect(Store.page.get()).to.equal(PAGE_NAMES.SETTINGS_EDITOR);
                        expect(settingsPage.shadowRoot.querySelector('#settings-editor-action-bar')).to.exist;
                        settingsPage.form = {
                            ...settingsPage.form,
                            label: 'Show Addon Updated',
                            name: 'showAddon',
                            description: 'Updated description',
                            templateIds: ['plans'],
                            tags: ['mas:keyword/design'],
                            value: false,
                        };
                        clickEditorAction(settingsPage, 'Save');
                        await waitForUpdates(settingsPage, 2);

                        expect(capturedCalls.length).to.equal(1);
                        expect(capturedCalls[0]).to.deep.equal({
                            fragmentId: 'setting-show-addon',
                            payload: {
                                label: 'Show Addon Updated',
                                name: 'showAddon',
                                description: 'Updated description',
                                templateIds: ['plans'],
                                tags: ['mas:keyword/design'],
                                valueType: 'boolean',
                                value: false,
                            },
                        });
                        Store.settings.updateSetting = originalUpdate;
                    });

                    it('opens override dialog and submits override payload', async () => {
                        const { settingsPage, table } = await setupPage({ references: referencesWithOverride });
                        const capturedCalls = [];
                        const originalAddOverride = Store.settings.addOverride;
                        Store.settings.addOverride = async (rowId, payload) => {
                            capturedCalls.push({ rowId, payload });
                            return true;
                        };

                        table.dispatchEvent(
                            new CustomEvent('setting-add-override', {
                                detail: { id: 'setting-show-addon' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            locales: ['de_DE'],
                            templateIds: ['plans'],
                            tags: ['mas:keyword/design'],
                            value: false,
                        };
                        await waitForUpdates(settingsPage, 1);

                        const overrideDialog = settingsPage.shadowRoot.querySelector('sp-dialog.override-dialog');
                        expect(overrideDialog).to.exist;
                        const saveDraftButton = [...overrideDialog.querySelectorAll('sp-button[slot="button"]')].find((button) =>
                            button.textContent.includes('Save as draft'),
                        );
                        saveDraftButton.click();
                        await waitForUpdates(settingsPage, 2);

                        expect(capturedCalls.length).to.equal(1);
                        expect(capturedCalls[0].rowId).to.equal('setting-show-addon');
                        expect(capturedCalls[0].payload.locales).to.deep.equal(['de_DE']);
                        expect(capturedCalls[0].payload.templateIds).to.deep.equal(['plans']);
                        expect(capturedCalls[0].payload.tags).to.deep.equal(['mas:keyword/design']);
                        expect(capturedCalls[0].payload.valueType).to.equal('boolean');
                        expect(capturedCalls[0].payload.value).to.equal(false);
                        Store.settings.addOverride = originalAddOverride;
                    });

                    it('publishes override from dialog publish action', async () => {
                        const { settingsPage, table } = await setupPage({ references: referencesWithOverride });
                        const originalAddOverride = Store.settings.addOverride;
                        const originalPublishOverride = Store.settings.publishOverride;
                        const calls = [];
                        Store.settings.addOverride = async (rowId, payload) => {
                            calls.push(['add', rowId, payload]);
                            return 'new-override-id';
                        };
                        Store.settings.publishOverride = async (overrideId) => {
                            calls.push(['publish', overrideId]);
                            return true;
                        };

                        table.dispatchEvent(
                            new CustomEvent('setting-add-override', {
                                detail: { id: 'setting-show-addon' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            locales: ['de_DE'],
                            templateIds: ['plans'],
                            tags: ['mas:keyword/design'],
                            value: false,
                        };
                        await waitForUpdates(settingsPage, 1);

                        const overrideDialog = settingsPage.shadowRoot.querySelector('sp-dialog.override-dialog');
                        const publishButton = [...overrideDialog.querySelectorAll('sp-button[slot="button"]')].find((button) =>
                            button.textContent.includes('Publish'),
                        );
                        publishButton.click();
                        await waitForUpdates(settingsPage, 2);

                        expect(calls.length).to.equal(2);
                        expect(calls[0][0]).to.equal('add');
                        expect(calls[0][1]).to.equal('setting-show-addon');
                        expect(calls[1]).to.deep.equal(['publish', 'new-override-id']);
                        Store.settings.addOverride = originalAddOverride;
                        Store.settings.publishOverride = originalPublishOverride;
                    });

                    it('renders name as picker and hides value type section', async () => {
                        const { settingsPage } = await setupPage();
                        settingsPage.shadowRoot.querySelector('#create-setting-button').click();
                        await waitForUpdates(settingsPage, 2);

                        const namePicker = settingsPage.shadowRoot.querySelector('sp-picker[name="setting-name-page"]');
                        expect(namePicker).to.exist;
                        expect(settingsPage.shadowRoot.textContent.includes('Value type')).to.equal(false);
                    });

                    it('renders quantity select custom value editor when mapped name is quantitySelect', async () => {
                        const { settingsPage } = await setupPage();
                        const capturedPayloads = [];
                        const originalCreate = Store.settings.createSetting;
                        Store.settings.createSetting = async (payload) => {
                            capturedPayloads.push(payload);
                            return 'setting-created-quantity';
                        };

                        settingsPage.shadowRoot.querySelector('#create-setting-button').click();
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            name: 'quantitySelect',
                            label: 'Quantity Select',
                            description: 'Quantity selector setting',
                            templateIds: ['catalog'],
                            tags: [],
                        };
                        await waitForUpdates(settingsPage, 2);

                        const quantitySelect = settingsPage.shadowRoot.querySelector('quantity-select-field');
                        expect(quantitySelect).to.exist;
                        quantitySelect.dispatchEvent(
                            new CustomEvent('change', {
                                detail: { value: '<merch-quantity-select title="Qty" min="2" max="10" step="2"></merch-quantity-select>' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 1);

                        clickEditorAction(settingsPage, 'Save');
                        await waitForUpdates(settingsPage, 2);

                        expect(capturedPayloads[0]).to.deep.equal({
                            label: 'Quantity Select',
                            name: 'quantitySelect',
                            description: 'Quantity selector setting',
                            templateIds: ['catalog'],
                            tags: [],
                            valueType: 'text',
                            value: '<merch-quantity-select title="Qty" min="2" max="10" step="2"></merch-quantity-select>',
                        });
                        Store.settings.createSetting = originalCreate;
                    });

                    it('shows conflict state for duplicate override locale', async () => {
                        const { settingsPage, table } = await setupPage({ references: referencesWithOverride });
                        const originalAddOverride = Store.settings.addOverride;
                        let addOverrideCalls = 0;
                        Store.settings.addOverride = async () => {
                            addOverrideCalls++;
                            return true;
                        };

                        table.dispatchEvent(
                            new CustomEvent('setting-add-override', {
                                detail: { id: 'setting-show-addon' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            locales: ['fr_FR'],
                        };
                        await waitForUpdates(settingsPage, 1);
                        const overrideDialog = settingsPage.shadowRoot.querySelector('sp-dialog.override-dialog');
                        const saveDraftButton = [...overrideDialog.querySelectorAll('sp-button[slot="button"]')].find((button) =>
                            button.textContent.includes('Save as draft'),
                        );
                        expect(saveDraftButton.hasAttribute('disabled')).to.equal(true);
                        saveDraftButton.click();
                        await waitForUpdates(settingsPage, 2);

                        expect(settingsPage.shadowRoot.querySelector('.override-conflict')).to.exist;
                        expect(addOverrideCalls).to.equal(0);
                        Store.settings.addOverride = originalAddOverride;
                    });

                    it('opens duplicate, publish, unpublish, and delete override confirm dialogs', async () => {
                        const { settingsPage, table } = await setupPage({ references: referencesWithOverride });
                        const originalDuplicateOverride = Store.settings.duplicateOverride;
                        const originalPublish = Store.settings.publishSetting;
                        const originalUnpublish = Store.settings.unpublishSetting;
                        const originalRemoveOverride = Store.settings.removeOverride;
                        const capturedCalls = [];
                        Store.settings.duplicateOverride = async (rowId, overrideId) => {
                            capturedCalls.push(['duplicate-override', rowId, overrideId]);
                            return true;
                        };
                        Store.settings.publishSetting = async (rowId) => {
                            capturedCalls.push(['publish', rowId]);
                            return true;
                        };
                        Store.settings.unpublishSetting = async (rowId) => {
                            capturedCalls.push(['unpublish', rowId]);
                            return true;
                        };
                        Store.settings.removeOverride = async (rowId, overrideId) => {
                            capturedCalls.push(['delete-override', rowId, overrideId]);
                            return true;
                        };

                        table.dispatchEvent(
                            new CustomEvent('setting-duplicate', {
                                detail: {
                                    id: 'setting-show-addon-fr',
                                    parentId: 'setting-show-addon',
                                    isOverride: true,
                                },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);
                        expect(settingsPage.shadowRoot.querySelector('.confirm-title').textContent.trim()).to.equal(
                            'Duplicate this setting?',
                        );
                        settingsPage.shadowRoot.querySelector('sp-dialog-wrapper').dispatchEvent(new Event('confirm'));
                        await waitForUpdates(settingsPage, 2);

                        table.dispatchEvent(
                            new CustomEvent('setting-publish', {
                                detail: { id: 'setting-show-addon' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);
                        expect(settingsPage.shadowRoot.querySelector('.confirm-title').textContent.trim()).to.equal(
                            'Publish this setting?',
                        );
                        settingsPage.shadowRoot.querySelector('sp-dialog-wrapper').dispatchEvent(new Event('confirm'));
                        await waitForUpdates(settingsPage, 2);

                        table.dispatchEvent(
                            new CustomEvent('setting-unpublish', {
                                detail: { id: 'setting-show-addon' },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);
                        expect(settingsPage.shadowRoot.querySelector('.confirm-title').textContent.trim()).to.equal(
                            'Unpublish this setting?',
                        );
                        settingsPage.shadowRoot.querySelector('sp-dialog-wrapper').dispatchEvent(new Event('confirm'));
                        await waitForUpdates(settingsPage, 2);

                        table.dispatchEvent(
                            new CustomEvent('setting-delete', {
                                detail: {
                                    id: 'setting-show-addon-fr',
                                    parentId: 'setting-show-addon',
                                    isOverride: true,
                                },
                                bubbles: true,
                                composed: true,
                            }),
                        );
                        await waitForUpdates(settingsPage, 2);
                        expect(settingsPage.shadowRoot.querySelector('.confirm-title').textContent.trim()).to.equal(
                            'Delete this setting override?',
                        );
                        settingsPage.shadowRoot.querySelector('sp-dialog-wrapper').dispatchEvent(new Event('confirm'));
                        await waitForUpdates(settingsPage, 2);

                        expect(capturedCalls).to.deep.equal([
                            ['duplicate-override', 'setting-show-addon', 'setting-show-addon-fr'],
                            ['publish', 'setting-show-addon'],
                            ['unpublish', 'setting-show-addon'],
                            ['delete-override', 'setting-show-addon', 'setting-show-addon-fr'],
                        ]);
                        Store.settings.duplicateOverride = originalDuplicateOverride;
                        Store.settings.publishSetting = originalPublish;
                        Store.settings.unpublishSetting = originalUnpublish;
                        Store.settings.removeOverride = originalRemoveOverride;
                    });

                    it('shows discard confirmation when canceling with unsaved changes', async () => {
                        const { settingsPage } = await setupPage();
                        settingsPage.shadowRoot.querySelector('#create-setting-button').click();
                        await waitForUpdates(settingsPage, 2);

                        settingsPage.form = {
                            ...settingsPage.form,
                            name: 'changed-name',
                        };
                        await waitForUpdates(settingsPage, 1);
                        clickEditorAction(settingsPage, 'Cancel');
                        await waitForUpdates(settingsPage, 2);

                        const discardDialog = settingsPage.shadowRoot.querySelector('#discard-confirmation-dialog');
                        expect(discardDialog).to.exist;
                        discardDialog.dispatchEvent(new Event('confirm'));
                        await waitForUpdates(settingsPage, 2);
                        expect(settingsPage.shadowRoot.querySelector('#discard-confirmation-dialog')).to.equal(null);
                    });

                    it('does not render edit dialog until row data is loaded', async () => {
                        let resolveIndex;
                        const delayedAem = {
                            sites: {
                                cf: {
                                    fragments: {
                                        getByPath: () =>
                                            new Promise((resolve) => {
                                                resolveIndex = resolve;
                                            }),
                                    },
                                },
                            },
                        };

                        const { settingsPage } = await setupPage({
                            expectedRows: null,
                            aem: delayedAem,
                            fragmentId: 'setting-show-addon',
                            creating: false,
                        });
                        expect(settingsPage.shadowRoot.querySelector('#settings-editor-page')).to.equal(null);

                        resolveIndex({
                            id: 'settings-index',
                            path: '/content/dam/mas/acom/settings/index',
                            fields: [{ name: 'entries', values: defaultReferences.map((item) => item.path) }],
                            references: defaultReferences,
                        });
                        await waitForUpdates(settingsPage, 3);
                        expect(settingsPage.shadowRoot.querySelector('#settings-editor-page')).to.exist;
                    });
                });

                describe('mas-settings:dev', () => {
                    it('single case: render 2 rows, first expanded with 2 overrides', async () => {
                        const references = [
                            createSettingReference({
                                id: 'setting-show-addon',
                                title: 'Show Addon',
                                name: 'showAddon',
                                label: 'Show Addon',
                                templates: ['catalog'],
                                locales: [],
                                fieldName: 'entries',
                            }),
                            createSettingReference({
                                id: 'setting-show-addon-fr',
                                title: 'Show Addon FR',
                                name: 'showAddon',
                                label: 'Show Addon',
                                templates: ['plans'],
                                locales: ['fr_FR'],
                                fieldName: 'entries',
                                path: '/content/dam/mas/acom/settings/setting-show-addon-fr',
                            }),
                            createSettingReference({
                                id: 'setting-show-addon-de',
                                title: 'Show Addon DE',
                                name: 'showAddon',
                                label: 'Show Addon',
                                templates: ['mini'],
                                locales: ['de_DE'],
                                fieldName: 'entries',
                                path: '/content/dam/mas/acom/settings/setting-show-addon-de',
                            }),
                            createSettingReference({
                                id: 'setting-show-plan-type',
                                title: 'Show Plan type',
                                name: 'showPlanType',
                                label: 'Show Plan type',
                                templates: ['catalog'],
                                locales: [],
                                fieldName: 'entries',
                            }),
                        ];

                        const { settingsPage, table } = await setupPage({ references, expectedRows: 2 });
                        Store.settings.expandedRowIds.set(['setting-show-addon']);
                        await waitForUpdates(settingsPage, 2);
                        await waitForSettingRows(table, 2);

                        const rows = [...table.shadowRoot.querySelectorAll('mas-setting-item')];
                        expect(rows.length).to.equal(2);
                        expect(rows[0].querySelector('.setting-label').textContent.trim()).to.equal('Show Addon');
                        expect(rows[1].querySelector('.setting-label').textContent.trim()).to.equal('Show Plan type');

                        const overrideTable = table.shadowRoot.querySelector('.override-table');
                        expect(overrideTable).to.exist;
                        const overrideRows = [...overrideTable.querySelectorAll('.override-table-row')];
                        expect(overrideRows.length).to.equal(2);
                        expect(overrideRows[0].textContent).to.include('fr_FR');
                        expect(overrideRows[1].textContent).to.include('de_DE');
                        expect(Store.settings.isExpanded('setting-show-addon')).to.equal(true);
                    });
                });
            });
        </script>
    </body>
</html>
