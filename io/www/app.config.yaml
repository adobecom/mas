application:
    actions: actions
    web: web-src
    hooks:
        test: npm run test
    runtimeManifest:
        packages:
            MerchAtScale:
                license: Apache-2.0
                actions:
                    fragment:
                        function: src/fragment/pipeline.js
                        web: 'yes'
                        runtime: nodejs:22
                        limits:
                            concurrency: 20
                            memory: 1024
                        annotations:
                            require-adobe-auth: false
                            final: true
                    health-check:
                        function: src/health-check/index.js
                        web: 'yes'
                        runtime: nodejs:22
                        inputs:
                            ODIN_CDN_ENDPOINT: $ODIN_CDN_ENDPOINT
                            ODIN_ORIGIN_ENDPOINT: $ODIN_ORIGIN_ENDPOINT
                            WCS_CDN_ENDPOINT: $WCS_CDN_ENDPOINT
                            WCS_ORIGIN_ENDPOINT: $WCS_ORIGIN_ENDPOINT
                        annotations:
                            require-adobe-auth: false
                            final: true
                    agent:
                        function: src/agent/handler.js
                        web: 'yes'
                        runtime: nodejs:22
                        annotations:
                            require-adobe-auth: false
                            final: true
