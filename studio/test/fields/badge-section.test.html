<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { html } from 'lit';
            import { fixture, fixtureCleanup } from '@open-wc/testing-helpers/pure';
            import '../../src/swc.js';
            import { parseBadgeHtml, serializeBadgeHtml } from '../../src/fields/badge-section.js';
            import { spTheme, oneEvent } from '../utils.js';

            const BADGE_COLORS = ['spectrum-yellow-300-plans', 'spectrum-gray-300-plans'];
            const BORDER_COLORS = ['spectrum-yellow-300-plans', 'gradient-purple-blue'];

            runTests(async () => {
                describe('parseBadgeHtml', () => {
                    it('returns empty fields for null/undefined', () => {
                        expect(parseBadgeHtml(null)).to.deep.equal({ text: '', bgColor: '', borderColor: '', icon: '' });
                        expect(parseBadgeHtml(undefined)).to.deep.equal({ text: '', bgColor: '', borderColor: '', icon: '' });
                        expect(parseBadgeHtml('')).to.deep.equal({ text: '', bgColor: '', borderColor: '', icon: '' });
                    });

                    it('returns text only for plain string', () => {
                        expect(parseBadgeHtml('Best value')).to.deep.equal({
                            text: 'Best value',
                            bgColor: '',
                            borderColor: '',
                            icon: '',
                        });
                    });

                    it('parses merch-badge HTML with all attributes', () => {
                        const value =
                            '<merch-badge background-color="spectrum-yellow-300-plans" border-color="spectrum-gray-300-plans" icon="sp-icon-star">Sale</merch-badge>';
                        expect(parseBadgeHtml(value)).to.deep.equal({
                            text: 'Sale',
                            bgColor: 'spectrum-yellow-300-plans',
                            borderColor: 'spectrum-gray-300-plans',
                            icon: 'sp-icon-star',
                        });
                    });

                    it('parses merch-badge HTML with only background-color', () => {
                        const value = '<merch-badge background-color="spectrum-green-900-plans">Promo</merch-badge>';
                        const result = parseBadgeHtml(value);
                        expect(result.text).to.equal('Promo');
                        expect(result.bgColor).to.equal('spectrum-green-900-plans');
                        expect(result.borderColor).to.equal('');
                        expect(result.icon).to.equal('');
                    });

                    it('lowercases attribute values', () => {
                        const value = '<merch-badge background-color="Spectrum-Yellow-300-Plans">Text</merch-badge>';
                        expect(parseBadgeHtml(value).bgColor).to.equal('spectrum-yellow-300-plans');
                    });

                    it('preserves inner HTML when an inline-price span is present', () => {
                        const inner = '<span is="inline-price" data-wcs-osi="abc"></span>';
                        const value = `<merch-badge background-color="spectrum-yellow-300-plans">${inner}</merch-badge>`;
                        expect(parseBadgeHtml(value).text).to.equal(inner);
                    });
                });

                describe('serializeBadgeHtml', () => {
                    it('returns empty string when text is empty', () => {
                        expect(serializeBadgeHtml({ text: '', bgColor: 'red', borderColor: '', icon: '' })).to.equal('');
                    });

                    it('returns plain text when no color, icon, or variant', () => {
                        expect(serializeBadgeHtml({ text: 'Badge', bgColor: '', borderColor: '', icon: '' })).to.equal('Badge');
                    });

                    it('serializes with background-color', () => {
                        const result = serializeBadgeHtml({
                            text: 'Sale',
                            bgColor: 'spectrum-yellow-300-plans',
                            borderColor: '',
                            icon: '',
                        });
                        expect(result).to.equal('<merch-badge background-color="spectrum-yellow-300-plans">Sale</merch-badge>');
                    });

                    it('serializes with background-color and border-color', () => {
                        const result = serializeBadgeHtml({
                            text: 'Promo',
                            bgColor: 'spectrum-gray-300-plans',
                            borderColor: 'spectrum-yellow-300-plans',
                            icon: '',
                        });
                        expect(result).to.equal(
                            '<merch-badge background-color="spectrum-gray-300-plans" border-color="spectrum-yellow-300-plans">Promo</merch-badge>',
                        );
                    });

                    it('adds color="#fff" for a dark background', () => {
                        const result = serializeBadgeHtml({
                            text: 'Go',
                            bgColor: 'spectrum-green-900-plans',
                            borderColor: '',
                            icon: '',
                        });
                        expect(result).to.equal(
                            '<merch-badge background-color="spectrum-green-900-plans" color="#fff">Go</merch-badge>',
                        );
                    });

                    it('includes the variant attribute when provided', () => {
                        const result = serializeBadgeHtml({
                            text: 'New',
                            bgColor: 'spectrum-yellow-300-plans',
                            borderColor: '',
                            icon: '',
                            variant: 'plans',
                        });
                        expect(result).to.equal(
                            '<merch-badge background-color="spectrum-yellow-300-plans" variant="plans">New</merch-badge>',
                        );
                    });

                    it('skips a border-color of "Default"', () => {
                        const result = serializeBadgeHtml({
                            text: 'X',
                            bgColor: 'spectrum-yellow-300-plans',
                            borderColor: 'Default',
                            icon: '',
                        });
                        expect(result).to.equal('<merch-badge background-color="spectrum-yellow-300-plans">X</merch-badge>');
                    });

                    it('serializes with all fields including dark-bg color and variant', () => {
                        const result = serializeBadgeHtml({
                            text: 'Go',
                            bgColor: 'spectrum-green-900-plans',
                            borderColor: 'gradient-purple-blue',
                            icon: 'sp-icon-star',
                            variant: 'plans',
                        });
                        expect(result).to.equal(
                            '<merch-badge background-color="spectrum-green-900-plans" color="#fff" border-color="gradient-purple-blue" icon="sp-icon-star" variant="plans">Go</merch-badge>',
                        );
                    });
                });

                describe('badge-section component', () => {
                    const mount = (template) => fixture(template, { parentNode: spTheme() });

                    afterEach(() => fixtureCleanup());

                    it('renders an empty rte-field by default', async () => {
                        const el = await mount(html`<badge-section></badge-section>`);
                        await el.updateComplete;

                        const rteField = el.querySelector('rte-field');
                        expect(rteField).to.exist;
                        expect(rteField.value).to.equal('');
                    });

                    it('renders plain-text value when colors are unsupported', async () => {
                        const el = await mount(html`<badge-section .value=${'Best value'}></badge-section>`);
                        await el.updateComplete;
                        expect(el.querySelector('rte-field').value).to.equal('Best value');
                    });

                    it('parses merch-badge text when show-colors is set', async () => {
                        const value = '<merch-badge background-color="spectrum-yellow-300-plans">Sale</merch-badge>';
                        const el = await mount(
                            html`<badge-section show-colors .value=${value} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;
                        expect(el.querySelector('rte-field').value).to.equal('Sale');
                    });

                    it('does not render color pickers when there is no text', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                .colors=${BADGE_COLORS}
                                .borderColors=${BORDER_COLORS}
                            ></badge-section>`,
                        );
                        await el.updateComplete;
                        expect(el.querySelector('sp-picker')).to.be.null;
                    });

                    it('renders both color pickers when show-colors and text are present', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                                .borderColors=${BORDER_COLORS}
                            ></badge-section>`,
                        );
                        await el.updateComplete;
                        expect(el.querySelectorAll('sp-picker').length).to.equal(2);
                    });

                    it('renders the icon field only with show-icon and text', async () => {
                        const withoutText = await mount(
                            html`<badge-section show-colors show-icon .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await withoutText.updateComplete;
                        const iconField = withoutText.querySelector('mas-mnemonic-field');
                        expect(iconField.style.display).to.equal('none');

                        const withText = await mount(
                            html`<badge-section
                                show-colors
                                show-icon
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                            ></badge-section>`,
                        );
                        await withText.updateComplete;
                        expect(withText.querySelector('mas-mnemonic-field').style.display).to.equal('block');
                    });

                    it('does not render an icon field without show-icon', async () => {
                        const el = await mount(
                            html`<badge-section show-colors .value=${'Badge'} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;
                        expect(el.querySelector('mas-mnemonic-field')).to.be.null;
                    });

                    it('emits change with the text on rte change (plain-text mode)', async () => {
                        const el = await mount(html`<badge-section .value=${''}></badge-section>`);
                        await el.updateComplete;

                        const rteField = el.querySelector('rte-field');
                        rteField.value = 'New badge';
                        const listener = oneEvent(el, 'change');
                        rteField.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal('New badge');
                        expect(el.value).to.equal('New badge');
                    });

                    it('preserves existing colors when the text changes', async () => {
                        const initial = '<merch-badge background-color="spectrum-yellow-300-plans">Old</merch-badge>';
                        const el = await mount(
                            html`<badge-section show-colors .value=${initial} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;

                        const rteField = el.querySelector('rte-field');
                        rteField.value = 'New';
                        const listener = oneEvent(el, 'change');
                        rteField.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal(
                            '<merch-badge background-color="spectrum-yellow-300-plans">New</merch-badge>',
                        );
                    });

                    it('emits an updated bgColor when the badge color picker changes', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                                .borderColors=${BORDER_COLORS}
                            ></badge-section>`,
                        );
                        await el.updateComplete;

                        const [bgPicker] = el.querySelectorAll('sp-picker');
                        bgPicker.value = 'spectrum-yellow-300-plans';
                        const listener = oneEvent(el, 'change');
                        bgPicker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal(
                            '<merch-badge background-color="spectrum-yellow-300-plans">Badge</merch-badge>',
                        );
                    });

                    it('emits an updated borderColor when the border picker changes', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                                .borderColors=${BORDER_COLORS}
                            ></badge-section>`,
                        );
                        await el.updateComplete;

                        const [, borderPicker] = el.querySelectorAll('sp-picker');
                        borderPicker.value = 'gradient-purple-blue';
                        const listener = oneEvent(el, 'change');
                        borderPicker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal(
                            '<merch-badge border-color="gradient-purple-blue">Badge</merch-badge>',
                        );
                    });

                    it('clears bgColor when Default is selected', async () => {
                        const initial = '<merch-badge background-color="spectrum-yellow-300-plans">Badge</merch-badge>';
                        const el = await mount(
                            html`<badge-section show-colors .value=${initial} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;

                        const [bgPicker] = el.querySelectorAll('sp-picker');
                        bgPicker.value = 'Default';
                        const listener = oneEvent(el, 'change');
                        bgPicker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal('Badge');
                    });

                    it('stores transparent (lowercase) when Transparent is selected', async () => {
                        const el = await mount(
                            html`<badge-section show-colors .value=${'Badge'} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;

                        const [bgPicker] = el.querySelectorAll('sp-picker');
                        bgPicker.value = 'Transparent';
                        const listener = oneEvent(el, 'change');
                        bgPicker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
                        const event = await listener;

                        expect(event.detail.value).to.equal('<merch-badge background-color="transparent">Badge</merch-badge>');
                    });

                    it('emits an updated icon when the mnemonic field changes', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                show-icon
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                            ></badge-section>`,
                        );
                        await el.updateComplete;

                        const iconField = el.querySelector('mas-mnemonic-field');
                        const listener = oneEvent(el, 'change');
                        iconField.dispatchEvent(
                            new CustomEvent('change', { detail: { icon: 'sp-icon-star' }, bubbles: true, composed: true }),
                        );
                        const event = await listener;

                        expect(event.detail.value).to.equal('<merch-badge icon="sp-icon-star">Badge</merch-badge>');
                    });

                    it('offers Default and Transparent options plus a swatch for each color', async () => {
                        const el = await mount(
                            html`<badge-section show-colors .value=${'Badge'} .colors=${BADGE_COLORS}></badge-section>`,
                        );
                        await el.updateComplete;

                        const picker = el.querySelector('sp-picker');
                        const items = picker.querySelectorAll('sp-menu-item');
                        expect(items.length).to.equal(BADGE_COLORS.length + 2); // Default + Transparent + colors
                        const values = [...items].map((i) => i.getAttribute('value'));
                        expect(values).to.include('Default');
                        expect(values).to.include('Transparent');
                        expect(picker.querySelectorAll('.color-swatch').length).to.equal(BADGE_COLORS.length);
                    });

                    it('does not show an override indicator when not a variation', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                                .fieldStates=${{ text: 'overridden' }}
                            ></badge-section>`,
                        );
                        await el.updateComplete;
                        expect(el.querySelector('.field-status-indicator')).to.be.null;
                    });

                    it('fires a restore event from the override indicator when a component is overridden', async () => {
                        const el = await mount(
                            html`<badge-section
                                show-colors
                                is-variation
                                field="badge"
                                .value=${'Badge'}
                                .colors=${BADGE_COLORS}
                                .fieldStates=${{ text: 'overridden' }}
                            ></badge-section>`,
                        );
                        await el.updateComplete;

                        const restoreLink = el.querySelector('.field-status-restore-link');
                        expect(restoreLink).to.exist;
                        const listener = oneEvent(el, 'restore');
                        restoreLink.click();
                        const event = await listener;

                        expect(event.detail).to.deep.equal({ field: 'badge', component: 'text' });
                    });
                });
            });
        </script>
        <main><sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme></main>
    </body>
</html>
