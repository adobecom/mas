<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>M@S Studio — Side Nav Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@spectrum-css/tokens@14.6.0/dist/index.css" />
    <script type="importmap">{"imports":{"@spectrum-web-components/":"https://cdn.jsdelivr.net/npm/@spectrum-web-components/"}}</script>
    <script type="module">
        import '@spectrum-web-components/theme/sp-theme.js';
        import '@spectrum-web-components/theme/spectrum-two/scale-medium-core-tokens.js';
        import '@spectrum-web-components/theme/spectrum-two/theme-light-core-tokens.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-save-floppy.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-preview.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-publish.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-duplicate.js';

        import '@spectrum-web-components/icons-workflow/icons/sp-icon-add.js';
    </script>
    <style>
        body { margin: 0; background: var(--spectrum-gray-50); font-family: var(--spectrum-font-family-base); }
        .nav-container { width: 64px; min-height: 100vh; background: var(--spectrum-white); border-right: 1px solid var(--spectrum-gray-200); display: flex; flex-direction: column; align-items: center; padding: var(--spectrum-spacing-400) 0; gap: var(--spectrum-spacing-200); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: var(--spectrum-spacing-200); cursor: pointer; border-radius: 6px; color: var(--spectrum-gray-700); font-size: 10px; width: 56px; text-align: center; }
        .nav-item:hover { background: var(--spectrum-gray-100); }
        .nav-item sp-icon-save-floppy, .nav-item sp-icon-preview, .nav-item sp-icon-publish,
        .nav-item sp-icon-duplicate, .nav-item sp-icon-delete, .nav-item sp-icon-history,
        .nav-item sp-icon-add { color: var(--spectrum-gray-800); }
        .nav-item.disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
<sp-theme system="spectrum-two" color="light" scale="medium">
    <!-- Pattern: mas-side-nav edit mode — sourced from mas-side-nav.js:893-935 editNavigation -->
    <div class="nav-container">
        <div class="nav-item">
            <sp-icon-save-floppy></sp-icon-save-floppy>
            Save
        </div>
        <div class="nav-item">
            <sp-icon-add></sp-icon-add>
            Create Variation
        </div>
        <div class="nav-item">
            <sp-icon-duplicate></sp-icon-duplicate>
            Duplicate
        </div>
        <div class="nav-item">
            <sp-icon-preview></sp-icon-preview>
            Preview
        </div>
        <div class="nav-item">
            <sp-icon-publish></sp-icon-publish>
            Publish
        </div>
        <div class="nav-item">
            <sp-icon-history></sp-icon-history>
            History
        </div>
        <div class="nav-item">
            <sp-icon-delete></sp-icon-delete>
            Delete
        </div>
    </div>
</sp-theme>
</body>
</html>
