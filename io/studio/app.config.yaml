application:
    actions: actions
    web: web-src
    hooks:
        test: npm run test
    runtimeManifest:
        packages:
            MerchAtScaleStudio:
                license: Apache-2.0
                inputs:
                    allowedClientId: mas-studio
                    odinEndpoint: $ODIN_ENDPOINT
                    translationJobPayloadTtl: $TRANSLATION_JOB_PAYLOAD_TTL
                    translationProjectSummaryTtl: $TRANSLATION_PROJECT_SUMMARY_TTL
                actions:
                    ost-products-write:
                        function: src/ost-products/write.js
                        web: 'yes'
                        runtime: nodejs:22
                        inputs:
                            AOS_URL: $AOS_URL
                            AOS_API_KEY: $AOS_API_KEY
                            OST_WRITE_API_KEY: $OST_WRITE_API_KEY
                        annotations:
                            require-adobe-auth: false
                    ost-products-read:
                        function: src/ost-products/read.js
                        web: 'yes'
                        runtime: nodejs:22
                        annotations:
                            require-adobe-auth: false
                    updateMembers:
                        function: src/members/update.js
                        web: 'yes'
                        runtime: nodejs:22
                        annotations:
                            require-adobe-auth: true
                            final: false
                    listMembers:
                        function: src/members/list.js
                        web: 'yes'
                        runtime: nodejs:22
                    translation-project-start:
                        function: src/translation/project-start.js
                        web: 'yes'
                        runtime: nodejs:22
                        inputs:
                            translationMapping:
                                acom: transcreation
                                acom-cc: transcreation
                                acom-dc: transcreation
                                express: transcreation
                                sandbox: machineTranslation
                        annotations:
                            require-adobe-auth: false
                            final: true
                    translation-project-dispatcher:
                        function: src/translation/project-start-dispatcher.js
                        runtime: nodejs:22
                        annotations:
                            require-adobe-auth: false
                            final: true
                    translation-project-start-worker:
                        function: src/translation/project-start-worker.js
                        runtime: nodejs:22
                        inputs:
                            batchSize: $BATCH_SIZE
                            rpsLimit: $RPS_LIMIT
                        limits:
                            timeout: 3600000
                        annotations:
                            require-adobe-auth: false
                            final: true
                    health-check:
                        function: src/health-check/index.js
                        web: 'yes'
                        runtime: nodejs:22
                        annotations:
                            require-adobe-auth: false
                            final: true
                    ai-chat:
                        function: src/ai-chat/index.js
                        web: 'yes'
                        runtime: nodejs:22
                        inputs:
                            ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
                            ANTHROPIC_MODEL: $ANTHROPIC_MODEL
                            AWS_BEARER_TOKEN_BEDROCK: $AWS_BEARER_TOKEN_BEDROCK
                            AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                            AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                            AWS_REGION: $AWS_REGION
                            BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID
                            RAG_ENABLED: $RAG_ENABLED
                            KNOWLEDGE_SERVICE_URL: $KNOWLEDGE_SERVICE_URL
                        annotations:
                            require-adobe-auth: false
                            final: true
