<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="mas-io-url" content="http://localhost:2023/mas/io" />
        <title>mas-inline Web Component test page</title>
        <script>
            window.process = {
                env: {},
            };
        </script>
        <style>
            main {
                display: flex;
                align-items: center;
                gap: 20px;
                flex-direction: column;
                padding-top: 80px;
            }

            mas-inline {
                display: block;
                margin: 16px;
            }

            mas-inline.error {
                color: red;
                border: 1px solid red;
                padding: 8px;
            }
        </style>
        <script type="module" src="./mas-inline.test.html.js"></script>
    </head>

    <body>
        <mas-commerce-service
            env="stage"
            mas-io-url="https://www.stage.adobe.com/mas/io"
        ></mas-commerce-service>
        <main>
            <sp-theme color="light" scale="medium"></sp-theme>
        </main>

        <template id="mas-inline-basic">
            <mas-inline fragment="fragment-text-faq"></mas-inline>
        </template>

        <template id="mas-inline-with-field">
            <mas-inline fragment="fragment-text-faq" field="promoText"></mas-inline>
        </template>

        <template id="mas-inline-short-description">
            <mas-inline fragment="fragment-text-faq" field="shortDescription"></mas-inline>
        </template>

        <template id="mas-inline-prices">
            <mas-inline fragment="fragment-text-faq" field="prices"></mas-inline>
        </template>

        <template id="mas-inline-missing-fragment">
            <mas-inline></mas-inline>
        </template>

        <template id="mas-inline-not-found">
            <mas-inline fragment="notfound"></mas-inline>
        </template>
    </body>
</html>
