name: IO Studio PR Check
on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - 'io/studio/**'

jobs:
    tests:
        runs-on: [self-hosted, hwong-vault-test]
        defaults:
            run:
                working-directory: io/studio

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # TEMPORARY: Vault AppRole smoke test (MWPW-198877). Remove before rollout.
            - name: Fetch dummy secret from Vault
              uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc
              with:
                  url: https://vault-amer.adobe.net
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  secrets: |
                      cloudtech_wcms/data/merch-at-scale/aio-studio/honstar dummy | DUMMY

            # TEMPORARY: log the fetched value. vault-action masks secrets in logs,
            # so the space-trick below reveals it for this verification only.
            - name: Log dummy secret
              working-directory: ${{ github.workspace }}
              run: |
                  echo "DUMMY length: ${#DUMMY}"
                  echo "DUMMY value: $(printf '%s' "$DUMMY" | sed 's/./& /g')"

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    deploy:
        if: false # TEMPORARY: skipped during Vault smoke test (MWPW-198877)
        needs: tests
        uses: ./.github/workflows/io-studio-deploy.yaml
        with:
            run_tests: false
        secrets:
            ENV: ${{ secrets[format('AIO_STUDIO_ENV_{0}', github.event.pull_request.user.login)] }}
            AIO: ${{ secrets[format('AIO_STUDIO_AIO_{0}', github.event.pull_request.user.login)] }}
            ODIN_BUCKET: ${{ secrets.ODIN_BUCKET_QA }}

    test-deployed:
        if: false # TEMPORARY: skipped during Vault smoke test (MWPW-198877)
        needs: deploy
        uses: ./.github/workflows/io-studio-tests.yaml
        secrets:
            workspace: ${{ secrets[format('AIO_STUDIO_NS_{0}', github.event.pull_request.user.login)] }}
