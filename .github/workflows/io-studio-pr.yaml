name: IO Studio PR Check
on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - 'io/studio/**'

jobs:
    tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: io/studio

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js 22.23.1
              uses: actions/setup-node@v4
              with:
                  # Pinned: 22.23.1 fixes the node-fetch v2 gzip / ERR_STREAM_PREMATURE_CLOSE
                  # regression introduced in 22.23.0.
                  node-version: '22.23.1'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    deploy:
        needs: tests
        uses: ./.github/workflows/io-studio-deploy.yaml
        with:
            run_tests: false
        secrets:
            ENV: ${{ secrets[format('AIO_STUDIO_ENV_{0}', github.event.pull_request.user.login)] }}
            AIO: ${{ secrets[format('AIO_STUDIO_AIO_{0}', github.event.pull_request.user.login)] }}
            ODIN_BUCKET: ${{ secrets.ODIN_BUCKET_QA }}

    test-deployed:
        needs: deploy
        uses: ./.github/workflows/io-studio-tests.yaml
        secrets:
            workspace: ${{ secrets[format('AIO_STUDIO_NS_{0}', github.event.pull_request.user.login)] }}
