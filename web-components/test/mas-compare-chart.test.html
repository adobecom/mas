<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>mas-compare-chart tests</title>
        <script>
            window.process = { env: {} };
        </script>
        <script type="module" src="../src/mas.js"></script>
        <link
            rel="stylesheet"
            href="https://www.adobe.com/libs/styles/styles.css"
        />
        <link
            rel="stylesheet"
            href="https://www.adobe.com/express/code/styles/styles.css"
        />
    </head>
    <body>
        <mas-commerce-service env="stage"></mas-commerce-service>

        <!-- Inert until cloned in describe before() so aem-fragment / fetch
             never run until mocks and mas.js are fully ready. -->
        <template id="compare-chart-shared-fixture">
            <mas-compare-chart id="t" consonant spectrum="swc">
                <aem-fragment fragment="compare-chart-express"></aem-fragment>
            </mas-compare-chart>
        </template>

        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { mockIms } from './mocks/ims.js';
            import { mockLana } from './mocks/lana.js';
            import { mockFetch } from './mocks/fetch.js';
            import { withAem } from './mocks/aem.js';
            import { withWcs } from './mocks/wcs.js';

            runTests(async () => {
                describe('mas-compare-chart', () => {
                    before(async () => {
                        mockIms();
                        mockLana();
                        await mockFetch(withWcs, withAem);

                        const fixture = document.getElementById(
                            'compare-chart-shared-fixture',
                        );
                        document.body.append(fixture.content.cloneNode(true));
                    });

                    afterEach(() => {
                        document
                            .querySelectorAll('mas-compare-chart:not(#t)')
                            .forEach((chart) => chart.remove());
                    });

                    it('hydrates a compare chart fragment with card CTAs', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        expect(await chart.checkReady()).to.be.true;
                        expect(
                            chart.querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            ).length,
                        ).to.equal(3);
                        chart
                            .querySelectorAll(
                                ':scope > merch-card[slot="cards"]',
                            )
                            .forEach((card) => {
                                expect(card.consonant).to.be.true;
                                expect(card.hasAttribute('consonant')).to.be
                                    .true;
                                expect(card.spectrum).to.equal('swc');
                                expect(card.getAttribute('spectrum')).to.equal(
                                    'swc',
                                );
                            });
                        expect(
                            chart.querySelectorAll(':scope > [slot$="-cta"]')
                                .length,
                        ).to.equal(3);

                        const ctaText = Array.from(
                            chart.querySelectorAll(':scope > [slot$="-cta"]'),
                            (cta) => cta.textContent.trim(),
                        );
                        expect(ctaText).to.include('Get Adobe Express Free');
                        expect(ctaText).to.include('Start 30-day free trial');
                        expect(ctaText).to.include('Start 7-day free trial');
                        const headerText = Array.from(
                            chart.querySelectorAll(
                                ':scope > [slot$="-header"]',
                            ),
                            (header) => header.textContent.trim(),
                        );
                        expect(headerText).to.deep.equal([
                            'Adobe Express Free',
                            'Adobe Express Premium',
                            'Adobe Firefly Pro',
                        ]);
                        expect(
                            chart
                                .querySelector(
                                    ':scope > [slot="compare-features"]',
                                )
                                .textContent.trim(),
                        ).to.equal('Compare Features');
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.table-column-header',
                            ).length,
                        ).to.equal(9);
                        expect(
                            chart.shadowRoot.querySelectorAll('.table-row')
                                .length,
                        ).to.equal(90);
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.tooltip-wrapper',
                            ).length,
                        ).to.equal(47);
                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.row-label a.secondary-link',
                            ).length,
                        ).to.equal(0);
                        const checkoutCta = chart.querySelector(
                            ':scope > [slot="card-3-cta"][is="checkout-link"]',
                        );
                        expect(checkoutCta).to.exist;
                        expect(checkoutCta.dataset.wcsOsi).to.equal(
                            'F-WCwWOvQUv9kuFxnb9Zh2fN0Zh_oi_yVUxAQ4_Z0gY',
                        );
                        expect(checkoutCta.dataset.analyticsId).to.equal(
                            'buy-now',
                        );
                        expect(
                            chart.querySelector(
                                ':scope > [slot="card-3-price"] p',
                            ),
                        ).to.not.exist;

                        const headers = chart.shadowRoot.querySelectorAll(
                            '.table-column-header',
                        );
                        expect(
                            headers[0].getAttribute('aria-expanded'),
                        ).to.equal('true');
                        expect(
                            headers[1].getAttribute('aria-expanded'),
                        ).to.equal('false');
                    });

                    it('persists each section expand state in expanded-groups', async () => {
                        const chart = document.querySelector('#t');
                        await customElements.whenDefined('mas-compare-chart');
                        await chart.updateComplete;
                        const headers = chart.shadowRoot.querySelectorAll(
                            '.table-column-header',
                        );
                        expect(headers.length).to.be.greaterThan(2);

                        headers[0].click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            'none',
                        );
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[0]
                                .getAttribute('aria-expanded'),
                        ).to.equal('false');
                        expect(
                            chart.shadowRoot
                                .querySelectorAll('.table-column-header')[1]
                                .getAttribute('aria-expanded'),
                        ).to.equal('false');

                        chart.shadowRoot
                            .querySelectorAll('.table-column-header')[0]
                            .click();
                        await chart.updateComplete;
                        expect(chart.getAttribute('expanded-groups')).to.equal(
                            '1',
                        );
                    });

                    it('renders at most four card fragments', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            ${[1, 2, 3, 4, 5]
                                .map(
                                    (index) => `
                                        <merch-card slot="cards" variant="compare-chart">
                                            <h3 slot="header">Card ${index}</h3>
                                            <div slot="features">
                                                <p name="group@feature">Value ${index}</p>
                                            </div>
                                        </merch-card>
                                    `,
                                )
                                .join('')}
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;

                        expect(chart.getAttribute('data-child-count')).to.equal(
                            '4',
                        );
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-4-header"]',
                            ).textContent,
                        ).to.include('Card 4');
                        expect(
                            chart
                                .querySelector(
                                    '[data-compare-chart-slot][slot="card-4-header"]',
                                )
                                .getAttribute('data-compare-chart-slot'),
                        ).to.equal('');
                        expect(
                            chart.querySelector(
                                '[data-compare-chart-slot][slot="card-5-header"]',
                            ),
                        ).to.not.exist;
                        chart.remove();
                    });

                    it('renders direct table section content as compare-chart rows and cells', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.getBoundingClientRect = () => ({
                            width: 1200,
                            height: 800,
                            top: 0,
                            bottom: 800,
                            left: 0,
                            right: 1200,
                        });
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Adobe Express Free</h3>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Adobe Express Premium</h3>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Adobe Firefly Pro</h3>
                            </merch-card>
                            <table>
                                <thead class="invisible-headers">
                                    <tr>
                                        <th>Adobe apps</th>
                                        <th scope="col">Adobe Express Free</th>
                                        <th scope="col">Adobe Express Premium</th>
                                        <th scope="col" class="invisible-content">Adobe Firefly Pro</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="ctv2-tr">
                                        <th scope="row">Seamless integration across Adobe apps like Photoshop, Illustrator, InDesign, Firefly, Acrobat and Lightroom</th>
                                        <td><span class="icon-checkmark-no-fill" role="img" aria-label="Yes"></span></td>
                                        <td><span class="icon-checkmark-no-fill" role="img" aria-label="Yes"></span></td>
                                        <td class="invisible-content"><span class="icon-checkmark-no-fill" role="img" aria-label="Yes"></span></td>
                                    </tr>
                                    <tr class="ctv2-tr">
                                        <th scope="row">
                                            <p class="ctv2-th-header">Boost your creativity with Photoshop:</p>
                                            <p class="ctv2-th-subheader">In addition to the Adobe Express Premium plan, get full access to Adobe Photoshop on web and mobile.</p>
                                        </th>
                                        <td><span class="icon-crossmark" role="img" aria-label="No"></span></td>
                                        <td><span class="icon-crossmark" role="img" aria-label="No"></span></td>
                                        <td class="invisible-content"><span class="icon-checkmark-no-fill" role="img" aria-label="Yes"></span></td>
                                    </tr>
                                </tbody>
                            </table>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(resolve),
                        );
                        await chart.updateComplete;

                        expect(
                            chart.shadowRoot.querySelectorAll(
                                '.table-column-header',
                            ),
                        ).to.have.lengthOf(1);
                        expect(
                            chart.shadowRoot
                                .querySelector('.group-title')
                                .textContent.trim(),
                        ).to.equal('Adobe apps');
                        const rows =
                            chart.shadowRoot.querySelectorAll('.table-row');
                        expect(rows).to.have.lengthOf(2);
                        expect(
                            rows[0].querySelector('.row-label').textContent,
                        ).to.include('Seamless integration across Adobe apps');
                        expect(
                            rows[1].querySelector('.row-label').textContent,
                        ).to.include('Boost your creativity with Photoshop');
                        expect(
                            rows[1].querySelector('.row-label').textContent,
                        ).to.include('full access to Adobe Photoshop');
                        expect(
                            rows[0].querySelectorAll('[role="cell"]'),
                        ).to.have.lengthOf(3);
                        expect(
                            rows[1].querySelectorAll(
                                '[role="cell"] .compare-chart-glyph.excluded',
                            ),
                        ).to.have.lengthOf(2);
                        expect(
                            rows[1].querySelectorAll(
                                '[role="cell"] .compare-chart-glyph.included',
                            ),
                        ).to.have.lengthOf(1);

                        chart.remove();
                    });

                    it('keeps compare-chart variant host styles above later page styles', async () => {
                        const style = document.createElement('style');
                        style.textContent = `
                            merch-card[variant='compare-chart'] {
                                --compare-chart-cell-bg: rgb(255, 0, 0);
                                background-color: rgb(255, 0, 0);
                                display: inline;
                            }
                        `;
                        document.head.append(style);

                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;

                        const card = chart.querySelector(
                            'merch-card[variant="compare-chart"]',
                        );
                        const cardStyle = getComputedStyle(card);
                        expect(cardStyle.display).to.equal('block');
                        expect(cardStyle.backgroundColor).to.equal(
                            'rgb(255, 255, 255)',
                        );
                        expect(
                            cardStyle
                                .getPropertyValue('--compare-chart-cell-bg')
                                .trim(),
                        ).to.equal('#fff');
                        expect(
                            getComputedStyle(
                                card.shadowRoot.querySelector('.card'),
                            ).boxSizing,
                        ).to.equal('border-box');
                        expect(
                            getComputedStyle(
                                card.shadowRoot.querySelector('.seg-cta'),
                            ).boxSizing,
                        ).to.equal('border-box');

                        chart.remove();
                        style.remove();
                    });

                    it('removes inherited margins from slotted compare-chart paragraphs', async () => {
                        const style = document.createElement('style');
                        style.textContent = `
                            merch-card[variant='compare-chart'] p,
                            merch-card[variant='compare-chart'] a {
                                margin: 32px;
                            }
                        `;
                        document.head.append(style);

                        const card = document.createElement('merch-card');
                        card.setAttribute('variant', 'compare-chart');
                        card.innerHTML = `
                            <h3 slot="header">Plan</h3>
                            <p slot="price">$10/mo</p>
                            <p slot="detail">Annual plan</p>
                            <a slot="cta" href="#">Buy now</a>
                        `;
                        document.body.append(card);
                        await card.updateComplete;

                        const priceStyle = getComputedStyle(
                            card.querySelector('[slot="price"]'),
                        );
                        const detailStyle = getComputedStyle(
                            card.querySelector('[slot="detail"]'),
                        );
                        const ctaStyle = getComputedStyle(
                            card.querySelector('[slot="cta"]'),
                        );
                        expect(priceStyle.marginTop).to.equal('0px');
                        expect(priceStyle.marginRight).to.equal('0px');
                        expect(priceStyle.marginBottom).to.equal('0px');
                        expect(priceStyle.marginLeft).to.equal('0px');
                        expect(detailStyle.marginTop).to.equal('0px');
                        expect(detailStyle.marginBottom).to.equal('0px');
                        expect(ctaStyle.marginTop).to.equal('0px');
                        expect(ctaStyle.marginRight).to.equal('0px');
                        expect(ctaStyle.marginBottom).to.equal('0px');
                        expect(ctaStyle.marginLeft).to.equal('0px');

                        card.remove();
                        style.remove();
                    });

                    it('keeps sticky header background while header overlaps the chart bottom', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan</h3>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        document.body.append(chart);
                        await chart.updateComplete;

                        const header =
                            chart.shadowRoot.querySelector('.header-content');
                        const originalHostRect = chart.getBoundingClientRect;
                        const originalHeaderRect = header.getBoundingClientRect;
                        chart.getBoundingClientRect = () => ({
                            top: -100,
                            bottom: 100,
                        });
                        header.getBoundingClientRect = () => ({
                            top: 0,
                            height: 200,
                        });

                        window.dispatchEvent(new Event('scroll'));
                        await new Promise((resolve) =>
                            requestAnimationFrame(resolve),
                        );

                        expect(header.classList.contains('is-stuck')).to.be
                            .true;
                        expect(
                            getComputedStyle(header).backgroundColor,
                        ).to.equal('rgb(255, 255, 255)');
                        expect(getComputedStyle(header).width).to.equal(
                            getComputedStyle(chart).width,
                        );

                        chart.getBoundingClientRect = originalHostRect;
                        header.getBoundingClientRect = originalHeaderRect;
                        chart.remove();
                    });

                    it('matches Milo responsive dimensions for wrappers, rows, and cells', async () => {
                        const chart =
                            document.createElement('mas-compare-chart');
                        const frame = document.createElement('div');
                        chart.style.width = '100%';
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <span slot="compare-features">Compare Features</span>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan A</h3>
                                <p slot="price">$10/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included<small>Caption</small></p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan B</h3>
                                <p slot="price">$20/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        frame.append(chart);
                        document.body.append(frame);
                        await chart.updateComplete;

                        const measureAt = async (width) => {
                            frame.style.width = `${width}px`;
                            await new Promise((resolve) =>
                                requestAnimationFrame(() =>
                                    requestAnimationFrame(resolve),
                                ),
                            );
                            const wrapper = chart.shadowRoot.querySelector(
                                '.sticky-header-wrapper',
                            );
                            const table =
                                chart.shadowRoot.querySelector(
                                    '.table-container',
                                );
                            return {
                                wrapperMarginLeft:
                                    getComputedStyle(wrapper).marginLeft,
                                wrapperMarginRight:
                                    getComputedStyle(wrapper).marginRight,
                                wrapper: Math.round(
                                    wrapper.getBoundingClientRect().width,
                                ),
                                table: Math.round(
                                    table.getBoundingClientRect().width,
                                ),
                            };
                        };

                        expect(await measureAt(500)).to.deep.equal({
                            wrapperMarginLeft: '30px',
                            wrapperMarginRight: '30px',
                            wrapper: 440,
                            table: 440,
                        });
                        expect(await measureAt(700)).to.deep.equal({
                            wrapperMarginLeft: '80px',
                            wrapperMarginRight: '80px',
                            wrapper: 540,
                            table: 570,
                        });
                        expect(await measureAt(1000)).to.deep.equal({
                            wrapperMarginLeft: '48px',
                            wrapperMarginRight: '48px',
                            wrapper: 904,
                            table: 950,
                        });
                        expect(await measureAt(1300)).to.deep.equal({
                            wrapperMarginLeft: '75px',
                            wrapperMarginRight: '75px',
                            wrapper: 1150,
                            table: 1200,
                        });

                        const row =
                            chart.shadowRoot.querySelector('.table-row');
                        const rowStyle = getComputedStyle(row);
                        expect(rowStyle.marginLeft).to.equal('24px');
                        expect(rowStyle.marginRight).to.equal('24px');
                        expect(rowStyle.paddingTop).to.equal('0px');
                        expect(rowStyle.columnGap).to.equal('12px');

                        const sectionHeader = chart.shadowRoot.querySelector(
                            '.table-column-header',
                        );
                        const sectionHeaderStyle =
                            getComputedStyle(sectionHeader);
                        expect(sectionHeaderStyle.minHeight).to.equal('72px');
                        expect(sectionHeaderStyle.paddingTop).to.equal('24px');
                        expect(sectionHeaderStyle.fontSize).to.equal('18px');
                        expect(sectionHeaderStyle.lineHeight).to.equal(
                            '22.5px',
                        );

                        const toggle =
                            chart.shadowRoot.querySelector('.toggle-icon');
                        const toggleStyle = getComputedStyle(toggle);
                        expect(toggleStyle.width).to.equal('24px');
                        expect(toggleStyle.height).to.equal('24px');

                        const rowHeader =
                            chart.shadowRoot.querySelector('.row-header');
                        const rowHeaderStyle = getComputedStyle(rowHeader);
                        expect(rowHeaderStyle.paddingTop).to.equal('24px');
                        expect(rowHeaderStyle.paddingRight).to.equal('24px');
                        expect(rowHeaderStyle.paddingBottom).to.equal('24px');
                        expect(rowHeaderStyle.fontSize).to.equal('14px');
                        expect(rowHeaderStyle.lineHeight).to.equal('18.2px');

                        const cell =
                            chart.shadowRoot.querySelector('p[role="cell"]');
                        const cellStyle = getComputedStyle(cell);
                        const chartStyle = getComputedStyle(chart);
                        const bodyXsLineHeight =
                            chartStyle
                                .getPropertyValue('--type-body-xs-lh')
                                .trim() || '20px';
                        expect(cellStyle.paddingTop).to.equal('24px');
                        expect(cellStyle.paddingBottom).to.equal('24px');
                        expect(cellStyle.fontSize).to.equal('14px');
                        expect(cellStyle.lineHeight).to.equal(bodyXsLineHeight);

                        const chip = cell.querySelector('.compare-chart-chip');
                        const chipStyle = getComputedStyle(chip);
                        expect(chipStyle.borderTopLeftRadius).to.equal('4px');
                        expect(chipStyle.paddingTop).to.equal('16px');
                        expect(chipStyle.paddingRight).to.equal('12px');
                        expect(
                            Math.round(chip.getBoundingClientRect().width),
                        ).to.equal(
                            Math.round(cell.getBoundingClientRect().width - 26),
                        );

                        const caption = cell.querySelector('small');
                        const captionStyle = getComputedStyle(caption);
                        const bodyXxsLineHeight =
                            chartStyle
                                .getPropertyValue('--type-body-xxs-lh')
                                .trim() || '15px';
                        expect(captionStyle.marginTop).to.equal('4px');
                        expect(captionStyle.fontSize).to.equal('12px');
                        expect(captionStyle.lineHeight).to.equal(
                            bodyXxsLineHeight,
                        );

                        frame.remove();
                    });

                    it('sticks the mobile header to the top of the viewport', async () => {
                        const pageHeader = document.createElement('header');
                        pageHeader.style.height = '40px';
                        const frame = document.createElement('div');
                        const chart =
                            document.createElement('mas-compare-chart');
                        frame.style.width = '500px';
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <span slot="compare-features">Compare Features</span>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan A</h3>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan B</h3>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        frame.append(chart);
                        document.body.append(pageHeader);
                        document.body.append(frame);
                        await chart.updateComplete;
                        await new Promise((resolve) =>
                            requestAnimationFrame(resolve),
                        );

                        const header =
                            chart.shadowRoot.querySelector('.header-content');
                        expect(getComputedStyle(header).top).to.equal('0px');
                        expect(
                            getComputedStyle(chart)
                                .getPropertyValue('--compare-chart-sticky-top')
                                .trim(),
                        ).to.equal('0px');

                        frame.remove();
                        pageHeader.remove();
                    });

                    it('matches Milo mobile header collapse behavior', async () => {
                        const frame = document.createElement('div');
                        const chart =
                            document.createElement('mas-compare-chart');
                        frame.style.width = '500px';
                        chart.setAttribute('expanded-groups', 'all');
                        chart.innerHTML = `
                            <span slot="compare-features">Compare Features</span>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan A with a much longer title</h3>
                                <p slot="price">$10/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan B</h3>
                                <p slot="price">$20/mo<br>per seat</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <merch-card slot="cards" variant="compare-chart">
                                <h3 slot="header">Plan C</h3>
                                <p slot="price">$30/mo</p>
                                <div slot="features">
                                    <p name="group@feature">Included</p>
                                </div>
                            </merch-card>
                            <div name="group">
                                <h4>Group</h4>
                                <p name="feature">Feature</p>
                            </div>
                        `;
                        frame.append(chart);
