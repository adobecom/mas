            import './spectrum.js';
            import { runTests } from '@web/test-runner-mocha';
            import chai, { expect } from '@esm-bundle/chai';
            import chaiAsPromised from '@esm-bundle/chai-as-promised';

            import { toggleDesktop } from './utils.js';
            import '../src/mas.js';

            chai.use(chaiAsPromised);

            runTests(async () => {
                const spTheme = document.querySelector('sp-theme');
                const nextFrame = () =>
                    new Promise((resolve) => requestAnimationFrame(resolve));
                const settleMasElements = async (root) => {
                    const elements = [
                        ...root.querySelectorAll(
                            'span[is="inline-price"][data-wcs-osi], a[is="checkout-link"][data-wcs-osi]',
                        ),
                    ];
                    await Promise.all(
                        elements.map((element) => {
                            if (typeof element.onceSettled !== 'function') {
                                return Promise.resolve();
                            }
                            return element.onceSettled().catch(() => {});
                        }),
                    );
                };
                const waitForTableLayout = async (tableHost) => {
                    await settleMasElements(tableHost);
                    if (document.fonts?.ready) {
                        await document.fonts.ready.catch(() => {});
                    }
                    await nextFrame();
                    await nextFrame();
                    await new Promise((resolve) => setTimeout(resolve, 150));
                };

                const appendStandardTable = () => {
                    const wrapper = document.createElement('section');
                    const TableCtor = customElements.get('mas-table');
                    const tableHost = new TableCtor();
                    tableHost.id = 'table-standard';
                    wrapper.append(tableHost);
                    spTheme.append(wrapper);

                    return tableHost;
                };

                                <div></div>

                            </div>
                            <div>
                                <div></div>
                                <div></div>
                                <div></div>
                                <div></div>
                                <div></div>
                            </div>
                            <div>
                                <div></div>
                                <div><hr /></div>
                                <div><hr /></div>
                                <div><hr /></div>
                                <div><hr /></div>
                            </div>
                            <div>
                                <div>Cloud storage</div>
                                <div>100GB</div>
                                <div>100GB</div>
                                <div>1TB</div>
                                <div>100GB</div>
                            </div>
                        </div>
                    `.trim();

                    const card = ({
                        id,
                        title,
                        description,
                        priceHtml,
                        ctasHtml,
                        icon,
                        iconAlt,
                        badge = '',
                    }) => ({
                        type: 'content-fragment',
                        value: {
                            id,
                            title,
                            fields: {
                                cardTitle: title,
                                description: `<p>${description}</p>`,
                                prices: priceHtml,
                                ctas: ctasHtml,
                                mnemonicIcon: [icon],
                                mnemonicAlt: [iconAlt],
                                badge,
                            },
                        },
                    });

                    return {
                        fields: {
                            blockName: 'Table',
                            selectedVariantNames: [
                                'header-left',
                                'sticky',
                                'pricing-bottom',
                                'highlight',
                            ],
                            cards: ['ps', 'ff', 'photo', 'cc'],
                            compareChart: {
                                value: compareChart,
                                mimeType: 'text/html',
                            },
                        },
                        references: [
                            card({
                                id: 'ps',
                                title: 'Photoshop',
                                description:

                                priceHtml: `<span is="inline-price" data-display-per-unit="false" data-display-recurrence="true" data-display-tax="false" data-force-tax-exclusive="false" data-quantity="1" data-template="price" data-wcs-osi="A1xn6EL4pK93bWjM8flffQpfEL-bnvtoQKQAvkx574M"></span>`,
                                ctasHtml: `
                                    <a
                                        is="checkout-link"
                                        data-checkout-workflow-step="commitment"
                                        data-quantity="1"
                                        data-wcs-osi="ZQwlmahh5YRWh8mRGxo-cr3eu91ShbpRv6vkbcsi3eQ"
                                        data-extra-options="{}"
                                        class="con-button outline button-l"
                                        aria-label="Free trial Photoshop"
                                        href="https://commerce.adobe.com/store/commitment?items%5B0%5D%5Bid%5D=E27CB5D79014ACAB6953B091CEA72228"
                                    >Free trial</a>
                                    <a
                                        is="checkout-link"
                                        data-checkout-workflow-step="commitment"
                                        data-quantity="1"
                                        data-wcs-osi="A1xn6EL4pK93bWjM8flffQpfEL-bnvtoQKQAvkx574M"
                                        data-extra-options="{}"
                                        class="con-button blue button-l"
                                        aria-label="Buy now Photoshop"
                                        href="https://commerce.adobe.com/store/commitment?items%5B0%5D%5Bid%5D=30404A88D89A328584307175B8B27616"
                                    >Buy now</a>
                                `,
                                icon: '/test/mocks/img/photoshop.svg',
                                iconAlt: 'Photoshop Product Icon',
                            }),
                            card({
                                id: 'ff',
                                title: 'Firefly Pro',
                                description:
                                    'Get 4,000 credits for creative AI, plus Photoshop on web and mobile.',
                                priceHtml: `<span is="inline-price" data-display-per-unit="false" data-quantity="1" data-template="price" data-wcs-osi="msg4m1782IVpeTz8mHd_P_0GG3OSG7XS932oW-7EGuM"></span>`,
                                ctasHtml: `
                                    <a
                                        is="checkout-link"
                                        data-checkout-workflow-step="commitment"
                                        data-quantity="1"
                                        data-wcs-osi="eK8no6JfQYYW5nF5e4Txie6Orvqa0uqY1i_KB1f6fRs"
                                        data-extra-options="{}"
                                        class="con-button outline button-l"
                                        aria-label="Free trial Firefly Pro"
                                        href="https://commerce.adobe.com/store/commitment"
                                    >Free trial</a>
                                    <a
                                        is="checkout-link"
                                        data-checkout-workflow-step="commitment"
                                        data-quantity="1"
                                        data-wcs-osi="msg4m1782IVpeTz8mHd_P_0GG3OSG7XS932oW-7EGuM"
                                        data-extra-options="{}"
                                        class="con-button blue button-l"
                                        aria-label="Buy now Firefly Pro"
                                        href="https://commerce.adobe.com/store/commitment"
                                    >Buy now</a>
                                `,
                                icon: '/test/mocks/img/firefly.svg',
                                iconAlt: 'Firefly Product Icon',
                            }),
                            card({
                                id: 'photo',
                                title: 'Photography',
                                description:
                                    'Photoshop on desktop, web and mobile, plus Lightroom and Lightroom Classic.',
                                priceHtml: `<span is="inline-price" data-display-per-unit="false" data-display-recurrence="true" data-display-tax="false" data-force-tax-exclusive="false" data-quantity="1" data-template="price" data-wcs-osi="MzCpF9nUi8rEzyW-9slEUwtRenS69PRW5fp84a93uK4"></span>`,
                                ctasHtml: `
                                    <a

                                        data-checkout-workflow-step="commitment"
                                        data-quantity="1"
                                        data-wcs-osi="FZcKVrKIV8OT8_qw6n1Qn0uCKxliKJ66J9W6R7B6CVQ"
                                        data-extra-options="{}"

                                        aria-label="Free trial Photography"

                                        data-modal="crm"
                                        data-quantity="1"

                                        data-extra-options="{}"

                describe('mas-table', () => {
                    beforeEach(async () => {
                        await toggleDesktop();
                        spTheme.replaceChildren();
                    });

                    it('renders the replicated Adobe Photoshop plans table from cache', async () => {
                        const tableHost = appendStandardTable();
                        await tableHost.renderFragment({
                            fields: {
                                blockName: 'Table',
                                compareChart: {
                                    value: document
                                        .getElementById(
                                            'standard-table-compare-chart',
                                        )
                                        .innerHTML.trim(),
                                    mimeType: 'text/html',
                                },
                            },
                        });
                        await waitForTableLayout(tableHost);

                        const table = tableHost.querySelector('.table');
                        expect(table).to.exist;
                        expect(
                            tableHost.querySelector('.mas-table-scratch')
                                ?.hidden,
                        ).to.equal(true);
                        expect(table.classList.contains('sticky')).to.be.true;
                        expect(table.classList.contains('pricing-bottom')).to.be
                            .true;
                        expect(table.classList.contains('header-left')).to.be
                            .true;
                        expect(table.classList.contains('has-addon')).to.be
                            .true;
                        expect(table.classList.contains('highlight')).to.be
                            .true;
                        const highlightRow =
                            table.querySelector('.row-highlight');
                        expect(highlightRow).to.exist;
                        expect(
                            highlightRow
                                .querySelector('.col-1')
                                ?.classList.contains('hidden'),
                        ).to.equal(true);
                        expect(
                            highlightRow
                                .querySelector('.col-5')
                                ?.textContent?.trim(),
                        ).to.equal('Save 50%');
                        expect(table.querySelectorAll('.row')).to.have.length(
                            19,
                        );
                        expect(getComputedStyle(table).width).to.equal(
                            '1200px',
                        );

                        const headings = Array.from(
                            table.querySelectorAll(
                                '.row-heading .tracking-header',
                            ),
                        ).map((heading) => heading.textContent.trim());
                        expect(headings).to.deep.equal([
                            'Photoshop',
                            'Firefly Pro',
                            'Photography',
                            'Creative Cloud Pro',
                        ]);

                        expect(
                            table
                                .querySelector('.row-heading .col-2 .body')
                                ?.textContent?.replace(/\s+/g, ' ')
                                .trim(),
                        ).to.include(
                            'Photoshop on desktop, web, and mobile, plus Adobe Express Premium plan.',
                        );
                        expect(
                            table
                                .querySelector('.row-heading .col-5 .body')
                                ?.textContent?.replace(/\s+/g, ' ')
                                .trim(),
                        ).to.include(
                            'Save 50% for the first 3 months. Get Photoshop and 20+ apps.',
                        );
                        const pricingAfter = Array.from(
                            table.querySelectorAll(
                                '.row-heading .pricing-after [data-template="legal"]',
                            ),
                        ).map((item) => item.getAttribute('data-wcs-osi'));
                        expect(pricingAfter).to.deep.equal([
                            'A1xn6EL4pK93bWjM8flffQpfEL-bnvtoQKQAvkx574M',
                            'msg4m1782IVpeTz8mHd_P_0GG3OSG7XS932oW-7EGuM',
                            'MzCpF9nUi8rEzyW-9slEUwtRenS69PRW5fp84a93uK4',
                            'r_JXAnlFI7xD6FxWKl2ODvZriLYBoSL701Kd1hRyhe8',
                        ]);

                        expect(
                            table.querySelectorAll('span[is="inline-price"]')
                                .length,
                        ).to.be.at.least(10);
                        expect(
                            table.querySelectorAll(
                                '.row-heading a[is="checkout-link"]',
                            ),
                        ).to.have.length(8);
                        expect(
                            Array.from(table.querySelectorAll('.row')).find(
                                (row) =>
                                    row.querySelector('.col-1')?.textContent?.trim() ===
                                    'Price',
                            )?.querySelector('.col-5 [data-template="strikethrough"]'),
                        ).to.exist;
                        expect(
                            Array.from(table.querySelectorAll('.col-1 a')).find(
                                (link) =>
                                    link.textContent?.trim() === 'Generative credits',
                            )?.textContent,
                        ).to.equal('Generative credits');
                        expect(
                            Array.from(table.querySelectorAll('.col-1 a')).find(
                                (link) =>
                                    link.textContent?.trim() ===
                                    '20+ desktop and mobile apps',
                            )?.textContent,
                        ).to.equal('20+ desktop and mobile apps');

                        const headingColumnWidths = Array.from(
                            table.querySelectorAll('.row-heading > .col'),
                        ).map((column) =>
                            Math.round(column.getBoundingClientRect().width),
                        );
                        expect(headingColumnWidths).to.deep.equal([
                            240, 240, 240, 240, 240,
                        ]);
                        
                        const hydratedTableHost = appendStandardTable();
                        await hydratedTableHost.renderFragment(
                            buildHydratedCompareChartFragment(),
                        );
                        await waitForTableLayout(hydratedTableHost);

                        const hydratedTable =
                            hydratedTableHost.querySelector('.table');
                        const photoshopHeading = hydratedTable.querySelector(
                            '.row-heading .col-2.col-heading',
                        );
                        expect(photoshopHeading).to.exist;
                        expect(
                            photoshopHeading.querySelector(
                                ':scope > .heading-content',
                            ),
                        ).to.exist;
                        expect(
                            photoshopHeading.querySelector(
                                ':scope > .heading-button',
                            ),
                        ).to.exist;
                        expect(
                            photoshopHeading.querySelector(
                                '.header-product-tile mas-mnemonic',
                            ),
                        ).to.exist;
                        expect(
                            photoshopHeading.querySelector(
                                '.tracking-header',
                            )?.textContent?.trim(),
                        ).to.equal('Photoshop');
                        expect(
                            photoshopHeading.querySelector(
                                '.body',
                            )?.textContent?.replace(/\s+/g, ' ').trim(),
                        ).to.equal(
                            'Photoshop on desktop, web, and mobile, plus Adobe Express Premium plan.',
                        );
                        expect(
                            photoshopHeading.querySelector(
                                '.heading-button > .pricing',
                            ),
                        ).to.exist;
                        expect(
                            photoshopHeading.querySelector(
                                '.heading-button > .pricing-after [data-template="legal"]',
                            ),
                        ).to.exist;
                        expect(
                            photoshopHeading.querySelectorAll(
                                '.buttons-wrapper > *',
                            ),
                        ).to.have.length(2);
                        expect(
                            photoshopHeading.querySelector(
                                '.buttons-wrapper > div.supplemental-text.body-xl.action-area',
                            ),
                        ).to.exist;
                        expect(
                            Array.from(
                                hydratedTable.querySelectorAll('.table-title-text'),
                            ).some(
                                (node) => node.textContent?.replace(/\s+/g, ' ').trim() === '-',
                            ),
                        ).to.equal(false);
                        expect(
                            hydratedTable.querySelector(
                                '.row-highlight .col-5.col-highlight',
                            )?.textContent?.trim(),
                        ).to.equal('Save 50%');
                    });

                });
            });
        </script>
