<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>M@S Studio — Toolbar Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@spectrum-css/tokens@14.6.0/dist/index.css" />
    <script type="importmap">{"imports":{"@spectrum-web-components/":"https://cdn.jsdelivr.net/npm/@spectrum-web-components/"}}</script>
    <script type="module">
        import '@spectrum-web-components/theme/sp-theme.js';
        import '@spectrum-web-components/theme/spectrum-two/scale-medium-core-tokens.js';
        import '@spectrum-web-components/theme/spectrum-two/theme-light-core-tokens.js';
        import '@spectrum-web-components/action-button/sp-action-button.js';
        import '@spectrum-web-components/action-group/sp-action-group.js';
        import '@spectrum-web-components/button/sp-button.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-add.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-filter.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-view-grid.js';
        import '@spectrum-web-components/icons-workflow/icons/sp-icon-table.js';
        import '@spectrum-web-components/menu/sp-menu-item.js';
        import '@spectrum-web-components/menu/sp-menu.js';
        import '@spectrum-web-components/overlay/overlay-trigger.js';
        import '@spectrum-web-components/popover/sp-popover.js';
        import '@spectrum-web-components/search/sp-search.js';
    </script>
    <style>
        body { margin: 0; padding: var(--spectrum-spacing-600); background: var(--spectrum-gray-50); font-family: var(--spectrum-font-family-base); }
        #toolbar { display: flex; flex-direction: column; gap: var(--spectrum-spacing-500); }
        #actions { display: flex; justify-content: space-between; flex-wrap: wrap; gap: var(--spectrum-spacing-300); }
        #read { display: flex; gap: var(--spectrum-spacing-300); flex-grow: 1; }
        #write { display: flex; gap: var(--spectrum-spacing-300); margin-left: auto; }
    </style>
</head>
<body>
<sp-theme system="spectrum-two" color="light" scale="medium">
    <!-- Pattern: mas-toolbar — sourced from mas-toolbar.js searchAndFilterControls + createButton -->
    <div id="toolbar">
        <div id="actions">
            <div id="read">
                <sp-action-button toggles label="Filter">
                    <sp-icon-filter slot="icon"></sp-icon-filter>
                    Filter
                </sp-action-button>
                <sp-search label="Search" placeholder="Search" size="m"></sp-search>
            </div>
            <div id="write">
                <sp-action-group selects="single">
                    <sp-action-button selected label="Render view">
                        <sp-icon-view-grid slot="icon"></sp-icon-view-grid>
                    </sp-action-button>
                    <sp-action-button label="Table view">
                        <sp-icon-table slot="icon"></sp-icon-table>
                    </sp-action-button>
                </sp-action-group>
                <overlay-trigger placement="bottom" offset="6">
                    <sp-button variant="accent" slot="trigger">
                        <sp-icon-add slot="icon"></sp-icon-add>
                        Create
                    </sp-button>
                    <sp-popover slot="click-content" direction="bottom" tip>
                        <sp-menu>
                            <sp-menu-item>Merch Card<sp-icon-add slot="icon"></sp-icon-add></sp-menu-item>
                            <sp-menu-item>Merch Card Collection<sp-icon-add slot="icon"></sp-icon-add></sp-menu-item>
                        </sp-menu>
                    </sp-popover>
                </overlay-trigger>
            </div>
        </div>
    </div>
</sp-theme>
</body>
</html>
